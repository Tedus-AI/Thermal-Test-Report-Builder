      bindConclusionHandlers(page);
    }

    function bindConclusionHandlers(page) {
      const d = page.data;
      const pageIdx = state.activePage;

      // Summary (contenteditable)
      const summaryEl = document.getElementById('concl-summary-editor');
      if (summaryEl) {
        summaryEl.addEventListener('input', () => {
          d.summary = summaryEl.innerHTML;
          scheduleSave(pageIdx);
        });
        // Ctrl+B for bold
        summaryEl.addEventListener('keydown', (e) => {
          if (e.ctrlKey && e.key === 'b') {
            e.preventDefault();
            document.execCommand('bold');
          }
        });
      }

      // Compliance table inputs
      $canvas.querySelectorAll('[data-comp-idx]').forEach(el => {
        const idx = parseInt(el.dataset.compIdx);
        const field = el.dataset.compField;
        const eventType = el.tagName === 'SELECT' ? 'change' : 'input';
        el.addEventListener(eventType, () => {
          if (d.compliance[idx]) {
            d.compliance[idx][field] = el.value;
            // Re-render to update verdict color
            if (field === 'verdict') {
              renderConclusionPage(page);
            }
            scheduleSave(pageIdx);
          }
        });
      });

      // Add compliance row
      document.getElementById('add-compliance-btn')?.addEventListener('click', () => {
        d.compliance.push({ component: '', tc_max: '', spec: '', verdict: '' });
        renderConclusionPage(page);
        scheduleSave(pageIdx);
        // Focus the last component input
        setTimeout(() => {
          const inputs = $canvas.querySelectorAll('[data-comp-field="component"]');
          inputs[inputs.length - 1]?.focus();
        }, 30);
      });

      // Issues inputs
      $canvas.querySelectorAll('[data-issue-idx]').forEach(el => {
        const idx = parseInt(el.dataset.issueIdx);

        el.addEventListener('input', () => {
          d.issues[idx] = el.value;
          scheduleSave(pageIdx);
        });

        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            // Insert new issue after current
            d.issues.splice(idx + 1, 0, '');
            renderConclusionPage(page);
            scheduleSave(pageIdx);
            setTimeout(() => {
              const inputs = $canvas.querySelectorAll('[data-issue-idx]');
              inputs[idx + 1]?.focus();
            }, 30);
          }
          if (e.key === 'Backspace' && el.value === '' && d.issues.length > 1) {
            e.preventDefault();
            d.issues.splice(idx, 1);
            renderConclusionPage(page);
            scheduleSave(pageIdx);
            setTimeout(() => {
              const inputs = $canvas.querySelectorAll('[data-issue-idx]');
              const focusIdx = Math.max(0, idx - 1);
              inputs[focusIdx]?.focus();
            }, 30);
          }
        });
      });

      // Actions table inputs
      $canvas.querySelectorAll('[data-act-idx]').forEach(el => {
        const idx = parseInt(el.dataset.actIdx);
        const field = el.dataset.actField;
        el.addEventListener('input', () => {
          if (d.actions[idx]) {
            d.actions[idx][field] = el.value;
            scheduleSave(pageIdx);
          }
        });
      });

      // Add action row
      document.getElementById('add-action-btn')?.addEventListener('click', () => {
        d.actions.push({ description: '', owner: '', due_date: '' });
        renderConclusionPage(page);
        scheduleSave(pageIdx);
        setTimeout(() => {
          const inputs = $canvas.querySelectorAll('[data-act-field="description"]');
          inputs[inputs.length - 1]?.focus();
        }, 30);
      });
    }

    // ━━━ Preview Mode ━━━
    let previewIdx = 0;

    function openPreview() {
      if (state.pages.length === 0) return;
      previewIdx = state.activePage !== null ? state.activePage : 0;
      renderPreviewPage();
      document.getElementById('preview-overlay').classList.add('open');
    }

    function closePreview() {
      document.getElementById('preview-overlay').classList.remove('open');
    }

    function renderPreviewPage() {
      const wrap = document.getElementById('preview-canvas-wrap');
      const footer = document.getElementById('preview-footer');
      const page = state.pages[previewIdx];
      if (!page) return;

      const isLandscape = page.type === 'image' || page.type === 'annotation' || page.type === 'sim_vs_meas' || page.type === 'data';
      const w = isLandscape ? 842 : 595;
      const h = isLandscape ? 595 : 842;

      // Scale to fit viewport
      const vw = window.innerWidth - 64;
      const vh = window.innerHeight - 120;
      const scale = Math.min(vw / w, vh / h, 1);

      // Build static HTML into an isolated div (no live-canvas swapping)
      const el = document.createElement('div');
      el.style.cssText = `width:${w}px;height:${h}px;background:#fff;border-radius:4px;box-shadow:0 8px 40px rgba(0,0,0,0.5);overflow:hidden;transform:scale(${scale});transform-origin:center center;flex-shrink:0;font-family:${getComputedStyle(document.body).fontFamily};`;

      if (page.type === 'cover') el.innerHTML = buildCoverHTML(page.data);
      else if (page.type === 'image') el.innerHTML = buildImagePageHTML(page.data);
      else if (page.type === 'annotation') el.innerHTML = buildAnnotationHTML(page.data);
      else if (page.type === 'data') el.innerHTML = buildDataPageHTML(page.data);
      else if (page.type === 'sim_vs_meas') el.innerHTML = buildSimVsMeasHTML(page.data);
      else if (page.type === 'conclusion') el.innerHTML = buildConclusionHTML(page.data);

      wrap.innerHTML = '';
      wrap.appendChild(el);
      footer.textContent = `第 ${previewIdx + 1} 頁 / 共 ${state.pages.length} 頁`;

      // Update preview nav button states
      const prevBtn = document.getElementById('preview-prev');
      const nextBtn = document.getElementById('preview-next');
      if (prevBtn) prevBtn.disabled = previewIdx <= 0;
      if (nextBtn) nextBtn.disabled = previewIdx >= state.pages.length - 1;
    }

    // Preview nav buttons
    document.getElementById('preview-prev').addEventListener('click', () => {
      if (previewIdx > 0) { previewIdx--; renderPreviewPage(); }
    });
    document.getElementById('preview-next').addEventListener('click', () => {
      if (previewIdx < state.pages.length - 1) { previewIdx++; renderPreviewPage(); }
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      const overlay = document.getElementById('preview-overlay');
      const isPreviewOpen = overlay.classList.contains('open');

      // Skip if user is typing in an input/textarea/select
      const tag = document.activeElement?.tagName;
      const isTyping = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || document.activeElement?.isContentEditable;

      if (isPreviewOpen) {
        // Preview mode navigation
        if (e.key === 'Escape') {
          closePreview();
        } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
          e.preventDefault();
          if (previewIdx < state.pages.length - 1) { previewIdx++; renderPreviewPage(); }
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          e.preventDefault();
          if (previewIdx > 0) { previewIdx--; renderPreviewPage(); }
        }
      } else if (!isTyping && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
        // Editor mode: left/right arrow to flip pages (only when not in an input)
        e.preventDefault();
        if (e.key === 'ArrowLeft' && state.activePage > 0) {
          selectPage(state.activePage - 1);
        } else if (e.key === 'ArrowRight' && state.activePage < state.pages.length - 1) {
          selectPage(state.activePage + 1);
        }
      }
    });

    // ━━━ PDF Export ━━━

    // Offscreen renderer: builds static HTML for a page (no event bindings)
    // NOTE: html2canvas has a known bug with letter-spacing — all builders must avoid it
    const PDF_FONT = '-apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang TC", sans-serif';

    function renderPageOffscreen(page, container) {
      const isLandscape = page.type === 'image' || page.type === 'annotation' || page.type === 'sim_vs_meas' || page.type === 'data';
      const w = isLandscape ? 842 : 595;
      const h = isLandscape ? 595 : 842;

      container.style.cssText = `position:fixed;left:-9999px;top:0;width:${w}px;height:${h}px;background:#fff;z-index:-1;overflow:hidden;font-family:${PDF_FONT};letter-spacing:0px;word-spacing:0px;`;

      // Inject a hard CSS reset to kill any inherited letter-spacing (html2canvas bug workaround)
      const resetStyle = document.createElement('style');
      resetStyle.textContent = '*, *::before, *::after { letter-spacing: 0px !important; word-spacing: 0px !important; text-transform: none !important; }';
      container.appendChild(resetStyle);

      const content = document.createElement('div');
      content.style.cssText = `width:100%;height:100%;letter-spacing:0px;word-spacing:0px;`;

      if (page.type === 'cover') {
        content.innerHTML = buildCoverHTML(page.data);
      } else if (page.type === 'image') {
        content.innerHTML = buildImagePageHTML(page.data);
      } else if (page.type === 'annotation') {
        content.innerHTML = buildAnnotationHTML(page.data);
      } else if (page.type === 'data') {
        content.innerHTML = buildDataPageHTML(page.data);
      } else if (page.type === 'sim_vs_meas') {
        content.innerHTML = buildSimVsMeasHTML(page.data);
      } else if (page.type === 'conclusion') {
        content.innerHTML = buildConclusionHTML(page.data);
      }
      container.appendChild(content);
    }

    // ── Static HTML builders (pure layout, no inputs/events) ──

    function buildCoverHTML(d) {
      const hasImg = !!d.cover_image;
      const imgW = d.cover_image_w || 460;
      const imgH = d.cover_image_h || 300;
      // Scale to fit A4 width (595px - 96px padding = ~499px max)
      const maxPdfW = 499;
      const scale = imgW > maxPdfW ? maxPdfW / imgW : 1;
      const pdfW = Math.round(imgW * scale);
      const pdfH = Math.round(imgH * scale);
      // Uppercase text in JS to avoid html2canvas text-transform bug
      const deptUpper = (d.dept || '').toUpperCase();
      return `<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:40px 48px 32px;color:rgba(15,23,42,0.90);overflow:hidden;font-family:${PDF_FONT};letter-spacing:0px;word-spacing:0px;">
        <div style="font-size:14px;letter-spacing:0px;word-spacing:0px;color:rgba(15,23,42,0.50);padding:6px 8px;margin-bottom:16px;text-align:center;width:100%;">${escHtml(deptUpper)}</div>
        ${hasImg
          ? `<div style="width:${pdfW}px;height:${pdfH}px;margin-bottom:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:8px;">
               <img src="${escapeAttr(d.cover_image)}" style="max-width:100%;max-height:100%;object-fit:contain;">
             </div>`
          : `<div style="width:${pdfW}px;height:${pdfH}px;margin-bottom:24px;flex-shrink:0;"></div>`}
        <div style="font-size:26px;font-weight:700;text-align:center;letter-spacing:0px;word-spacing:0px;padding:8px;margin-bottom:4px;width:100%;">${escHtml(d.model)}</div>
        <div style="font-size:17px;font-weight:500;text-align:center;letter-spacing:0px;word-spacing:0px;color:rgba(15,23,42,0.65);padding:6px 8px;margin-bottom:24px;width:100%;">${escHtml(d.project_name)}</div>
        <div style="display:grid;grid-template-columns:auto 1fr;gap:8px 16px;align-items:center;width:100%;max-width:380px;margin-top:auto;padding-top:16px;letter-spacing:0px;word-spacing:0px;">
          <span style="font-size:12px;font-weight:600;letter-spacing:0px;word-spacing:0px;color:rgba(15,23,42,0.45);text-align:right;">STAGE</span>
          <span style="font-size:14px;letter-spacing:0px;word-spacing:0px;padding:4px 8px;">${escHtml(d.stage)}</span>
          <span style="font-size:12px;font-weight:600;letter-spacing:0px;word-spacing:0px;color:rgba(15,23,42,0.45);text-align:right;">VERSION</span>
          <span style="font-size:14px;letter-spacing:0px;word-spacing:0px;padding:4px 8px;">${escHtml(d.report_version)}</span>
          <span style="font-size:12px;font-weight:600;letter-spacing:0px;word-spacing:0px;color:rgba(15,23,42,0.45);text-align:right;">DATE</span>
          <span style="font-size:14px;letter-spacing:0px;word-spacing:0px;padding:4px 8px;">${escHtml(d.date)}</span>
          <span style="font-size:12px;font-weight:600;letter-spacing:0px;word-spacing:0px;color:rgba(15,23,42,0.45);text-align:right;">TESTED BY</span>
          <span style="font-size:14px;letter-spacing:0px;word-spacing:0px;padding:4px 8px;">${escHtml(d.tested_by)}</span>
        </div>
      </div>`;
    }

    function buildImagePageHTML(d) {
      const imgs = d.images || [];
      const count = imgs.length;
      // Grid CSS
      let gridStyle = 'flex:1;display:grid;gap:10px;min-height:0;';
      if (count <= 1) gridStyle += 'grid-template-columns:1fr;grid-template-rows:1fr;';
      else if (count === 2) gridStyle += 'grid-template-columns:1fr 1fr;grid-template-rows:1fr;';
      else gridStyle += 'grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;';

      let cells = '';
      for (let i = 0; i < count; i++) {
        const img = imgs[i];
        const src = img && img.url_or_base64;
        cells += `<div style="display:flex;flex-direction:column;min-height:0;min-width:0;">
          <div style="flex:1;border:${src ? '1px solid rgba(15,23,42,0.08)' : '2px dashed rgba(15,23,42,0.15)'};border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0;">
            ${src ? `<img src="${escapeAttr(src)}" style="width:100%;height:100%;object-fit:contain;">` : ''}
          </div>
          ${src && img.caption ? `<div style="font-size:12px;color:rgba(15,23,42,0.55);padding:4px 6px;margin-top:4px;border-bottom:1px dashed rgba(15,23,42,0.12);">${escHtml(img.caption)}</div>` : ''}
        </div>`;
      }
      if (count === 0) {
        cells = '<div style="display:flex;align-items:center;justify-content:center;flex:1;"></div>';
      }

      return `<div style="width:100%;height:100%;display:flex;flex-direction:column;padding:20px 24px 16px;overflow:hidden;color:rgba(15,23,42,0.90);letter-spacing:0px;word-spacing:0px;">
        <div style="font-size:18px;font-weight:700;letter-spacing:0px;word-spacing:0px;padding:6px 8px;margin-bottom:12px;">${escHtml(d.title)}</div>
        <div style="${gridStyle}">${cells}</div>
      </div>`;
    }

    function buildAnnotationHTML(d) {
      const hasPhoto = !!d.photo_url_or_base64;
      const markers = d.markers || [];
      const pzW = d.anno_photo_w || 680;
      const pzH = d.anno_photo_h || 430;
      // Photo zone as % of workspace (matches editor flex centering)
      const pzWPct = (pzW / 842) * 100;
      const pzHPct = (pzH / 555) * 100;
      const pzLPct = (100 - pzWPct) / 2;
      const pzTPct = (100 - pzHPct) / 2;

      let dots = '', svgLines = '';
      markers.forEach((m, idx) => {
        // Dot: % of photo zone → convert to % of workspace
        const dxPct = pzLPct + (m.x / 100) * pzWPct;
        const dyPct = pzTPct + (m.y / 100) * pzHPct;
        dots += `<div style="position:absolute;left:${dxPct}%;top:${dyPct}%;width:22px;height:22px;border-radius:50%;background:#dc2626;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;transform:translate(-50%,-50%);z-index:15;">${idx + 1}</div>`;
        if (m.label_x >= 0 && m.label_y >= 0) {
          const lxPct = m.label_x;
          const lyPct = m.label_y;
          const lw = m.label_w || 80;
          dots += `<div style="position:absolute;left:${lxPct}%;top:${lyPct}%;width:${lw}px;min-width:40px;padding:4px 8px;background:#fff;border:1.5px solid #333;border-radius:4px;font-size:11px;color:rgba(15,23,42,0.90);z-index:20;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.12);box-sizing:border-box;">${escHtml(m.label || 'TC' + (idx + 1))}</div>`;
          // SVG line: use viewBox percentages (0-100 range)
          const slxPct = lxPct + (lw / 842) * 50; // approximate label center X %
          const slyPct = lyPct + 1.8; // approximate label center Y %
          svgLines += `<line x1="${dxPct}" y1="${dyPct}" x2="${slxPct}" y2="${slyPct}" stroke="#dc2626" stroke-width="0.2"/>`;
        }
      });

      return `<div style="width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;position:relative;color:rgba(15,23,42,0.90);letter-spacing:0px;word-spacing:0px;">
        <div style="font-size:16px;font-weight:700;letter-spacing:0px;word-spacing:0px;padding:12px 16px 8px;flex-shrink:0;">${escHtml(d.title)}</div>
        <div style="flex:1;position:relative;overflow:hidden;">
          ${hasPhoto ? `<div style="position:absolute;top:${pzTPct}%;left:${pzLPct}%;width:${pzWPct}%;height:${pzHPct}%;border:1px solid rgba(15,23,42,0.08);border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;">
            <img src="${escapeAttr(d.photo_url_or_base64)}" style="width:100%;height:100%;object-fit:contain;">
          </div>` : ''}
          <svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;">${svgLines}</svg>
          ${dots}
        </div>
      </div>`;
    }

    function buildConclusionHTML(d) {
      const comp = d.compliance || [];
      const issues = (d.issues || []).filter(s => s);
      const acts = d.actions || [];

      const thStyle = 'text-align:left;font-size:11px;font-weight:600;letter-spacing:0px;word-spacing:0px;color:rgba(15,23,42,0.45);padding:6px 8px;border-bottom:2px solid rgba(15,23,42,0.10);';
      const tdStyle = 'padding:5px 8px;border-bottom:1px solid rgba(15,23,42,0.06);font-size:12px;letter-spacing:0px;word-spacing:0px;';

      let compRows = comp.map(r => {
        let bg = '';
        let vLabel = '—';
        if (r.verdict === 'pass')    { bg = 'background:rgba(34,197,94,0.12);color:#166534;'; vLabel = '✅ Pass'; }
        if (r.verdict === 'warning') { bg = 'background:rgba(250,204,21,0.18);color:#854d0e;'; vLabel = '⚠️ Warning'; }
        if (r.verdict === 'fail')    { bg = 'background:rgba(239,68,68,0.12);color:#991b1b;'; vLabel = '❌ Fail'; }
        return `<tr><td style="${tdStyle}">${escHtml(r.component)}</td><td style="${tdStyle}">${escHtml(r.tc_max)}</td><td style="${tdStyle}">${escHtml(r.spec)}</td><td style="${tdStyle}${bg}">${vLabel}</td></tr>`;
      }).join('');

      let issuesHtml = issues.map(s => `<li style="margin-bottom:4px;font-size:13px;line-height:1.7;">• ${escHtml(s)}</li>`).join('');

      let actRows = acts.map(a => `<tr><td style="${tdStyle}">${escHtml(a.description)}</td><td style="${tdStyle}">${escHtml(a.owner)}</td><td style="${tdStyle}">${escHtml(a.due_date)}</td></tr>`).join('');

      const secTitle = 'font-size:11px;font-weight:700;letter-spacing:0px;word-spacing:0px;color:rgba(15,23,42,0.38);margin-bottom:8px;';

      return `<div style="width:100%;height:100%;display:flex;flex-direction:column;padding:32px 40px 24px;gap:20px;color:rgba(15,23,42,0.90);overflow-y:auto;letter-spacing:0px;word-spacing:0px;">
        <div>
          <div style="${secTitle}">CONCLUSION</div>
          <div style="min-height:60px;padding:10px 12px;border:1px solid rgba(15,23,42,0.10);border-radius:6px;font-size:13px;line-height:1.7;">${d.summary || ''}</div>
        </div>
        ${comp.length > 0 ? `<div>
          <div style="${secTitle}">COMPLIANCE SUMMARY</div>
          <table style="width:100%;border-collapse:collapse;font-size:12px;"><thead><tr>
            <th style="${thStyle}">Component</th><th style="${thStyle}">Max Tc</th><th style="${thStyle}">Spec</th><th style="${thStyle}">Verdict</th>
          </tr></thead><tbody>${compRows}</tbody></table>
        </div>` : ''}
        ${issues.length > 0 ? `<div>
          <div style="${secTitle}">ISSUES FOUND</div>
          <ul style="list-style:none;padding:0;">${issuesHtml}</ul>
        </div>` : ''}
        ${acts.length > 0 ? `<div>
          <div style="${secTitle}">NEXT ACTION</div>
          <table style="width:100%;border-collapse:collapse;font-size:12px;"><thead><tr>
            <th style="${thStyle}">Action</th><th style="${thStyle}">Owner</th><th style="${thStyle}">Due Date</th>
          </tr></thead><tbody>${actRows}</tbody></table>
        </div>` : ''}
      </div>`;
    }

    function buildDataPageHTML(d) {
      const h = d.header || {};
      const tas = d.ta_conditions || [];
      const comps = d.components || [];

      const thStyle = 'text-align:center;font-size:8px;font-weight:700;color:rgba(15,23,42,0.50);padding:4px 5px;background:rgba(15,23,42,0.03);border-bottom:2px solid rgba(15,23,42,0.10);white-space:nowrap;letter-spacing:0px;word-spacing:0px;';
      const tdStyle = 'padding:3px 5px;border-bottom:1px solid rgba(15,23,42,0.05);font-size:10px;white-space:nowrap;letter-spacing:0px;word-spacing:0px;text-align:center;';

      const catCounters = { RF: 0, Digital: 0, PWR: 0 };
      const rows = comps.map(comp => {
        const cat = comp.category || 'RF';
        catCounters[cat] = (catCounters[cat] || 0) + 1;
        const autoNum = cat + '-' + catCounters[cat];
        const tcSpec = parseFloat(comp.tc_spec) || 0;
        const derating = parseFloat(comp.derating) || 0.9;
        const derated = tcSpec * derating;

        let rowFail = false;
        const taCells = tas.map(ta => {
          const key = 'ta_' + ta;
          const measured = comp.readings ? comp.readings[key] : '';
          const mNum = parseFloat(measured);
          let marginStr = '—', marginBg = '';
          if (!isNaN(mNum) && derated > 0) {
            const margin = ((derated - mNum) / derated) * 100;
            marginStr = margin.toFixed(1) + '%';
            if (margin >= 10) marginBg = 'background:#dcfce7;color:#15803d;';
            else if (margin >= 0) marginBg = 'background:#fef9c3;color:#a16207;';
            else { marginBg = 'background:#fee2e2;color:#b91c1c;'; rowFail = true; }
          }
          return `<td style="${tdStyle}text-align:center;">${measured || '—'}</td><td style="${tdStyle}text-align:center;font-weight:600;${marginBg}">${marginStr}</td>`;
        }).join('');

        const catColor = cat === 'RF' ? '#3b82f6' : cat === 'Digital' ? '#8b5cf6' : '#f97316';
        const rowBg = rowFail ? 'background:rgba(254,226,226,0.4);' : '';
        const pf = rowFail ? '❌' : (tcSpec > 0 ? '✔' : '—');

        return `<tr style="${rowBg}">
          <td style="${tdStyle}text-align:center;"><span style="display:inline-block;width:3px;height:14px;border-radius:2px;background:${catColor};margin-right:3px;vertical-align:middle;"></span>${escHtml(cat)}</td>
          <td style="${tdStyle}text-align:center;color:rgba(15,23,42,0.55);font-weight:600;">${autoNum}</td>
          <td style="${tdStyle}text-align:center;">${escHtml(comp.name)}</td>
          <td style="${tdStyle}text-align:center;">${escHtml(comp.spec_type)}</td>
          <td style="${tdStyle}text-align:center;">${tcSpec || '—'}</td>
          <td style="${tdStyle}text-align:center;">${comp.derating || '0.90'}</td>
          <td style="${tdStyle}text-align:center;background:rgba(15,23,42,0.03);font-weight:600;">${derated > 0 ? derated.toFixed(1) : '—'}</td>
          <td style="${tdStyle}text-align:center;">${escHtml(comp.tim_type)}</td>
          ${taCells}
          <td style="${tdStyle}text-align:center;font-weight:700;${rowFail ? 'color:#b91c1c;' : 'color:#15803d;'}">${pf}</td>
          <td style="${tdStyle}text-align:center;">${escHtml(comp.note)}</td>
        </tr>`;
      }).join('');

      const taHeaders1 = tas.map(ta => `<th colspan="2" style="${thStyle}text-align:center;border-left:2px solid rgba(15,23,42,0.08);color:rgba(14,116,144,0.7);">Ta = ${ta}°C</th>`).join('');
      const taHeaders2 = tas.map(() => `<th style="${thStyle}text-align:center;font-size:7px;">Tc</th><th style="${thStyle}text-align:center;font-size:7px;">Margin</th>`).join('');

      const taTags = tas.map(t => `<span style="display:inline-block;padding:3px 8px;font-size:11px;font-weight:500;color:#0e7490;background:rgba(6,182,212,0.10);border:1px solid rgba(6,182,212,0.20);border-radius:12px;margin-right:4px;">Ta = ${t}°C</span>`).join('');

      return `<div style="width:100%;height:100%;display:flex;flex-direction:column;padding:28px 32px 24px;color:rgba(15,23,42,0.90);overflow:hidden;letter-spacing:0px;word-spacing:0px;">
        <div style="font-size:14px;font-weight:700;letter-spacing:0px;word-spacing:0px;color:rgba(15,23,42,0.50);margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid rgba(15,23,42,0.08);">THERMAL TEST DATA</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-bottom:10px;font-size:11px;">
          <div><span style="font-size:9px;font-weight:600;color:rgba(15,23,42,0.40);">TEST DATE</span><div>${escHtml(h.test_date)}</div></div>
          <div><span style="font-size:9px;font-weight:600;color:rgba(15,23,42,0.40);">EQUILIBRIUM TIME</span><div>${escHtml(h.eq_time_min)} min</div></div>
          <div><span style="font-size:9px;font-weight:600;color:rgba(15,23,42,0.40);">STAGE</span><div>${escHtml(h.stage)}</div></div>
          <div><span style="font-size:9px;font-weight:600;color:rgba(15,23,42,0.40);">MOUNTING</span><div>${escHtml(h.mounting)}</div></div>
          <div><span style="font-size:9px;font-weight:600;color:rgba(15,23,42,0.40);">SW VERSION</span><div>${escHtml(h.sw_version)}</div></div>
          <div><span style="font-size:9px;font-weight:600;color:rgba(15,23,42,0.40);">LOCATION</span><div>${escHtml(h.location)}</div></div>
        </div>
        <div style="margin-bottom:10px;">${taTags}</div>
        <div style="flex:1;overflow:hidden;border:1px solid rgba(15,23,42,0.10);border-radius:4px;">
          <table style="width:100%;border-collapse:collapse;font-size:10px;">
            <thead><tr>${['類別','#','元件','Spec','Tc','DR','Derated','TIM'].map(h => `<th style="${thStyle}">${h}</th>`).join('')}${taHeaders1}<th style="${thStyle}">P/F</th><th style="${thStyle}">備註</th></tr><tr>${taHeaders2}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
    }

    function buildSimVsMeasHTML(d) {
      const items = d.items || [];
      const hasSim = !!d.sim_image;
      const hasMeas = !!d.meas_image;

      const thStyle = 'text-align:left;font-size:8px;font-weight:700;color:rgba(15,23,42,0.50);padding:4px 6px;background:rgba(15,23,42,0.03);border-bottom:2px solid rgba(15,23,42,0.10);white-space:nowrap;letter-spacing:0px;word-spacing:0px;';
      const tdStyle = 'padding:3px 5px;border-bottom:1px solid rgba(15,23,42,0.05);font-size:10px;white-space:nowrap;letter-spacing:0px;word-spacing:0px;';

      const rows = items.map(item => {
        const simTc = parseFloat(item.sim_tc);
        const measTc = parseFloat(item.meas_tc);
        let devC = '—', devPct = '—', devStyle = '', judgeText = '—';
        if (!isNaN(simTc) && !isNaN(measTc) && measTc !== 0) {
          const dc = simTc - measTc;
          const dp = (dc / measTc) * 100;
          devC = dc.toFixed(1);
          devPct = dp.toFixed(1) + '%';
          const absDp = Math.abs(dp);
          if (absDp <= 10) { devStyle = 'background:#dcfce7;color:#15803d;'; judgeText = '✅'; }
          else if (absDp <= 20) { devStyle = 'background:#fef9c3;color:#a16207;'; judgeText = '⚠️'; }
          else { devStyle = 'background:#fee2e2;color:#b91c1c;'; judgeText = '❌'; }
        }
        const catColor = item.category === 'RF' ? '#3b82f6' : item.category === 'Digital' ? '#8b5cf6' : '#f97316';
        return `<tr>
          <td style="${tdStyle}"><span style="display:inline-block;width:3px;height:14px;border-radius:2px;background:${catColor};margin-right:3px;vertical-align:middle;"></span>${escHtml(item.category)}</td>
          <td style="${tdStyle}">${escHtml(item.component_name)}</td>
          <td style="${tdStyle}text-align:center;">${item.tc_derated ? parseFloat(item.tc_derated).toFixed(1) : '—'}</td>
          <td style="${tdStyle}text-align:center;">${!isNaN(simTc) ? simTc.toFixed(1) : '—'}</td>
          <td style="${tdStyle}text-align:center;">${!isNaN(measTc) ? measTc.toFixed(1) : '—'}</td>
          <td style="${tdStyle}text-align:center;font-weight:600;${devStyle}">${devC}</td>
          <td style="${tdStyle}text-align:center;font-weight:600;${devStyle}">${devPct}</td>
          <td style="${tdStyle}text-align:center;font-size:12px;${devStyle}">${judgeText}</td>
          <td style="${tdStyle}">${escHtml(item.note)}</td>
        </tr>`;
      }).join('');

      return `<div style="width:100%;height:100%;display:flex;flex-direction:column;padding:20px 24px 16px;gap:8px;color:rgba(15,23,42,0.90);overflow:hidden;letter-spacing:0px;word-spacing:0px;">
        <div style="font-size:13px;font-weight:700;letter-spacing:0px;word-spacing:0px;color:rgba(15,23,42,0.50);">SIMULATION VS MEASUREMENT COMPARISON</div>
        <div style="display:flex;gap:12px;height:160px;flex-shrink:0;">
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;">
            <div style="flex:1;width:100%;border:1px solid rgba(15,23,42,0.10);border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden;">
              ${hasSim ? `<img src="${escapeAttr(d.sim_image)}" style="max-width:100%;max-height:100%;object-fit:contain;">` : '<span style="color:rgba(15,23,42,0.20);font-size:11px;">No Image</span>'}
            </div>
            <div style="font-size:9px;color:rgba(15,23,42,0.35);margin-top:3px;">FloTHERM Simulation</div>
          </div>
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;">
            <div style="flex:1;width:100%;border:1px solid rgba(15,23,42,0.10);border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden;">
              ${hasMeas ? `<img src="${escapeAttr(d.meas_image)}" style="max-width:100%;max-height:100%;object-fit:contain;">` : '<span style="color:rgba(15,23,42,0.20);font-size:11px;">No Image</span>'}
            </div>
            <div style="font-size:9px;color:rgba(15,23,42,0.35);margin-top:3px;">Measurement (IR / TC)</div>
          </div>
        </div>
        <div style="flex:1;overflow:hidden;border:1px solid rgba(15,23,42,0.10);border-radius:4px;">
          <table style="width:100%;border-collapse:collapse;font-size:10px;">
            <thead><tr>
              <th style="${thStyle}">類別</th><th style="${thStyle}">元件</th><th style="${thStyle}">Derated</th>
              <th style="${thStyle}">Sim Tc</th><th style="${thStyle}">Meas Tc</th>
              <th style="${thStyle}">Dev°C</th><th style="${thStyle}">Dev%</th><th style="${thStyle}">判斷</th><th style="${thStyle}">備註</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        ${d.sim_note ? `<div style="font-size:11px;color:rgba(15,23,42,0.55);padding:4px 0;">${escHtml(d.sim_note)}</div>` : ''}
      </div>`;
    }

    function escHtml(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function exportPDF() {
      if (state.pages.length === 0) return;
      if (typeof html2canvas === 'undefined' || typeof jspdf === 'undefined') {
        alert('PDF 匯出函式庫載入中，請稍後再試');
        return;
      }

      setStatus('saving', '匯出中...');
      const { jsPDF } = jspdf;

      // Build filename from cover page
      let filename = 'ThermalReport';
      const coverPage = state.pages.find(p => p.type === 'cover');
      if (coverPage && coverPage.data) {
        const d = coverPage.data;
        const parts = [];
        if (d.project_name) parts.push(d.project_name.replace(/[^a-zA-Z0-9\u4e00-\u9fff_-]/g, '_'));
        if (d.stage) parts.push(d.stage);
        if (d.date) parts.push(d.date);
        parts.push('ThermalReport');
        filename = parts.join('_');
      } else {
        filename += '_' + new Date().toISOString().slice(0, 10);
      }

      let pdf = null;

      try {
        for (let i = 0; i < state.pages.length; i++) {
          const page = state.pages[i];
const isLandscape = page.type === 'image' || page.type === 'annotation' || page.type === 'sim_vs_meas' || page.type === 'data';
          const w = isLandscape ? 842 : 595;
          const h = isLandscape ? 595 : 842;

          // Create offscreen container — completely isolated from the UI
          const offscreen = document.createElement('div');
          document.body.appendChild(offscreen);
          renderPageOffscreen(page, offscreen);

          // Wait for all images to load before capturing
          const imgs = offscreen.querySelectorAll('img');
          if (imgs.length > 0) {
            await Promise.all(Array.from(imgs).map(img =>
              img.complete ? Promise.resolve() : new Promise(r => { img.onload = r; img.onerror = r; })
            ));
          }
          // Extra frame for layout settle
          await new Promise(r => setTimeout(r, 100));

          // Capture
          const canvasImg = await html2canvas(offscreen, {
            scale: 2,
            useCORS: true,
            backgroundColor: '#ffffff',
            width: w,
            height: h,
            logging: false,
          });

          document.body.removeChild(offscreen);

          const orientation = isLandscape ? 'landscape' : 'portrait';
          const pdfW = isLandscape ? 297 : 210;
          const pdfH = isLandscape ? 210 : 297;

          if (i === 0) {
            pdf = new jsPDF({ orientation, unit: 'mm', format: 'a4' });
          } else {
            pdf.addPage('a4', orientation);
          }

          const imgData = canvasImg.toDataURL('image/jpeg', 0.92);
          pdf.addImage(imgData, 'JPEG', 0, 0, pdfW, pdfH);
        }

        pdf.save(filename + '.pdf');
        setStatus('saved', '已儲存 ✅');
        console.log('✅ PDF exported:', filename + '.pdf');
      } catch (err) {
        console.error('PDF export error:', err);
        setStatus('saved', '匯出失敗');
        alert('PDF 匯出失敗：' + err.message);
      }
    }

    // ━━━ Utility ━━━
    function escapeAttr(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ━━━ Report Homepage ━━━
    const $homepage = document.getElementById('homepage');
    const $editorApp = document.getElementById('editor-app');
    const $hpGrid = document.getElementById('hp-grid');
    const $hpEmpty = document.getElementById('hp-empty');

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return '剛剛';
      if (diff < 3600) return Math.floor(diff / 60) + ' 分鐘前';
      if (diff < 86400) return Math.floor(diff / 3600) + ' 小時前';
      const days = Math.floor(diff / 86400);
      if (days <= 30) return days + ' 天前';
      return d.toLocaleDateString('zh-TW');
    }

    async function loadReportList() {
      if (!window._db) return [];
      try {
        const colRef = window._collection(window._db, 'thermal_reports');
        const snap = await window._getDocs(colRef);
        const reports = [];
        snap.forEach(docSnap => {
          const data = docSnap.data();
          reports.push({ id: docSnap.id, ...data });
        });
        // Sort by updated_at desc
        reports.sort((a, b) => {
          const ta = a.updated_at || a.created_at || '';
          const tb = b.updated_at || b.created_at || '';
          return tb.localeCompare(ta);
        });
        return reports;
      } catch (err) {
        console.warn('Could not load report list:', err);
        return [];
      }
    }

    async function renderHomepage() {
      const reports = await loadReportList();
      if (reports.length === 0) {
        $hpEmpty.style.display = 'flex';
        $hpGrid.style.display = 'none';
        return;
      }
      $hpEmpty.style.display = 'none';
      $hpGrid.style.display = 'grid';

      $hpGrid.innerHTML = reports.map(r => `
        <div class="hp-card" data-report-id="${escapeAttr(r.id)}">
          <div class="hp-card-title">${escapeAttr(r.project_name || '未命名報告')}</div>
          ${r.model ? `<div class="hp-card-date" style="font-size:12px;margin-top:-4px;">${escapeAttr(r.model)}</div>` : ''}
          <div class="hp-card-meta">
            ${r.stage ? `<span class="hp-badge">${escapeAttr(r.stage)}</span>` : ''}
            ${r.date ? `<span class="hp-card-date">${escapeAttr(r.date)}</span>` : ''}
          </div>
          <div class="hp-card-updated">最後編輯：${timeAgo(r.updated_at || r.created_at)}</div>
          <div class="hp-card-actions">
            <button class="hp-card-btn primary" data-action="open" data-id="${escapeAttr(r.id)}">開啟編輯</button>
            <button class="hp-card-btn" data-action="duplicate" data-id="${escapeAttr(r.id)}">複製</button>
            <button class="hp-card-btn danger" data-action="delete" data-id="${escapeAttr(r.id)}" data-name="${escapeAttr(r.project_name || '未命名報告')}">刪除</button>
          </div>
        </div>
      `).join('');

      // Bind card actions
      $hpGrid.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const action = btn.dataset.action;
          const id = btn.dataset.id;
          if (action === 'open') {
            await openReport(id);
          } else if (action === 'duplicate') {
            await duplicateReport(id);
          } else if (action === 'delete') {
            showDeleteDialog(id, btn.dataset.name);
          }
        });
      });
    }

    function showHomepage() {
      $homepage.classList.remove('hidden');
      $editorApp.style.display = 'none';
      renderHomepage();
    }

    function showEditor() {
      $homepage.classList.add('hidden');
      $editorApp.style.display = '';
    }

    function showNewReportModal() {
      const today = new Date().toISOString().slice(0, 10);
      const overlay = document.createElement('div');
      overlay.className = 'hp-modal-overlay';
      overlay.innerHTML = `
        <div class="hp-modal">
          <div class="hp-modal-header">新增報告</div>
          <div class="hp-modal-body">
            <div class="hp-modal-field">
              <label>案名 *</label>
              <input type="text" id="hp-new-name" placeholder="輸入案名（Project Name）" autofocus>
            </div>
            <div class="hp-modal-field">
              <label>產品型號</label>
              <input type="text" id="hp-new-model" placeholder="輸入型號（Model）">
            </div>
            <div class="hp-modal-field">
              <label>Stage</label>
              <select id="hp-new-stage">
                ${['Prototype','EVT','DVT','PVT','MP'].map(s =>
                  `<option value="${s}" ${s==='DVT'?'selected':''}>${s}</option>`
                ).join('')}
              </select>
            </div>
            <div class="hp-modal-field">
              <label>日期</label>
              <input type="date" id="hp-new-date" value="${today}">
            </div>
          </div>
          <div class="hp-modal-footer">
            <button class="hp-modal-btn" id="hp-new-cancel">取消</button>
            <button class="hp-modal-btn primary" id="hp-new-confirm">建立報告</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      overlay.querySelector('#hp-new-cancel').addEventListener('click', () => document.body.removeChild(overlay));
      overlay.addEventListener('click', (e) => { if (e.target === overlay) document.body.removeChild(overlay); });

      overlay.querySelector('#hp-new-confirm').addEventListener('click', async () => {
        const name = overlay.querySelector('#hp-new-name').value.trim();
        if (!name) { overlay.querySelector('#hp-new-name').focus(); return; }
        const model = overlay.querySelector('#hp-new-model').value.trim();
        const stage = overlay.querySelector('#hp-new-stage').value;
        const date = overlay.querySelector('#hp-new-date').value;
        document.body.removeChild(overlay);
        await createNewReport(name, model, stage, date);
      });

      // Enter key
      overlay.querySelector('#hp-new-name').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') overlay.querySelector('#hp-new-confirm').click();
      });

      setTimeout(() => overlay.querySelector('#hp-new-name').focus(), 100);
    }

    async function createNewReport(name, model, stage, date) {
      const id = 'rpt_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
      const now = new Date().toISOString();

      // Create report meta document
      if (window._db) {
        try {
          const docRef = window._doc(window._db, 'thermal_reports', id);
          await window._setDoc(docRef, {
            project_name: name,
            model: model,
            stage: stage,
            date: date,
            created_at: now,
            updated_at: now,
          });
        } catch (err) {
          console.warn('Could not create report doc:', err);
        }
      }

      // Open the new report with a default cover page
      state.reportId = id;
      state.pages = [];
      state.activePage = null;
      addCoverPage();
      // Pre-fill cover page fields
      const cover = state.pages[0];
      if (cover) {
        cover.data.project_name = name;
        cover.data.model = model;
        cover.data.stage = stage;
        cover.data.date = date;
        scheduleSave(0);
      }
      showEditor();
      renderPageList();
      selectPage(0);
    }

    async function openReport(reportId) {
      state.reportId = reportId;
      state.pages = [];
      state.activePage = null;

      // Load pages
      try {
        for (let i = 0; i < 50; i++) {
          const existingData = await loadPageFromFirestore(i);
          if (!existingData) break;
          state.pages.push({
            id: 'page_loaded_' + i,
            type: existingData.type,
            order: existingData.order ?? i,
            data: existingData.data,
          });
        }
      } catch (err) {
        console.warn('Could not load pages:', err);
      }

      showEditor();
      renderPageList();
      if (state.pages.length > 0) {
        selectPage(0);
        setStatus('saved', '已儲存 ✅');
      }
    }

    async function duplicateReport(sourceId) {
      const newId = 'rpt_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
      const now = new Date().toISOString();

      try {
        // Copy meta
        const srcDocRef = window._doc(window._db, 'thermal_reports', sourceId);
        const srcSnap = await window._getDoc(srcDocRef);
        if (srcSnap.exists()) {
          const srcData = srcSnap.data();
          const newDocRef = window._doc(window._db, 'thermal_reports', newId);
          await window._setDoc(newDocRef, {
            ...srcData,
            project_name: (srcData.project_name || '') + ' (副本)',
            created_at: now,
            updated_at: now,
          });

          // Copy pages
          for (let i = 0; i < 50; i++) {
            const pageDocRef = window._doc(window._db, 'thermal_reports', sourceId, 'pages', String(i));
            const pageSnap = await window._getDoc(pageDocRef);
            if (!pageSnap.exists()) break;
            const newPageRef = window._doc(window._db, 'thermal_reports', newId, 'pages', String(i));
            await window._setDoc(newPageRef, pageSnap.data());
          }
        }
      } catch (err) {
        console.warn('Duplicate error:', err);
      }

      await renderHomepage();
    }

    function showDeleteDialog(reportId, reportName) {
      const overlay = document.createElement('div');
      overlay.className = 'hp-modal-overlay';
      overlay.innerHTML = `
        <div class="hp-modal">
          <div class="hp-modal-header">確認刪除</div>
          <div class="hp-modal-body">
            <div class="hp-delete-msg">確定刪除「<strong>${escapeAttr(reportName)}</strong>」嗎？<br>此操作無法復原。</div>
          </div>
          <div class="hp-modal-footer">
            <button class="hp-modal-btn" id="hp-del-cancel">取消</button>
            <button class="hp-modal-btn danger" id="hp-del-confirm">確認刪除</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      overlay.querySelector('#hp-del-cancel').addEventListener('click', () => document.body.removeChild(overlay));
      overlay.addEventListener('click', (e) => { if (e.target === overlay) document.body.removeChild(overlay); });

      overlay.querySelector('#hp-del-confirm').addEventListener('click', async () => {
        document.body.removeChild(overlay);
        await deleteReport(reportId);
      });
    }

    async function deleteReport(reportId) {
      try {
        // Delete pages sub-collection
        for (let i = 0; i < 50; i++) {
          const pageRef = window._doc(window._db, 'thermal_reports', reportId, 'pages', String(i));
          const snap = await window._getDoc(pageRef);
          if (!snap.exists()) break;
          await window._deleteDoc(pageRef);
        }

        // Delete report meta document
        const docRef = window._doc(window._db, 'thermal_reports', reportId);
        await window._deleteDoc(docRef);

        // Delete images from Storage
        try {
          const folderRef = window._storageRef(window._storage, `reports/${reportId}`);
          const files = await window._listAll(folderRef);
          for (const fileRef of files.items) {
            await window._deleteObject(fileRef);
          }
        } catch (storageErr) {
          // Storage folder may not exist, that's fine
          console.warn('Storage cleanup:', storageErr.message);
        }

        console.log('🗑 Deleted report:', reportId);
      } catch (err) {
        console.warn('Delete error:', err);
      }

      await renderHomepage();
    }

    // Update report meta on each save
    async function updateReportMeta() {
      if (!window._db || !state.reportId) return;
      try {
        const coverPage = state.pages.find(p => p.type === 'cover');
        const meta = {
          updated_at: new Date().toISOString(),
        };
        if (coverPage) {
          meta.project_name = coverPage.data.project_name || '';
          meta.model = coverPage.data.model || '';
          meta.stage = coverPage.data.stage || '';
          meta.date = coverPage.data.date || '';
        }
        const docRef = window._doc(window._db, 'thermal_reports', state.reportId);
        await window._setDoc(docRef, meta, { merge: true });
      } catch (err) {
        // Silent - meta update is non-critical
      }
    }

    // ━━━ Init ━━━
    async function init() {
      // Setup dropdowns
      setupDropdown('toolbar-add-btn', 'toolbar-add-menu');
      setupDropdown('sidebar-add-btn', 'sidebar-add-menu');

      // Preview & PDF buttons
      document.getElementById('btn-preview').addEventListener('click', openPreview);
      document.getElementById('preview-close').addEventListener('click', closePreview);
      document.getElementById('btn-export-pdf').addEventListener('click', exportPDF);

      // Back to homepage
      document.getElementById('btn-back-home').addEventListener('click', () => {
        // Reset editor state
        state.reportId = null;
        state.pages = [];
        state.activePage = null;
        $pageList.innerHTML = '';
        $canvas.classList.remove('landscape');
        $canvas.innerHTML = '<span class="canvas-placeholder">← 請從左側選擇或新增頁面</span>';
        updatePageNavButtons();
        showHomepage();
      });

      // New report button
      document.getElementById('hp-new-report').addEventListener('click', showNewReportModal);

      // Setup SortableJS
      if (typeof Sortable !== 'undefined') {
        Sortable.create($pageList, {
          animation: 150,
          ghostClass: 'sortable-ghost',
          onEnd: (evt) => {
            const moved = state.pages.splice(evt.oldIndex, 1)[0];
            state.pages.splice(evt.newIndex, 0, moved);
            state.pages.forEach((p, i) => p.order = i);
            if (state.activePage === evt.oldIndex) {
              state.activePage = evt.newIndex;
            } else if (state.activePage > evt.oldIndex && state.activePage <= evt.newIndex) {
              state.activePage--;
            } else if (state.activePage < evt.oldIndex && state.activePage >= evt.newIndex) {
              state.activePage++;
            }
            renderPageList();
            state.pages.forEach((_, i) => scheduleSave(i));
          }
        });
      }

      // Wait for Firebase, then show homepage
      await waitForFirebase();
      showHomepage();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
