<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thermal Report Builder</title>

  <!-- Firebase SDK 10.x via CDN -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
    import { getFirestore, enableIndexedDbPersistence, doc, setDoc, getDoc, deleteDoc, getDocs, collection, query, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL, listAll, deleteObject } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBBhIIGUe3yzxarC3OHoIhuFr5Yg8IfAoo",
      authDomain: "thermal-test-report-builder.firebaseapp.com",
      projectId: "thermal-test-report-builder",
      storageBucket: "thermal-test-report-builder.firebasestorage.app",
      messagingSenderId: "440712941744",
      appId: "1:440712941744:web:0f4417911669e43e0f2b75"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    enableIndexedDbPersistence(db).catch((err) => {
      if (err.code === 'failed-precondition') {
        console.warn('Persistence failed: multiple tabs open');
      } else if (err.code === 'unimplemented') {
        console.warn('Persistence not supported by browser');
      }
    });

    window._app = app;
    window._db = db;
    window._storage = storage;
    window._doc = doc;
    window._setDoc = setDoc;
    window._getDoc = getDoc;
    window._deleteDoc = deleteDoc;
    window._collection = collection;
    window._serverTimestamp = serverTimestamp;
    window._storageRef = storageRef;
    window._uploadBytes = uploadBytes;
    window._getDownloadURL = getDownloadURL;
    window._getDocs = getDocs;
    window._query = query;
    window._orderBy = orderBy;
    window._listAll = listAll;
    window._deleteObject = deleteObject;

    console.log('✅ Firebase initialized (Firestore + Storage + Offline Persistence)');
  </script>

  <!-- SortableJS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>

  <!-- html2canvas + jsPDF CDN -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>

  <style>
    /* ━━━ CSS Design System: Candy Glass ━━━ */
    :root {
      --bg-base: #0c0e1a;
      --bg-gradient: linear-gradient(135deg, #0c0e1a 0%, #1a0e2e 30%, #0e1a2e 60%, #0c1a1e 100%);
      --bg-glow-1: radial-gradient(ellipse at 15% 25%, rgba(168,85,247,0.14) 0%, transparent 55%);
      --bg-glow-2: radial-gradient(ellipse at 85% 75%, rgba(56,189,248,0.12) 0%, transparent 55%);
      --bg-glow-3: radial-gradient(ellipse at 50% 0%, rgba(244,114,182,0.08) 0%, transparent 50%);
      --bg-glow-4: radial-gradient(ellipse at 75% 20%, rgba(52,211,153,0.06) 0%, transparent 45%);

      --glass-bg: rgba(255,255,255,0.06);
      --glass-bg-hover: rgba(255,255,255,0.10);
      --glass-bg-active: rgba(255,255,255,0.14);
      --glass-border: rgba(255,255,255,0.12);
      --glass-border-top: rgba(255,255,255,0.25);
      --glass-blur: 24px;
      --glass-blur-heavy: 48px;
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.08);
      --glass-shadow-lg: 0 16px 48px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.10);

      --candy-pink: rgba(244,114,182,1);
      --candy-purple: rgba(168,85,247,1);
      --candy-cyan: rgba(56,189,248,1);
      --candy-teal: rgba(52,211,153,1);
      --candy-peach: rgba(251,146,60,1);

      --color-primary: var(--candy-cyan);
      --color-primary-glass: rgba(56,189,248,0.12);
      --color-primary-glow: rgba(56,189,248,0.25);
      --color-success: rgba(52,211,153,1);
      --color-warning: rgba(250,204,21,1);
      --color-danger: rgba(244,114,182,1);

      --accent-gradient: linear-gradient(135deg, var(--candy-pink), var(--candy-purple), var(--candy-cyan));
      --accent-gradient-warm: linear-gradient(135deg, var(--candy-peach), var(--candy-pink), var(--candy-purple));

      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.55);
      --text-placeholder: rgba(255,255,255,0.28);
      --text-on-white: rgba(15,23,42,0.90);

      --font-ui: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang TC", sans-serif;
      --font-data: "SF Mono", "JetBrains Mono", monospace;

      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;

      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 18px;
      --radius-xl: 22px;
      --radius-2xl: 28px;
      --radius-full: 9999px;

      --transition-fast: 0.18s ease;
      --transition-base: 0.25s ease;
      --transition-slow: 0.35s ease;
    }

    /* ━━━ Reset & Base ━━━ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font-ui);
      color: var(--text-primary);
      background: var(--bg-base);
    }

    body {
      background: var(--bg-gradient);
      position: relative;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before { background: var(--bg-glow-1), var(--bg-glow-3); }
    body::after { background: var(--bg-glow-2), var(--bg-glow-4); }

    /* ━━━ Layout ━━━ */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ━━━ Toolbar ━━━ */
    .toolbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-5);
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(var(--glass-blur-heavy));
      -webkit-backdrop-filter: blur(var(--glass-blur-heavy));
      border-bottom: 1px solid rgba(255,255,255,0.08);
      border-top: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 4px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
      flex-shrink: 0;
      z-index: 100;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
    }

    .toolbar-center {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* Glass button */
    .glass-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      font-size: 13px;
      font-family: var(--font-ui);
      color: var(--text-primary);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-top-color: rgba(255,255,255,0.18);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
      white-space: nowrap;
      position: relative;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .glass-btn:hover {
      background: rgba(255,255,255,0.10);
      box-shadow: 0 0 20px rgba(168,85,247,0.15), 0 0 12px rgba(56,189,248,0.15), 0 4px 12px rgba(0,0,0,0.25);
      border-color: rgba(168,85,247,0.35);
    }

    .glass-btn:active {
      background: rgba(255,255,255,0.14);
      transform: scale(0.97);
    }

    /* ━━━ Dropdown Menu ━━━ */
    .dropdown-wrap { position: relative; }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 180px;
      background: rgba(18,10,32,0.85);
      backdrop-filter: blur(var(--glass-blur-heavy));
      -webkit-backdrop-filter: blur(var(--glass-blur-heavy));
      border: 1px solid rgba(168,85,247,0.15);
      border-top: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-md);
      box-shadow: var(--glass-shadow-lg), 0 0 40px rgba(168,85,247,0.06);
      padding: var(--space-1) 0;
      z-index: 200;
    }

    .dropdown-menu.open { display: block; }

    .dropdown-item {
      display: block;
      width: 100%;
      padding: var(--space-2) var(--space-4);
      font-size: 13px;
      font-family: var(--font-ui);
      color: var(--text-primary);
      background: transparent;
      border: none;
      text-align: left;
      cursor: pointer;
      transition: background var(--transition-fast);
    }

    .dropdown-item:hover {
      background: linear-gradient(90deg, rgba(168,85,247,0.12), rgba(56,189,248,0.08));
    }

    /* ━━━ Context Menu ━━━ */
    .context-menu {
      display: none;
      position: fixed;
      min-width: 140px;
      background: rgba(18,10,32,0.88);
      backdrop-filter: blur(var(--glass-blur-heavy));
      -webkit-backdrop-filter: blur(var(--glass-blur-heavy));
      border: 1px solid rgba(244,114,182,0.15);
      border-top: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-md);
      box-shadow: var(--glass-shadow-lg);
      padding: var(--space-1) 0;
      z-index: 300;
    }

    .context-menu.open { display: block; }

    .context-item {
      display: block;
      width: 100%;
      padding: var(--space-2) var(--space-4);
      font-size: 13px;
      font-family: var(--font-ui);
      color: rgba(244,114,182,0.85);
      background: transparent;
      border: none;
      text-align: left;
      cursor: pointer;
      transition: background var(--transition-fast);
    }

    .context-item:hover {
      background: rgba(244,114,182,0.12);
    }

    /* ━━━ Body ━━━ */
    .body {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ━━━ Sidebar ━━━ */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(var(--glass-blur-heavy));
      -webkit-backdrop-filter: blur(var(--glass-blur-heavy));
      border-right: 1px solid rgba(255,255,255,0.06);
      z-index: 50;
      box-shadow: inset -1px 0 0 rgba(255,255,255,0.04), 4px 0 20px rgba(0,0,0,0.15);
    }

    .sidebar-header {
      padding: var(--space-4) var(--space-4) var(--space-3);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    #page-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 var(--space-3);
    }

    .page-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      margin-bottom: var(--space-1);
      font-size: 13px;
      color: var(--text-primary);
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition-fast), border-color var(--transition-fast);
      user-select: none;
    }

    .page-item:hover {
      background: rgba(255,255,255,0.06);
    }

    .page-item.active {
      background: linear-gradient(135deg, rgba(168,85,247,0.12), rgba(56,189,248,0.10));
      border-color: rgba(168,85,247,0.40);
      box-shadow: 0 0 16px rgba(168,85,247,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .page-item.sortable-ghost {
      opacity: 0.4;
    }

    .sidebar-footer {
      padding: var(--space-3) var(--space-4);
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar-add-btn {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      width: 100%;
      padding: var(--space-2) var(--space-3);
      font-size: 13px;
      font-family: var(--font-ui);
      color: var(--color-primary);
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition-fast);
      position: relative;
    }

    .sidebar-add-btn:hover {
      background: linear-gradient(90deg, rgba(56,189,248,0.08), rgba(168,85,247,0.06));
    }

    /* Sidebar bottom dropdown opens upward */
    .sidebar-footer .dropdown-menu {
      top: auto;
      bottom: calc(100% + 4px);
      left: var(--space-3);
    }

    /* ━━━ Editor Area ━━━ */
    .editor-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 12px;
      position: relative;
    }

    #editor-canvas {
      /* Default portrait A4 aspect ratio 595:842 */
      --canvas-aspect: 595 / 842;
      aspect-ratio: var(--canvas-aspect);
      max-width: calc(100% - 80px);  /* leave room for nav buttons */
      max-height: 100%;
      /* Fill as much space as possible while keeping ratio */
      width: auto;
      height: 100%;
      background: #ffffff;
      border-radius: 4px;
      box-shadow:
        0 8px 40px rgba(0,0,0,0.45),
        0 2px 8px rgba(0,0,0,0.3),
        0 0 60px rgba(168,85,247,0.04),
        0 0 0 1px rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 1;
      position: relative;
      overflow: hidden;
    }

    /* Page navigation buttons */
    .page-nav-btn {
      position: absolute;
      bottom: 20px;
      z-index: 60;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(18,10,32,0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: rgba(255,255,255,0.7);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
      user-select: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .page-nav-btn:hover {
      background: linear-gradient(135deg, rgba(168,85,247,0.3), rgba(56,189,248,0.25));
      transform: scale(1.1);
      color: #fff;
      box-shadow: 0 0 20px rgba(168,85,247,0.2), 0 4px 16px rgba(0,0,0,0.3);
    }
    .page-nav-btn:disabled {
      opacity: 0.25;
      cursor: default;
      pointer-events: none;
    }
    .page-nav-btn.prev { left: 20px; }
    .page-nav-btn.next { right: 20px; }

    .canvas-placeholder {
      font-size: 15px;
      color: var(--text-on-white);
      opacity: 0.4;
      user-select: none;
    }

    /* ━━━ Status dot ━━━ */
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: var(--radius-full);
      background: var(--color-success);
      margin-right: var(--space-2);
      transition: background var(--transition-fast);
    }

    .status-dot.saving { background: var(--color-warning); }
    .status-dot.offline { background: var(--color-warning); }

    /* ━━━ Cover Page Module ━━━ */
    .cover-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 48px 32px;
      font-family: var(--font-ui);
      color: var(--text-on-white);
      overflow-y: auto;
    }

    .cover-page input,
    .cover-page select {
      font-family: var(--font-ui);
      color: var(--text-on-white);
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      text-align: center;
    }

    .cover-page input::placeholder {
      color: rgba(15,23,42,0.30);
    }

    .cover-page input:hover,
    .cover-page select:hover {
      background: rgba(56,189,248,0.04);
    }

    .cover-page input:focus,
    .cover-page select:focus {
      background: rgba(56,189,248,0.06);
      border-radius: 4px;
    }

    .cover-dept {
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(15,23,42,0.50);
      padding: 6px 8px;
      margin-bottom: 16px;
    }

    .cover-photo-zone {
      width: 460px;
      height: 300px;
      border: 2px dashed rgba(15,23,42,0.18);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
      transition: border-color var(--transition-fast), background var(--transition-fast);
      flex-shrink: 0;
    }

    .cover-photo-resize {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 20px;
      height: 20px;
      cursor: nwse-resize;
      z-index: 6;
      display: none;
    }
    .cover-photo-resize::after {
      content: '';
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 8px;
      height: 8px;
      border-right: 2px solid rgba(15,23,42,0.25);
      border-bottom: 2px solid rgba(15,23,42,0.25);
    }
    .cover-photo-zone.has-image .cover-photo-resize {
      display: block;
    }
    .cover-photo-zone.has-image:hover .cover-photo-resize::after {
      border-color: rgba(56,189,248,0.6);
    }

    .cover-photo-zone:hover {
      border-color: rgba(56,189,248,0.4);
      background: rgba(56,189,248,0.03);
    }

    .cover-photo-zone.dragover {
      border-color: var(--color-primary);
      background: rgba(56,189,248,0.08);
    }

    .cover-photo-zone.has-image {
      border: none;
    }

    .cover-photo-placeholder {
      text-align: center;
      color: rgba(15,23,42,0.30);
      font-size: 13px;
      pointer-events: none;
    }

    .cover-photo-placeholder .icon {
      font-size: 32px;
      display: block;
      margin-bottom: 8px;
    }

    .cover-photo-zone img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .cover-photo-actions {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
      gap: 4px;
    }

    .cover-photo-zone.has-image:hover .cover-photo-actions {
      display: flex;
    }

    .photo-action-btn {
      padding: 4px 10px;
      font-size: 11px;
      font-family: var(--font-ui);
      color: #fff;
      background: rgba(0,0,0,0.55);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background var(--transition-fast);
    }

    .photo-action-btn:hover {
      background: rgba(0,0,0,0.75);
    }

    .photo-action-btn.danger:hover {
      background: rgba(239,68,68,0.8);
    }

    .cover-project-name {
      font-size: 26px;
      font-weight: 700;
      padding: 8px;
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }

    .cover-model {
      font-size: 17px;
      font-weight: 500;
      padding: 6px 8px;
      margin-bottom: 24px;
      color: rgba(15,23,42,0.65);
    }

    .cover-meta-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 16px;
      align-items: center;
      width: 100%;
      max-width: 380px;
      margin-top: auto;
      padding-top: 16px;
    }

    .cover-meta-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(15,23,42,0.45);
      text-align: right;
      white-space: nowrap;
    }

    .cover-meta-grid input,
    .cover-meta-grid select {
      text-align: left;
      font-size: 14px;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .cover-meta-grid select {
      cursor: pointer;
      appearance: auto;
    }

    /* ━━━ Conclusion Page Module ━━━ */
    .conclusion-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 32px 40px 24px;
      font-family: var(--font-ui);
      color: var(--text-on-white);
      overflow-y: auto;
      gap: 20px;
    }

    .concl-section {
      flex-shrink: 0;
    }

    .concl-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(15,23,42,0.38);
      margin-bottom: 8px;
    }

    /* Summary rich text */
    .concl-summary {
      min-height: 72px;
      padding: 10px 12px;
      border: 1px solid rgba(15,23,42,0.10);
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-on-white);
      outline: none;

      border-bottom: 2px solid rgba(15,23,42,0.10);

    .concl-add-btn {

    /* Issues list */

    .concl-issue-item {

    .concl-issue-input {
      flex: 1;

    /* Actions table */

      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .concl-actions-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(15,23,42,0.45);
      padding: 6px 8px;
      border-bottom: 2px solid rgba(15,23,42,0.10);
    }

    .concl-actions-table td {
      padding: 5px 8px;
      border-bottom: 1px solid rgba(15,23,42,0.06);
    }

    .concl-actions-table input {
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-on-white);
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      padding: 2px 0;

    .concl-actions-table input::placeholder {
      color: rgba(15,23,42,0.22);
    }

    .concl-actions-table input:focus {
      background: rgba(56,189,248,0.04);

    /* ━━━ Data Page Module (A4 Portrait) ━━━ */
    .data-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 28px 32px 24px;
      font-family: var(--font-ui);
      color: var(--text-on-white);
      overflow-y: auto;
    }

    .data-page-title {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(15,23,42,0.50);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid rgba(15,23,42,0.08);
    }

    .data-header-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 24px;
      margin-bottom: 16px;

    .data-field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .data-field-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(15,23,42,0.40);
    }

    .data-field input,
    .data-field select {
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-on-white);
      border: 1px solid rgba(15,23,42,0.10);
      border-radius: 4px;
      outline: none;
      background: transparent;
      padding: 5px 8px;
      transition: border-color var(--transition-fast), background var(--transition-fast);
    }

    .data-field input::placeholder {
      color: rgba(15,23,42,0.25);
    }

    .data-field input:hover,
    .data-field select:hover {
      border-color: rgba(15,23,42,0.20);
    }

    .data-field input:focus,
    .data-field select:focus {
      border-color: rgba(56,189,248,0.45);

    }

    .data-field-unit {
      display: flex;
      align-items: center;
      gap: 0;
    }

      border-bottom-right-radius: 0;
      flex: 1;
    }

    .data-field-unit .unit-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(15,23,42,0.40);
      background: rgba(15,23,42,0.04);
      border: 1px solid rgba(15,23,42,0.10);
      border-left: none;
      border-radius: 0 4px 4px 0;
      padding: 5px 8px;
      white-space: nowrap;
    }

    /* Ta conditions */
    .ta-section {
      border-top: 1px solid rgba(15,23,42,0.08);
      padding-top: 12px;
      margin-bottom: 16px;
    }

    .ta-section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(15,23,42,0.40);
      margin-bottom: 8px;
    }

    .ta-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;

    .ta-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 500;

      background: rgba(6,182,212,0.10);
      border: 1px solid rgba(6,182,212,0.20);
      border-radius: 14px;
      white-space: nowrap;
    }

    .ta-tag-remove {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      font-size: 12px;
      line-height: 1;
      color: rgba(14,116,144,0.5);
      background: transparent;
      border: none;
      border-radius: 50%;

      padding: 0;
      transition: color var(--transition-fast), background var(--transition-fast);

    .ta-tag-remove:hover {
      color: #991b1b;
      background: rgba(239,68,68,0.12);
    }

    .ta-add-btn {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: var(--font-ui);
      color: rgba(56,189,248,0.7);
      background: transparent;
      border: 1px dashed rgba(56,189,248,0.25);
      border-radius: 14px;
      cursor: pointer;
      transition: background var(--transition-fast), border-color var(--transition-fast);
    }

    .ta-add-btn:hover {
      background: rgba(56,189,248,0.06);
      border-color: rgba(56,189,248,0.5);
    }

    /* Data body placeholder */
    .data-body-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed rgba(15,23,42,0.12);
      border-radius: 6px;
      font-size: 13px;
      color: rgba(15,23,42,0.25);

    /* ━━━ Data Table ━━━ */
    .data-table-wrap {
      flex: 1;
      overflow: auto;
      border: 1px solid rgba(15,23,42,0.10);
      border-radius: 6px;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      table-layout: auto;
      min-width: 100%;
    }

    .data-table th {
      position: sticky;
      top: 0;
      z-index: 2;
      text-align: center;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(15,23,42,0.50);
      padding: 5px 6px;
      background: rgba(15,23,42,0.03);
      border-bottom: 2px solid rgba(15,23,42,0.10);
      white-space: nowrap;
    }

    .data-table th.ta-group-header {
      text-align: center;
      border-left: 2px solid rgba(15,23,42,0.08);
      font-size: 10px;
      color: rgba(14,116,144,0.7);
      background: rgba(6,182,212,0.04);
    }

    .data-table th.ta-sub-header {
      font-size: 8px;
      text-align: center;
    }

    .data-table td {
      padding: 3px 5px;
      border-bottom: 1px solid rgba(15,23,42,0.05);
      vertical-align: middle;
      white-space: nowrap;
      text-align: center;
    }

    .data-table tr.row-fail td {
      background: rgba(254,226,226,0.4) !important;
    }

    .data-table tr.category-boundary td {
      border-top: 2px solid rgba(15,23,42,0.12);
    }

    /* Category color strip */
    .dt-cat-strip {
      width: 3px;
      height: 18px;
      border-radius: 2px;
      display: inline-block;
      vertical-align: middle;
      margin-right: 2px;
    }
    .dt-cat-strip.cat-rf   { background: #3b82f6; }
    .dt-cat-strip.cat-digital { background: #8b5cf6; }
    .dt-cat-strip.cat-pwr  { background: #f97316; }

    .data-table input,
    .data-table select {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-on-white);
      border: none;
      outline: none;
      background: transparent;
      padding: 2px 3px;
      width: 100%;
      min-width: 0;
      text-align: center;
    }

    .data-table input::placeholder { color: rgba(15,23,42,0.20); }
    .data-table input:focus,
    .data-table select:focus { background: rgba(56,189,248,0.05); }

    .data-table select { cursor: pointer; appearance: auto; width: auto; min-width: 50px; }

    .dt-readonly {
      background: rgba(15,23,42,0.03) !important;
      color: rgba(15,23,42,0.55);
      font-weight: 600;
      text-align: center;
      padding: 2px 4px;
      font-size: 11px;
    }

    .dt-margin-pass  { background: #dcfce7 !important; color: #15803d !important; font-weight: 600; text-align: center; }
    .dt-margin-warn  { background: #fef9c3 !important; color: #a16207 !important; font-weight: 600; text-align: center; }
    .dt-margin-fail  { background: #fee2e2 !important; color: #b91c1c !important; font-weight: 600; text-align: center; }

    .dt-passfail-pass { color: #15803d; font-weight: 700; }
    .dt-passfail-fail { color: #b91c1c; font-weight: 700; }

    .dt-tc-input { width: 55px; text-align: center; }

    .data-table td.dt-ta-col {
      border-left: 1px solid rgba(15,23,42,0.06);
      text-align: center;
    }
    .data-table td.dt-ta-col-first {
      border-left: 2px solid rgba(15,23,42,0.08);
    }

    .dt-add-row-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      padding: 4px 12px;
      font-size: 11px;
      font-family: var(--font-ui);
      color: rgba(56,189,248,0.8);
      background: transparent;
      border: 1px dashed rgba(56,189,248,0.25);
      border-radius: 4px;
      cursor: pointer;
      transition: background var(--transition-fast), border-color var(--transition-fast);
    }
    .dt-add-row-btn:hover {
      background: rgba(56,189,248,0.06);
      border-color: rgba(56,189,248,0.5);
    }

    /* Sensor section */
    .sensor-section {
      margin-top: 10px;
      border: 1px solid rgba(15,23,42,0.08);
      border-radius: 6px;
      overflow: hidden;
    }

    .sensor-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-ui);
      color: rgba(15,23,42,0.50);
      background: rgba(15,23,42,0.02);
      border: none;
      cursor: pointer;
      text-align: left;

    .sensor-toggle:hover { background: rgba(15,23,42,0.04); }

    .sensor-toggle .arrow {
      display: inline-block;
      transition: transform 0.15s;
      font-size: 10px;

    .sensor-toggle .arrow.open { transform: rotate(90deg); }

    .sensor-body {
      padding: 8px;
      display: none;
    }
    .sensor-body.open { display: block; }

    .sensor-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    .sensor-table th {
      text-align: left;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(15,23,42,0.45);
      padding: 4px 6px;
      border-bottom: 1px solid rgba(15,23,42,0.08);
      white-space: nowrap;
    }
    .sensor-table td {
      padding: 3px 5px;
      border-bottom: 1px solid rgba(15,23,42,0.04);
    }
    .sensor-table input,
    .sensor-table select {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-on-white);
      border: none;
      outline: none;
      background: transparent;
      padding: 2px 3px;

    .sensor-table input:focus { background: rgba(56,189,248,0.05); }
    .sensor-table select { cursor: pointer; appearance: auto; width: auto; }

    /* ━━━ Sim vs Meas Comparison Page ━━━ */
    .sim-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 20px 24px 16px;
      font-family: var(--font-ui);
      color: var(--text-on-white);
      overflow-y: auto;
      gap: 10px;
    }

    .sim-page-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sim-page-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(15,23,42,0.50);
    }

    .sim-select-btn {
      padding: 4px 12px;
      font-size: 11px;
      font-family: var(--font-ui);
      color: rgba(56,189,248,0.85);
      background: rgba(56,189,248,0.08);
      border: 1px solid rgba(56,189,248,0.20);
      border-radius: 4px;
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    .sim-select-btn:hover {
      background: rgba(56,189,248,0.15);
    }

    /* Image pair zone */
    .sim-images {
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    .sim-img-zone {
      flex: 1;
      height: 170px;
      border: 2px dashed rgba(15,23,42,0.14);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color var(--transition-fast), background var(--transition-fast);

    .sim-img-zone:hover {
      border-color: rgba(56,189,248,0.35);
      background: rgba(56,189,248,0.02);
    }
    .sim-img-zone.dragover {
      border-color: var(--color-primary);
      background: rgba(56,189,248,0.06);
    }
    .sim-img-zone.has-image {
      border: 1px solid rgba(15,23,42,0.10);
    }
    .sim-img-zone.has-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .sim-img-placeholder {
      text-align: center;
      color: rgba(15,23,42,0.28);
      font-size: 11px;
      pointer-events: none;
    }
    .sim-img-placeholder .icon {
      font-size: 24px;
      display: block;
      margin-bottom: 4px;
    }

    .sim-img-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(15,23,42,0.35);
      margin-top: 4px;
      text-align: center;
    }

    .sim-img-caption {
      width: 100%;
      font-family: var(--font-ui);
      font-size: 10px;
      color: var(--text-on-white);
      border: none;
      outline: none;
      background: transparent;
      text-align: center;
      padding: 3px 4px;
      border-top: 1px solid rgba(15,23,42,0.06);

    .sim-img-caption::placeholder { color: rgba(15,23,42,0.20); }
    .sim-img-caption:focus { background: rgba(56,189,248,0.03); }

    .sim-img-actions {
      position: absolute;
      top: 4px;
      right: 4px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity var(--transition-fast);

    .sim-img-action-btn {
      padding: 2px 6px;
      font-size: 9px;
      font-family: var(--font-ui);
      color: #fff;
      background: rgba(0,0,0,0.5);
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    .sim-img-action-btn.danger { background: rgba(220,38,38,0.7); }

      flex: 1;
      overflow: auto;
      border: 1px solid rgba(15,23,42,0.10);
      border-radius: 6px;
    }

    .sim-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
    }

    .sim-table th {
      position: sticky;
      top: 0;
      z-index: 2;
      text-align: left;
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(15,23,42,0.50);
      padding: 4px 6px;
      background: rgba(15,23,42,0.03);
      border-bottom: 2px solid rgba(15,23,42,0.10);
      white-space: nowrap;

    .sim-table td {
      padding: 3px 5px;
      border-bottom: 1px solid rgba(15,23,42,0.05);
      vertical-align: middle;
      white-space: nowrap;

    .sim-table input {
      font-family: var(--font-ui);
      font-size: 10px;
      color: var(--text-on-white);
      border: none;
      outline: none;
      background: transparent;
      padding: 2px 3px;
      width: 100%;

    .sim-table input:focus { background: rgba(56,189,248,0.05); }

    .sim-table .sim-readonly {
      color: rgba(15,23,42,0.55);
      font-size: 10px;
    }

    .sim-dev-good  { background: #dcfce7 !important; color: #15803d !important; font-weight: 600; text-align: center; }
    .sim-dev-warn  { background: #fef9c3 !important; color: #a16207 !important; font-weight: 600; text-align: center; }
    .sim-dev-bad   { background: #fee2e2 !important; color: #b91c1c !important; font-weight: 600; text-align: center; }

    .sim-table .sim-judge { text-align: center; font-size: 12px; }

    /* Bottom note */
    .sim-note-input {
      width: 100%;
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-on-white);
      border: 1px solid rgba(15,23,42,0.10);
      border-radius: 4px;
      outline: none;
      padding: 6px 8px;
      background: transparent;
      flex-shrink: 0;

    .sim-note-input::placeholder { color: rgba(15,23,42,0.22); }

    .sim-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sim-modal {
      width: 420px;
      max-height: 70vh;
      background: rgba(15,23,42,0.92);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 10px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      overflow: hidden;

    .sim-modal-header {
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 700;
      border-bottom: 1px solid rgba(255,255,255,0.08);

    /* ━━━ Image Page Module (A4 Landscape 842×595) ━━━ */
    #editor-canvas.landscape {
      --canvas-aspect: 842 / 595;
    }

    .image-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 20px 24px 16px;
      font-family: var(--font-ui);
      color: var(--text-on-white);
      overflow: hidden;
    }

    .image-page-title {
      font-size: 18px;
      font-weight: 700;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-on-white);
      width: 100%;
      padding: 6px 8px;
      margin-bottom: 12px;
      font-family: var(--font-ui);
      flex-shrink: 0;
    }

    .image-page-title::placeholder {
      color: rgba(15,23,42,0.28);
    }

    .image-page-title:hover {
      background: rgba(56,189,248,0.04);
    }

    .image-page-title:focus {
      background: rgba(56,189,248,0.06);
      border-radius: 4px;
    }

    .image-grid {
      flex: 1;
      display: grid;
      gap: 10px;
      min-height: 0;
    }

    .image-grid.layout-0 {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }

    .image-grid.layout-1 {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }

    .image-grid.layout-2 {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
    }

    .image-grid.layout-3,
    .image-grid.layout-4 {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }

    .image-cell {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
    }

    .image-drop-zone {
      flex: 1;
      border: 2px dashed rgba(15,23,42,0.15);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color var(--transition-fast), background var(--transition-fast);
      min-height: 0;
    }

    .image-drop-zone:hover {
      border-color: rgba(56,189,248,0.4);
      background: rgba(56,189,248,0.03);
    }

    .image-drop-zone.dragover {
      border-color: var(--color-primary);
      background: rgba(56,189,248,0.08);
    }

    .image-drop-zone.has-image {
      border: 1px solid rgba(15,23,42,0.08);
    }

    .image-drop-zone img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .image-drop-placeholder {
      text-align: center;
      color: rgba(15,23,42,0.25);
      font-size: 13px;
      pointer-events: none;
    }

    .image-drop-placeholder .plus-icon {
      font-size: 28px;
      display: block;
      margin-bottom: 4px;
      font-weight: 300;
      color: rgba(15,23,42,0.20);
    }

    .image-cell-actions {
      display: none;
      position: absolute;
      top: 6px;
      right: 6px;
      gap: 4px;
      z-index: 5;
    }

    .image-drop-zone.has-image:hover .image-cell-actions {
      display: flex;
    }

    .image-caption {
      font-size: 12px;
      color: rgba(15,23,42,0.55);
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      padding: 4px 6px;
      margin-top: 4px;
      font-family: var(--font-ui);
      border-bottom: 1px dashed rgba(15,23,42,0.12);
      flex-shrink: 0;
    }

    .image-caption::placeholder {
      color: rgba(15,23,42,0.25);
    }

    .image-caption:hover {
      background: rgba(56,189,248,0.03);
    }

    .image-caption:focus {
      background: rgba(56,189,248,0.05);
      border-bottom-color: var(--color-primary);
    }

    /* ━━━ Annotation Page Module ━━━ */
    .annotation-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      font-family: var(--font-ui);
      color: var(--text-on-white);
      overflow: hidden;
      position: relative;
    }


    .annotation-title {
      font-size: 16px;
      font-weight: 700;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-on-white);
      width: 100%;
      padding: 12px 16px 8px;
      font-family: var(--font-ui);
      flex-shrink: 0;
      z-index: 5;
    }

    .annotation-title::placeholder {
      color: rgba(15,23,42,0.28);
    }

    .annotation-title:hover {
      background: rgba(56,189,248,0.04);
    }

    .annotation-title:focus {
      background: rgba(56,189,248,0.06);
    }

    .annotation-workspace {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .annotation-photo-zone {
      width: 680px;
      height: 430px;
      border: 2px dashed rgba(15,23,42,0.15);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      transition: border-color var(--transition-fast), background var(--transition-fast);
    }

    .anno-photo-resize {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 20px;
      height: 20px;
      cursor: nwse-resize;
      z-index: 25;
      display: none;
    }
    .anno-photo-resize::after {
      content: '';
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 8px;
      height: 8px;
      border-right: 2px solid rgba(15,23,42,0.25);
      border-bottom: 2px solid rgba(15,23,42,0.25);
    }
    .annotation-photo-zone.has-photo .anno-photo-resize {
      display: block;
    }
    .annotation-photo-zone.has-photo:hover .anno-photo-resize::after {
      border-color: rgba(56,189,248,0.6);
    }

    .anno-replace-photo-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      z-index: 30;
      background: rgba(15,23,42,0.65);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: auto;
    }
    .annotation-photo-zone.has-photo:hover .anno-replace-photo-btn {
      opacity: 1;
    }
    .anno-replace-photo-btn:hover {
      background: rgba(15,23,42,0.85);
    }

    .annotation-photo-zone:hover {
      border-color: rgba(56,189,248,0.4);
      background: rgba(56,189,248,0.03);
    }

    .annotation-photo-zone.dragover {
      border-color: var(--color-primary);
      background: rgba(56,189,248,0.08);
    }

    .annotation-photo-zone.has-photo {
      border: 1px solid rgba(15,23,42,0.08);
      cursor: crosshair;
    }

    .annotation-photo-zone.has-photo:hover {
      background: transparent;
    }

    .annotation-photo-zone img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .annotation-photo-placeholder {
      text-align: center;
      color: rgba(15,23,42,0.25);
      font-size: 13px;
      pointer-events: none;
    }

    .annotation-photo-placeholder .icon {
      font-size: 32px;
      display: block;
      margin-bottom: 6px;
    }

    .annotation-svg-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .annotation-svg-overlay line {
      stroke: #dc2626;
      stroke-width: 1.5;
      pointer-events: none;
    }

    .marker-dot {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #dc2626;
      border: 2px solid #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      cursor: grab;
      z-index: 15;
      transform: translate(-50%, -50%);
      user-select: none;
    }

    .marker-dot:active {
      cursor: grabbing;
    }

    .marker-dot:hover {
      transform: translate(-50%, -50%) scale(1.15);
      box-shadow: 0 2px 8px rgba(220,38,38,0.4);
    }

    .marker-label-wrap {
      position: absolute;
      z-index: 20;
      display: flex;
      align-items: stretch;
    }

    .marker-label {
      width: 80px;
      min-width: 40px;
      padding: 4px 8px;
      background: #fff;
      border: 1.5px solid #333;
      border-radius: 4px 0 0 4px;
      font-size: 11px;
      font-family: var(--font-ui);
      color: var(--text-on-white);
      cursor: move;
      outline: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
      white-space: nowrap;
      box-sizing: border-box;
    }

    .marker-label:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px rgba(56,189,248,0.2);
    }

    .marker-label::placeholder {
      color: rgba(15,23,42,0.25);
    }

    .marker-resize-handle {
      width: 6px;
      cursor: ew-resize;
      background: rgba(15,23,42,0.08);
      border: 1.5px solid #333;
      border-left: none;
      border-radius: 0 4px 4px 0;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .marker-resize-handle:hover,
    .marker-resize-handle:active {
      background: rgba(56,189,248,0.25);
    }

    .annotation-drag-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 12;
    }

    .annotation-drag-line line {
      stroke: #dc2626;
      stroke-width: 1.5;
      stroke-dasharray: 4 3;
    }

    /* ━━━ Preview Overlay ━━━ */
    .preview-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: rgba(8,5,15,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .preview-overlay.open {
      display: flex;
    }

    .preview-close {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 24px;
      color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      z-index: 10001;
      line-height: 1;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      backdrop-filter: blur(12px);

      transition: all var(--transition-fast);
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);

    .preview-close:hover {
      color: #fff;
      background: rgba(244,114,182,0.2);
      border-color: rgba(244,114,182,0.3);
      box-shadow: 0 0 16px rgba(244,114,182,0.15);

    .preview-canvas-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      padding: 32px;
    }

    .preview-canvas-wrap > div {
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    .preview-footer {
      padding: 12px 0 20px;
      font-size: 14px;
      color: rgba(255,255,255,0.50);
      user-select: none;
    }

    .preview-nav-btn {
      position: absolute;
      bottom: 24px;
      z-index: 10002;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(18,10,32,0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: rgba(255,255,255,0.65);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
      user-select: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .preview-nav-btn:hover {
      background: linear-gradient(135deg, rgba(168,85,247,0.35), rgba(56,189,248,0.3));
      color: #fff;
      transform: scale(1.12);
      box-shadow: 0 0 24px rgba(168,85,247,0.2), 0 4px 20px rgba(0,0,0,0.35);
    }
    .preview-nav-btn:disabled {
      opacity: 0.2;
      cursor: default;
      pointer-events: none;
    }
    .preview-nav-btn.prev { left: 24px; }
    .preview-nav-btn.next { right: 24px; }

    /* ━━━ PDF Export helper ━━━ */
    .pdf-render-stage {
      position: fixed;
      left: -9999px;
      top: 0;
      z-index: -1;
      pointer-events: none;
    }

      z-index: 8000;

      flex-direction: column;

      color: var(--text-primary);
      overflow: hidden;

      content: '';

      left: 0;

      padding: 16px 20px;
