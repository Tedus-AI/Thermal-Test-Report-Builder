    function renderConclusionPage(page) {
      const d = page.data;
      if (!d.issues) d.issues = [''];
      if (!d.compliance) d.compliance = [];
      if (!d.actions) d.actions = [];

      // Build compliance rows
      let complianceRows = '';
      d.compliance.forEach((row, i) => {
        const verdictClass = row.verdict === 'pass' ? 'concl-verdict-pass'
          : row.verdict === 'warning' ? 'concl-verdict-warning'
          : row.verdict === 'fail' ? 'concl-verdict-fail' : '';
        complianceRows += `
          <tr>
            <td><input type="text" placeholder="元件名稱" value="${escapeAttr(row.component)}" data-comp-idx="${i}" data-comp-field="component"></td>
            <td><input type="text" placeholder="°C" value="${escapeAttr(row.tc_max)}" data-comp-idx="${i}" data-comp-field="tc_max"></td>
            <td><input type="text" placeholder="°C" value="${escapeAttr(row.spec)}" data-comp-idx="${i}" data-comp-field="spec"></td>
            <td class="${verdictClass}">
              <select data-comp-idx="${i}" data-comp-field="verdict">
                <option value="" ${!row.verdict ? 'selected' : ''}>—</option>
                <option value="pass" ${row.verdict === 'pass' ? 'selected' : ''}>✅ Pass</option>
                <option value="warning" ${row.verdict === 'warning' ? 'selected' : ''}>⚠️ Warning</option>
                <option value="fail" ${row.verdict === 'fail' ? 'selected' : ''}>❌ Fail</option>
              </select>
            </td>
          </tr>`;
      });

      // Build issues
      let issuesHtml = '';
      d.issues.forEach((issue, i) => {
        issuesHtml += `
          <li class="concl-issue-item">
            <span class="concl-issue-bullet">•</span>
            <input class="concl-issue-input" type="text" placeholder="輸入問題描述..."
                   value="${escapeAttr(issue)}" data-issue-idx="${i}">
          </li>`;
      });

      // Build actions rows
      let actionsRows = '';
      d.actions.forEach((act, i) => {
        actionsRows += `
          <tr>
            <td><input type="text" placeholder="行動描述" value="${escapeAttr(act.description)}" data-act-idx="${i}" data-act-field="description"></td>
            <td><input type="text" placeholder="Owner" value="${escapeAttr(act.owner)}" data-act-idx="${i}" data-act-field="owner"></td>
            <td><input type="date" value="${escapeAttr(act.due_date)}" data-act-idx="${i}" data-act-field="due_date"></td>
          </tr>`;
      });

      $canvas.innerHTML = `
        <div class="conclusion-page">
          <!-- 1. Summary -->
          <div class="concl-section">
            <div class="concl-section-title">Conclusion</div>
            <div class="concl-summary" contenteditable="true" data-placeholder="請輸入實驗結論..."
                 id="concl-summary-editor">${d.summary || ''}</div>
          </div>

          <!-- 2. Compliance Summary -->
          <div class="concl-section">
            <div class="concl-section-title">Compliance Summary</div>
            <table class="concl-table">
              <thead>
                <tr>
                  <th style="width:30%">Component</th>
                  <th style="width:20%">Max Tc (°C)</th>
                  <th style="width:20%">Derated Spec</th>
                  <th style="width:30%">Verdict</th>
                </tr>
              </thead>
              <tbody id="compliance-tbody">${complianceRows}</tbody>
            </table>
            <button class="concl-add-btn" id="add-compliance-btn">+ 新增元件</button>
          </div>

          <!-- 3. Issues Found -->
          <div class="concl-section">
            <div class="concl-section-title">Issues Found</div>
            <ul class="concl-issues-list" id="issues-list">${issuesHtml}</ul>
          </div>

          <!-- 4. Next Action -->
          <div class="concl-section">
            <div class="concl-section-title">Next Action</div>
            <table class="concl-actions-table">
              <thead>
                <tr>
                  <th style="width:50%">Action</th>
                  <th style="width:25%">Owner</th>
                  <th style="width:25%">Due Date</th>
                </tr>
              </thead>
              <tbody id="actions-tbody">${actionsRows}</tbody>
            </table>
            <button class="concl-add-btn" id="add-action-btn">+ 新增行動</button>
          </div>
        </div>
      `;

      bindConclusionHandlers(page);
    }

    function bindConclusionHandlers(page) {
      const d = page.data;
      const pageIdx = state.activePage;

      // Summary (contenteditable)
      const summaryEl = document.getElementById('concl-summary-editor');
      if (summaryEl) {
        summaryEl.addEventListener('input', () => {
          d.summary = summaryEl.innerHTML;
          scheduleSave(pageIdx);
        });
        // Ctrl+B for bold
        summaryEl.addEventListener('keydown', (e) => {
          if (e.ctrlKey && e.key === 'b') {
            e.preventDefault();
            document.execCommand('bold');
          }
        });
      }

      // Compliance table inputs
      $canvas.querySelectorAll('[data-comp-idx]').forEach(el => {
        const idx = parseInt(el.dataset.compIdx);
        const field = el.dataset.compField;
        const eventType = el.tagName === 'SELECT' ? 'change' : 'input';
        el.addEventListener(eventType, () => {
          if (d.compliance[idx]) {
            d.compliance[idx][field] = el.value;
            // Re-render to update verdict color
            if (field === 'verdict') {
              renderConclusionPage(page);
            }
            scheduleSave(pageIdx);
          }
        });
      });

      // Add compliance row
      document.getElementById('add-compliance-btn')?.addEventListener('click', () => {
        d.compliance.push({ component: '', tc_max: '', spec: '', verdict: '' });
        renderConclusionPage(page);
        scheduleSave(pageIdx);
        // Focus the last component input
        setTimeout(() => {
          const inputs = $canvas.querySelectorAll('[data-comp-field="component"]');
          inputs[inputs.length - 1]?.focus();
        }, 30);
      });

      // Issues inputs
      $canvas.querySelectorAll('[data-issue-idx]').forEach(el => {
        const idx = parseInt(el.dataset.issueIdx);

        el.addEventListener('input', () => {
          d.issues[idx] = el.value;
          scheduleSave(pageIdx);
        });

        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            // Insert new issue after current
            d.issues.splice(idx + 1, 0, '');
            renderConclusionPage(page);
            scheduleSave(pageIdx);
            setTimeout(() => {
              const inputs = $canvas.querySelectorAll('[data-issue-idx]');
              inputs[idx + 1]?.focus();
            }, 30);
          }
          if (e.key === 'Backspace' && el.value === '' && d.issues.length > 1) {
            e.preventDefault();
            d.issues.splice(idx, 1);
            renderConclusionPage(page);
            scheduleSave(pageIdx);
            setTimeout(() => {
              const inputs = $canvas.querySelectorAll('[data-issue-idx]');
              const focusIdx = Math.max(0, idx - 1);
              inputs[focusIdx]?.focus();
            }, 30);
          }
        });
      });

      // Actions table inputs
      $canvas.querySelectorAll('[data-act-idx]').forEach(el => {
        const idx = parseInt(el.dataset.actIdx);
        const field = el.dataset.actField;
        el.addEventListener('input', () => {
          if (d.actions[idx]) {
            d.actions[idx][field] = el.value;
            scheduleSave(pageIdx);
          }
        });
      });

      // Add action row
      document.getElementById('add-action-btn')?.addEventListener('click', () => {
        d.actions.push({ description: '', owner: '', due_date: '' });
        renderConclusionPage(page);
        scheduleSave(pageIdx);
        setTimeout(() => {
          const inputs = $canvas.querySelectorAll('[data-act-field="description"]');
          inputs[inputs.length - 1]?.focus();
        }, 30);
      });
    }

    // ━━━ Preview Mode ━━━
    let previewIdx = 0;

    function openPreview() {
      if (state.pages.length === 0) return;
      previewIdx = state.activePage !== null ? state.activePage : 0;
      renderPreviewPage();
      document.getElementById('preview-overlay').classList.add('open');
    }

    function closePreview() {
      document.getElementById('preview-overlay').classList.remove('open');
    }

    function renderPreviewPage() {
      const wrap = document.getElementById('preview-canvas-wrap');
      const footer = document.getElementById('preview-footer');
      const page = state.pages[previewIdx];
      if (!page) return;

      const isLandscape = page.type === 'image' || page.type === 'annotation';
      const w = isLandscape ? 842 : 595;
      const h = isLandscape ? 595 : 842;

      // Scale to fit viewport
      const vw = window.innerWidth - 64;
      const vh = window.innerHeight - 120;
      const scale = Math.min(vw / w, vh / h, 1);

      // Build static HTML into an isolated div (no live-canvas swapping)
      const el = document.createElement('div');
      el.style.cssText = `width:${w}px;height:${h}px;background:#fff;border-radius:4px;box-shadow:0 8px 40px rgba(0,0,0,0.5);overflow:hidden;transform:scale(${scale});transform-origin:center center;flex-shrink:0;font-family:${getComputedStyle(document.body).fontFamily};`;

      if (page.type === 'cover') el.innerHTML = buildCoverHTML(page.data);
      else if (page.type === 'image') el.innerHTML = buildImagePageHTML(page.data);
      else if (page.type === 'annotation') el.innerHTML = buildAnnotationHTML(page.data);
      else if (page.type === 'conclusion') el.innerHTML = buildConclusionHTML(page.data);

      wrap.innerHTML = '';
      wrap.appendChild(el);
      footer.textContent = `第 ${previewIdx + 1} 頁 / 共 ${state.pages.length} 頁`;
    }

    // Preview navigation
    document.addEventListener('keydown', (e) => {
      const overlay = document.getElementById('preview-overlay');
      if (!overlay.classList.contains('open')) return;

      if (e.key === 'Escape') {
        closePreview();
      } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        if (previewIdx < state.pages.length - 1) {
          previewIdx++;
          renderPreviewPage();
        }
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        if (previewIdx > 0) {
          previewIdx--;
          renderPreviewPage();
        }
      }
    });

    // ━━━ PDF Export ━━━

    // Offscreen renderer: builds static HTML for a page (no event bindings)
    // NOTE: html2canvas has a known bug with letter-spacing — all builders must avoid it
    const PDF_FONT = '-apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang TC", sans-serif';

    function renderPageOffscreen(page, container) {
      const isLandscape = page.type === 'image' || page.type === 'annotation';
      const w = isLandscape ? 842 : 595;
      const h = isLandscape ? 595 : 842;

      container.style.cssText = `position:fixed;left:-9999px;top:0;width:${w}px;height:${h}px;background:#fff;z-index:-1;overflow:hidden;font-family:${PDF_FONT};letter-spacing:normal;`;

      if (page.type === 'cover') {
        container.innerHTML = buildCoverHTML(page.data);
      } else if (page.type === 'image') {
        container.innerHTML = buildImagePageHTML(page.data);
      } else if (page.type === 'annotation') {
        container.innerHTML = buildAnnotationHTML(page.data);
      } else if (page.type === 'conclusion') {
        container.innerHTML = buildConclusionHTML(page.data);
      }
    }

    // ── Static HTML builders (pure layout, no inputs/events) ──

    function buildCoverHTML(d) {
      const hasImg = !!d.cover_image;
      return `<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:40px 48px 32px;color:rgba(15,23,42,0.90);overflow:hidden;font-family:${PDF_FONT};">
        <div style="font-size:14px;text-transform:uppercase;color:rgba(15,23,42,0.50);padding:6px 8px;margin-bottom:16px;text-align:center;width:100%;">${escHtml(d.dept)}</div>
        ${hasImg
          ? `<div style="width:380px;height:240px;margin-bottom:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:8px;">
               <img src="${escapeAttr(d.cover_image)}" style="max-width:100%;max-height:100%;object-fit:contain;">
             </div>`
          : `<div style="width:380px;height:240px;margin-bottom:24px;flex-shrink:0;"></div>`}
        <div style="font-size:26px;font-weight:700;text-align:center;padding:8px;margin-bottom:4px;width:100%;">${escHtml(d.project_name)}</div>
        <div style="font-size:17px;font-weight:500;text-align:center;color:rgba(15,23,42,0.65);padding:6px 8px;margin-bottom:24px;width:100%;">${escHtml(d.model)}</div>
        <div style="display:grid;grid-template-columns:auto 1fr;gap:8px 16px;align-items:center;width:100%;max-width:380px;margin-top:auto;padding-top:16px;">
          <span style="font-size:12px;font-weight:600;text-transform:uppercase;color:rgba(15,23,42,0.45);text-align:right;">Stage</span>
          <span style="font-size:14px;padding:4px 8px;">${escHtml(d.stage)}</span>
          <span style="font-size:12px;font-weight:600;text-transform:uppercase;color:rgba(15,23,42,0.45);text-align:right;">Version</span>
          <span style="font-size:14px;padding:4px 8px;">${escHtml(d.report_version)}</span>
          <span style="font-size:12px;font-weight:600;text-transform:uppercase;color:rgba(15,23,42,0.45);text-align:right;">Date</span>
          <span style="font-size:14px;padding:4px 8px;">${escHtml(d.date)}</span>
          <span style="font-size:12px;font-weight:600;text-transform:uppercase;color:rgba(15,23,42,0.45);text-align:right;">Tested By</span>
          <span style="font-size:14px;padding:4px 8px;">${escHtml(d.tested_by)}</span>
        </div>
      </div>`;
    }

    function buildImagePageHTML(d) {
      const imgs = d.images || [];
      const count = imgs.length;
      // Grid CSS
      let gridStyle = 'flex:1;display:grid;gap:10px;min-height:0;';
      if (count <= 1) gridStyle += 'grid-template-columns:1fr;grid-template-rows:1fr;';
      else if (count === 2) gridStyle += 'grid-template-columns:1fr 1fr;grid-template-rows:1fr;';
      else gridStyle += 'grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;';

      let cells = '';
      for (let i = 0; i < count; i++) {
        const img = imgs[i];
        const src = img && img.url_or_base64;
        cells += `<div style="display:flex;flex-direction:column;min-height:0;min-width:0;">
          <div style="flex:1;border:${src ? '1px solid rgba(15,23,42,0.08)' : '2px dashed rgba(15,23,42,0.15)'};border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0;">
            ${src ? `<img src="${escapeAttr(src)}" style="width:100%;height:100%;object-fit:contain;">` : ''}
          </div>
          ${src && img.caption ? `<div style="font-size:12px;color:rgba(15,23,42,0.55);padding:4px 6px;margin-top:4px;border-bottom:1px dashed rgba(15,23,42,0.12);">${escHtml(img.caption)}</div>` : ''}
        </div>`;
      }
      if (count === 0) {
        cells = '<div style="display:flex;align-items:center;justify-content:center;flex:1;"></div>';
      }

      return `<div style="width:100%;height:100%;display:flex;flex-direction:column;padding:20px 24px 16px;overflow:hidden;color:rgba(15,23,42,0.90);">
        <div style="font-size:18px;font-weight:700;padding:6px 8px;margin-bottom:12px;">${escHtml(d.title)}</div>
        <div style="${gridStyle}">${cells}</div>
      </div>`;
    }

    function buildAnnotationHTML(d) {
      const hasPhoto = !!d.photo_url_or_base64;
      const markers = d.markers || [];
      // Workspace: 842 × ~555 (full height minus title ~40px)
      const wsW = 842, wsH = 555;
      const pzL = 80, pzT = 60, pzW = wsW - 160, pzH = wsH - 120;

      let dots = '', svgLines = '';
      markers.forEach((m, idx) => {
        const dx = pzL + (m.x / 100) * pzW;
        const dy = pzT + (m.y / 100) * pzH;
        dots += `<div style="position:absolute;left:${dx}px;top:${dy}px;width:22px;height:22px;border-radius:50%;background:#dc2626;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;transform:translate(-50%,-50%);z-index:15;">${idx + 1}</div>`;
        if (m.label_x >= 0 && m.label_y >= 0) {
          const lx = (m.label_x / 100) * wsW;
          const ly = (m.label_y / 100) * wsH;
          dots += `<div style="position:absolute;left:${lx}px;top:${ly}px;min-width:80px;padding:4px 8px;background:#fff;border:1.5px solid #333;border-radius:4px;font-size:11px;color:rgba(15,23,42,0.90);z-index:20;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.12);">${escHtml(m.label || 'TC' + (idx + 1))}</div>`;
          svgLines += `<line x1="${dx}" y1="${dy}" x2="${lx + 40}" y2="${ly + 10}" stroke="#dc2626" stroke-width="1.5"/>`;
        }
      });

      return `<div style="width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;position:relative;color:rgba(15,23,42,0.90);">
        <div style="font-size:16px;font-weight:700;padding:12px 16px 8px;flex-shrink:0;">${escHtml(d.title)}</div>
        <div style="flex:1;position:relative;overflow:hidden;">
          ${hasPhoto ? `<div style="position:absolute;top:${pzT}px;left:${pzL}px;width:${pzW}px;height:${pzH}px;border:1px solid rgba(15,23,42,0.08);border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;">
            <img src="${escapeAttr(d.photo_url_or_base64)}" style="width:100%;height:100%;object-fit:contain;">
          </div>` : ''}
          <svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;">${svgLines}</svg>
          ${dots}
        </div>
      </div>`;
    }

    function buildConclusionHTML(d) {
      const comp = d.compliance || [];
      const issues = (d.issues || []).filter(s => s);
      const acts = d.actions || [];

      const thStyle = 'text-align:left;font-size:11px;font-weight:600;color:rgba(15,23,42,0.45);padding:6px 8px;border-bottom:2px solid rgba(15,23,42,0.10);';
      const tdStyle = 'padding:5px 8px;border-bottom:1px solid rgba(15,23,42,0.06);font-size:12px;';

      let compRows = comp.map(r => {
        let bg = '';
        let vLabel = '—';
        if (r.verdict === 'pass')    { bg = 'background:rgba(34,197,94,0.12);color:#166534;'; vLabel = '✅ Pass'; }
        if (r.verdict === 'warning') { bg = 'background:rgba(250,204,21,0.18);color:#854d0e;'; vLabel = '⚠️ Warning'; }
        if (r.verdict === 'fail')    { bg = 'background:rgba(239,68,68,0.12);color:#991b1b;'; vLabel = '❌ Fail'; }
        return `<tr><td style="${tdStyle}">${escHtml(r.component)}</td><td style="${tdStyle}">${escHtml(r.tc_max)}</td><td style="${tdStyle}">${escHtml(r.spec)}</td><td style="${tdStyle}${bg}">${vLabel}</td></tr>`;
      }).join('');

      let issuesHtml = issues.map(s => `<li style="margin-bottom:4px;font-size:13px;line-height:1.7;">• ${escHtml(s)}</li>`).join('');

      let actRows = acts.map(a => `<tr><td style="${tdStyle}">${escHtml(a.description)}</td><td style="${tdStyle}">${escHtml(a.owner)}</td><td style="${tdStyle}">${escHtml(a.due_date)}</td></tr>`).join('');

      const secTitle = 'font-size:11px;font-weight:700;text-transform:uppercase;color:rgba(15,23,42,0.38);margin-bottom:8px;';

      return `<div style="width:100%;height:100%;display:flex;flex-direction:column;padding:32px 40px 24px;gap:20px;color:rgba(15,23,42,0.90);overflow-y:auto;">
        <div>
          <div style="${secTitle}">Conclusion</div>
          <div style="min-height:60px;padding:10px 12px;border:1px solid rgba(15,23,42,0.10);border-radius:6px;font-size:13px;line-height:1.7;">${d.summary || ''}</div>
        </div>
        ${comp.length > 0 ? `<div>
          <div style="${secTitle}">Compliance Summary</div>
          <table style="width:100%;border-collapse:collapse;font-size:12px;"><thead><tr>
            <th style="${thStyle}">Component</th><th style="${thStyle}">Max Tc</th><th style="${thStyle}">Spec</th><th style="${thStyle}">Verdict</th>
          </tr></thead><tbody>${compRows}</tbody></table>
        </div>` : ''}
        ${issues.length > 0 ? `<div>
          <div style="${secTitle}">Issues Found</div>
          <ul style="list-style:none;padding:0;">${issuesHtml}</ul>
        </div>` : ''}
        ${acts.length > 0 ? `<div>
          <div style="${secTitle}">Next Action</div>
          <table style="width:100%;border-collapse:collapse;font-size:12px;"><thead><tr>
            <th style="${thStyle}">Action</th><th style="${thStyle}">Owner</th><th style="${thStyle}">Due Date</th>
          </tr></thead><tbody>${actRows}</tbody></table>
        </div>` : ''}
      </div>`;
    }

    function escHtml(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function exportPDF() {
      if (state.pages.length === 0) return;
      if (typeof html2canvas === 'undefined' || typeof jspdf === 'undefined') {
        alert('PDF 匯出函式庫載入中，請稍後再試');
        return;
      }

      setStatus('saving', '匯出中...');
      const { jsPDF } = jspdf;

      // Build filename from cover page
      let filename = 'ThermalReport';
      const coverPage = state.pages.find(p => p.type === 'cover');
      if (coverPage && coverPage.data) {
        const d = coverPage.data;
        const parts = [];
        if (d.project_name) parts.push(d.project_name.replace(/[^a-zA-Z0-9\u4e00-\u9fff_-]/g, '_'));
        if (d.stage) parts.push(d.stage);
        if (d.date) parts.push(d.date);
        parts.push('ThermalReport');
        filename = parts.join('_');
      } else {
        filename += '_' + new Date().toISOString().slice(0, 10);
      }

      let pdf = null;

      try {
        for (let i = 0; i < state.pages.length; i++) {
          const page = state.pages[i];
const isLandscape = page.type === 'image' || page.type === 'annotation';
          const w = isLandscape ? 842 : 595;
          const h = isLandscape ? 595 : 842;

          // Create offscreen container — completely isolated from the UI
          const offscreen = document.createElement('div');
          document.body.appendChild(offscreen);
          renderPageOffscreen(page, offscreen);

          // Wait for all images to load before capturing
          const imgs = offscreen.querySelectorAll('img');
          if (imgs.length > 0) {
            await Promise.all(Array.from(imgs).map(img =>
              img.complete ? Promise.resolve() : new Promise(r => { img.onload = r; img.onerror = r; })
            ));
          }
          // Extra frame for layout settle
          await new Promise(r => setTimeout(r, 100));

          // Capture
          const canvasImg = await html2canvas(offscreen, {
            scale: 2,
            useCORS: true,
            backgroundColor: '#ffffff',
            width: w,
            height: h,
            logging: false,
          });

          document.body.removeChild(offscreen);

          const orientation = isLandscape ? 'landscape' : 'portrait';
          const pdfW = isLandscape ? 297 : 210;
          const pdfH = isLandscape ? 210 : 297;

          if (i === 0) {
            pdf = new jsPDF({ orientation, unit: 'mm', format: 'a4' });
          } else {
            pdf.addPage('a4', orientation);
          }

          const imgData = canvasImg.toDataURL('image/jpeg', 0.92);
          pdf.addImage(imgData, 'JPEG', 0, 0, pdfW, pdfH);
        }

        pdf.save(filename + '.pdf');
        setStatus('saved', '已儲存 ✅');
        console.log('✅ PDF exported:', filename + '.pdf');
      } catch (err) {
        console.error('PDF export error:', err);
        setStatus('saved', '匯出失敗');
        alert('PDF 匯出失敗：' + err.message);
      }
    }

    // ━━━ Utility ━━━
    function escapeAttr(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ━━━ Init ━━━
    async function init() {
      state.reportId = getOrCreateReportId();
      console.log('📋 Report ID:', state.reportId);

      // Setup dropdowns
      setupDropdown('toolbar-add-btn', 'toolbar-add-menu');
      setupDropdown('sidebar-add-btn', 'sidebar-add-menu');

      // Preview & PDF buttons
      document.getElementById('btn-preview').addEventListener('click', openPreview);
      document.getElementById('preview-close').addEventListener('click', closePreview);
      document.getElementById('btn-export-pdf').addEventListener('click', exportPDF);

      // Setup SortableJS
      if (typeof Sortable !== 'undefined') {
        Sortable.create($pageList, {
          animation: 150,
          ghostClass: 'sortable-ghost',
          onEnd: (evt) => {
            const moved = state.pages.splice(evt.oldIndex, 1)[0];
            state.pages.splice(evt.newIndex, 0, moved);
            state.pages.forEach((p, i) => p.order = i);
            if (state.activePage === evt.oldIndex) {
              state.activePage = evt.newIndex;
            } else if (state.activePage > evt.oldIndex && state.activePage <= evt.newIndex) {
              state.activePage--;
            } else if (state.activePage < evt.oldIndex && state.activePage >= evt.newIndex) {
              state.activePage++;
            }
            renderPageList();
            // Save all reordered pages
            state.pages.forEach((_, i) => scheduleSave(i));
          }
        });
        console.log('✅ SortableJS initialized on #page-list');
      }

      // Try to load existing pages from Firestore (scan up to 20 slots)
      await waitForFirebase();
      try {
        for (let i = 0; i < 20; i++) {
          const existingData = await loadPageFromFirestore(i);
          if (!existingData) break;
          state.pages.push({
            id: 'page_loaded_' + i,
            type: existingData.type,
            order: existingData.order ?? i,
            data: existingData.data,
          });
        }
        if (state.pages.length > 0) {
          renderPageList();
          selectPage(0);
          setStatus('saved', '已儲存 ✅');
          console.log('✅ Loaded', state.pages.length, 'page(s) from Firestore');
        }
      } catch (err) {
        console.warn('Could not load existing data:', err);
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
