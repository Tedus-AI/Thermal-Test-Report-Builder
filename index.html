  <!-- Google Fonts: Space Grotesk + DM Sans + JetBrains Mono -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- SortableJS CDN -->

  <!-- html2canvas + jsPDF CDN -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>

  <style>
    /* ━━━ CSS Design System: Delta Blue Futuristic ━━━ */
    :root {
      /* Delta Blue Ramp */
      --d-900: #021B3A;
      --d-800: #042952;
      --d-700: #0B3D7A;
      --d-600: #1A4E96;
      --d-500: #2357A7;
      --d-400: #3A7AD4;
      --d-300: #5BA3E6;
      --d-200: #8DC4F0;
      --d-100: #C2DFF8;
      --d-50:  #E8F0FA;

      /* Semantic Colors */
      --color-pass:    #27AE60;
      --color-fail:    #E74C3C;
      --color-warn:    #F39C12;
      --color-neutral: #8E8E93;
      --color-bg:      #F7F9FC;
      --color-bg2:     #EDF2F8;

      /* Progression Bar */
      --progression-bar: linear-gradient(90deg, #0B3D7A, #2357A7, #3A7AD4, #5BA3E6, #6EC5A0, #4CAF79);

      /* Mapped aliases (for legacy compatibility) */
      --color-primary: var(--d-400);
      --color-primary-glass: rgba(58,122,212,0.12);
      --color-primary-glow: rgba(58,122,212,0.25);
      --color-success: var(--color-pass);
      --color-warning: var(--color-warn);
      --color-danger: var(--color-fail);

      --text-primary: #ffffff;
      --text-secondary: var(--d-200);
      --text-placeholder: rgba(141,196,240,0.4);
      --text-on-white: #1a2a3a;

      --font-heading: 'Space Grotesk', 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      --font-ui: 'DM Sans', 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      --font-mono: 'JetBrains Mono', 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', monospace;
      --font-data: 'JetBrains Mono', 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', monospace;

      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;

      --transition-fast: 0.15s ease;
      --transition-base: 0.25s ease;
      --transition-slow: 0.35s ease;

      /* Legacy compat aliases (mapped to Delta Blue) */
      --bg-gradient: var(--d-900);
      --bg-glow-1: radial-gradient(ellipse 600px 400px at 20% 30%, rgba(11,61,122,0.25), transparent);
      --bg-glow-2: radial-gradient(ellipse 500px 350px at 75% 60%, rgba(35,87,167,0.15), transparent);
      --bg-glow-3: radial-gradient(ellipse 400px 300px at 50% 80%, rgba(58,122,212,0.10), transparent);
      --bg-glow-4: radial-gradient(ellipse 300px 250px at 80% 20%, rgba(91,163,230,0.08), transparent);
      --glass-blur: 16px;
      --glass-blur-heavy: 24px;
      --glass-shadow-lg: 0 8px 32px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2);
      --radius-sm: 0px;
      --radius-md: 0px;
      --radius-lg: 0px;
      --radius-xl: 0px;
      --radius-full: 0px;
    }

    /* ━━━ Reset & Base ━━━ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font-ui);
      color: var(--text-primary);
      background: var(--d-900);
    }

    body {
      background: var(--d-900);
      position: relative;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before { background: var(--bg-glow-1), var(--bg-glow-3); opacity: 0.6; }
    body::after { background: var(--bg-glow-2), var(--bg-glow-4); opacity: 0.6; }

    /* ━━━ Layout ━━━ */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ━━━ Toolbar ━━━ */
    .toolbar {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: var(--d-900);
      background-image: linear-gradient(180deg, rgba(11,61,122,0.4) 0%, transparent 100%);
      border-bottom: 1px solid rgba(91,163,230,0.15);
      flex-shrink: 0;
      z-index: 100;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }
    .toolbar-logo { height: 28px; width: auto; object-fit: contain; }
    .toolbar-divider { width: 1px; height: 24px; background: rgba(91,163,230,0.2); }
    .toolbar-brand { display: flex; flex-direction: column; gap: 1px; }
    .toolbar-brand-name {
      font-family: var(--font-heading);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #ffffff;
    }
    .toolbar-brand-sub {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--d-300);
      letter-spacing: 0.06em;
    }

    .toolbar-center {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--d-200);
    }

    /* Angle-cut button (replaces glass-btn) */
    .glass-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      font-size: 11px;
      font-family: var(--font-heading);
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #ffffff;
      background: rgba(91,163,230,0.12);
      border: 1px solid rgba(91,163,230,0.3);
      clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
      cursor: pointer;
      transition: all var(--transition-fast);
      white-space: nowrap;
      position: relative;
      border-radius: 0;
    }

    .glass-btn:hover {
      background: rgba(91,163,230,0.22);
    }

    .glass-btn:active {
      transform: scale(0.97);
    }

    .glass-btn.btn-accent {
      background: var(--d-300);
      border-color: var(--d-300);
      font-weight: 600;
    }
    .glass-btn.btn-accent:hover {
      background: var(--d-200);
      color: var(--d-800);
    }

    /* ━━━ Dropdown Menu ━━━ */
    .dropdown-wrap { position: relative; }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 180px;
      background: rgba(2,27,58,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(91,163,230,0.15);
      border-top: 1px solid rgba(91,163,230,0.25);
      clip-path: polygon(0 0, 100% 0, calc(100% - 4px) 100%, 4px 100%);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px rgba(35,87,167,0.08);
      padding: var(--space-1) 0;
      z-index: 200;
    }

    .dropdown-menu.open { display: block; }

    .dropdown-item {
      display: block;
      width: 100%;
      padding: var(--space-2) var(--space-4);
      font-size: 13px;
      font-family: var(--font-ui);
      color: var(--text-primary);
      background: transparent;
      border: none;
      text-align: left;
      cursor: pointer;
      transition: background var(--transition-fast);
    }

    .dropdown-item:hover {
      background: rgba(91,163,230,0.12);
    }

    /* ━━━ Context Menu ━━━ */
    .context-menu {
      display: none;
      position: fixed;
      min-width: 140px;
      background: rgba(2,27,58,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(91,163,230,0.15);
      border-top: 1px solid rgba(91,163,230,0.25);
      clip-path: polygon(0 0, 100% 0, calc(100% - 4px) 100%, 4px 100%);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      padding: var(--space-1) 0;
      z-index: 300;
    }

    .context-menu.open { display: block; }

    .context-item {
      display: block;
      width: 100%;
      padding: var(--space-2) var(--space-4);
      font-size: 13px;
      font-family: var(--font-ui);
      color: var(--d-200);
      background: transparent;
      border: none;
      text-align: left;
      cursor: pointer;
      transition: background var(--transition-fast);
    }

    .context-item:hover {
      background: rgba(91,163,230,0.12);
    }

    /* ━━━ Body ━━━ */
    .body {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ━━━ Sidebar ━━━ */
    .sidebar {
      width: 152px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: rgba(4,41,82,0.3);
      border-right: 1px solid rgba(91,163,230,0.1);
      z-index: 50;
      padding: 10px 0;
    }

    .sidebar-header {
      padding: 8px 12px 6px;
      font-size: 9px;
      font-family: var(--font-mono);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--d-400);
    }

    #page-list {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .page-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      font-size: 11px;
      font-family: var(--font-ui);
      color: var(--d-200);
      background: transparent;
      border: none;
      border-left: 2px solid transparent;
      cursor: pointer;
      transition: all var(--transition-fast);
      user-select: none;
    }

    .page-item:hover {
      background: rgba(91,163,230,0.06);
    }

    .page-item.active {
      background: rgba(35,87,167,0.15);
      color: #ffffff;
      border-left-color: var(--d-300);
      font-weight: 500;
    }

    .page-item.sortable-ghost {
      opacity: 0.4;
    }

    .sidebar-footer {
      padding: 8px 12px;
      border-top: 1px solid rgba(91,163,230,0.1);
    }

    .sidebar-add-btn {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      width: 100%;
      padding: 6px 10px;
      font-size: 11px;
      font-family: var(--font-heading);
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--d-300);
      background: rgba(91,163,230,0.08);
      border: 1px solid rgba(91,163,230,0.15);
      clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
      cursor: pointer;
      transition: background var(--transition-fast);
      position: relative;
    }

    .sidebar-add-btn:hover {
      background: rgba(91,163,230,0.18);
      color: #ffffff;
    }

    /* Sidebar bottom dropdown opens upward */
    .sidebar-footer .dropdown-menu {
      top: auto;
      bottom: calc(100% + 4px);
      left: 0;
    }

    /* ━━━ Editor Area ━━━ */
    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 16px 20px;
      position: relative;
      /* Blueprint grid background */
      background-image:
        repeating-linear-gradient(0deg,
          rgba(35,87,167,0.08) 0, rgba(35,87,167,0.08) 1px,
          transparent 1px, transparent 40px),
        repeating-linear-gradient(90deg,
          rgba(35,87,167,0.08) 0, rgba(35,87,167,0.08) 1px,
          transparent 1px, transparent 40px);
      background-size: 40px 40px;
    }

    /* Center guideline */
    .editor-area::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      width: 1px; height: 100%;
      background: rgba(91,163,230,0.08);
      pointer-events: none;
      z-index: 0;
    }

    /* Canvas tag label */
    .canvas-tag {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--d-400);
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 1;
    }
    .canvas-tag::before,
    .canvas-tag::after {
      content: '';
      width: 40px;
      height: 1px;
      background: rgba(91,163,230,0.15);
    }

    #editor-canvas {
      /* Default portrait A4 aspect ratio 595:842 */
      --canvas-aspect: 595 / 842;
      aspect-ratio: var(--canvas-aspect);
      max-width: calc(100% - 80px);  /* leave room for nav buttons */
      max-height: 100%;
      /* Fill as much space as possible while keeping ratio */
      width: auto;
      height: 100%;
      background: #ffffff;
      box-shadow:
        0 8px 40px rgba(0,0,0,0.45),
        0 2px 8px rgba(0,0,0,0.3),
        0 0 0 1px rgba(91,163,230,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 1;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    /* Scrollable data page editor — content grows beyond A4, scrollbar appears */
    #editor-canvas.scrollable-edit {
      overflow-y: auto;
      overflow-x: hidden;
      align-items: flex-start;
    }
    .scrollable-edit .report-page-wrap {
      height: auto;
      min-height: 100%;
    }
    .scrollable-edit .data-page {
      height: auto;
      min-height: 100%;
      overflow-y: visible;
    }
    .scrollable-edit .data-table-wrap {
      flex: none;
      overflow: visible;
    }

    /* Page navigation buttons */
    .page-nav-btn {
      position: absolute;
      bottom: 20px;
      z-index: 60;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(91,163,230,0.25);
      background: rgba(2,27,58,0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
      color: rgba(255,255,255,0.7);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
      user-select: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .page-nav-btn:hover {
      background: rgba(35,87,167,0.6);
      transform: scale(1.1);
      color: #fff;
      box-shadow: 0 0 20px rgba(35,87,167,0.3), 0 4px 16px rgba(0,0,0,0.3);
    }
    .page-nav-btn:disabled {
      opacity: 0.25;
      cursor: default;
      pointer-events: none;
    }
    .page-nav-btn.prev { left: 20px; }
    .page-nav-btn.next { right: 20px; }

    .canvas-placeholder {
      font-size: 15px;
      color: var(--text-on-white);
      opacity: 0.4;
      user-select: none;
    }

    /* ━━━ Status dot ━━━ */
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: var(--radius-full);
      background: var(--color-success);
      margin-right: var(--space-2);
      transition: background var(--transition-fast);
    }

    .status-dot.saving { background: var(--color-warning); }
    .status-dot.offline { background: var(--color-warning); }

    /* ━━━ Cover Page Module ━━━ */
    .cover-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4.7% 5.7% 3.8%;
      padding-top: calc(4.7% + 10px); /* room for progression bar */
      font-family: var(--font-ui);
      color: var(--text-on-white);
      overflow: hidden;
      box-sizing: border-box;
      position: relative;
    }

    /* Progression bar top */
    .cover-page::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 10px;
      background: linear-gradient(90deg, #0B3D7A, #2357A7, #3A7AD4, #5BA3E6, #6EC5A0, #4CAF79);
      z-index: 2;
    }
    /* Progression bar bottom */
    .cover-page::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 10px;
      background: linear-gradient(90deg, #0B3D7A, #2357A7, #3A7AD4, #5BA3E6, #6EC5A0, #4CAF79);
      z-index: 2;
    }

    /* Corner brackets */
    .cover-corner-tl, .cover-corner-tr, .cover-corner-bl, .cover-corner-br {
      position: absolute;
      width: 32px;
      height: 32px;
      pointer-events: none;
      z-index: 1;
    }
    .cover-corner-tl { top: 12px; left: 12px; border-top: 1.5px solid var(--d-200); border-left: 1.5px solid var(--d-200); }
    .cover-corner-tr { top: 12px; right: 12px; border-top: 1.5px solid var(--d-200); border-right: 1.5px solid var(--d-200); }
    .cover-corner-bl { bottom: 12px; left: 12px; border-bottom: 1.5px solid var(--d-200); border-left: 1.5px solid var(--d-200); }
    .cover-corner-br { bottom: 12px; right: 12px; border-bottom: 1.5px solid var(--d-200); border-right: 1.5px solid var(--d-200); }

    .cover-page input,
    .cover-page select {
      font-family: var(--font-ui);
      color: var(--text-on-white);
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      text-align: center;
    }

    .cover-page input::placeholder {
      color: rgba(15,23,42,0.30);
    }

    .cover-page input:hover,
    .cover-page select:hover {
      background: rgba(35,87,167,0.04);
    }

    .cover-page input:focus,
    .cover-page select:focus {
      background: rgba(35,87,167,0.06);
    }

    .cover-type-label {
      font-family: var(--font-mono);
      font-size: clamp(7px, 1.2vmin, 9px);
      letter-spacing: 0.18em;
      color: var(--d-400);
      align-self: flex-start;
      margin-bottom: 1%;
    }

    .cover-dept {
      font-size: clamp(11px, 1.6vmin, 14px);
      font-family: var(--font-ui);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1A4E96;
      padding: 6px 8px;
      margin-bottom: 1.9%;
    }

    .cover-photo-zone {
      width: 77%;
      max-width: 460px;
      aspect-ratio: 460 / 300;
      border: 1px solid var(--d-100);
      background: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 2.8%;
      position: relative;
      overflow: hidden;
      transition: border-color var(--transition-fast), background var(--transition-fast);
      flex-shrink: 1;
      min-height: 0;
    }

    /* Blueprint grid inside photo zone */
    .cover-photo-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg,
          rgba(35,87,167,0.03) 0, rgba(35,87,167,0.03) 1px,
          transparent 1px, transparent 20px),
        repeating-linear-gradient(90deg,
          rgba(35,87,167,0.03) 0, rgba(35,87,167,0.03) 1px,
          transparent 1px, transparent 20px);
      pointer-events: none;
      z-index: 0;
    }

    .cover-photo-resize {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 20px;
      height: 20px;
      cursor: nwse-resize;
      z-index: 6;
      display: none;
    }
    .cover-photo-resize::after {
      content: '';
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 8px;
      height: 8px;
      border-right: 2px solid rgba(15,23,42,0.25);
      border-bottom: 2px solid rgba(15,23,42,0.25);
    }
    .cover-photo-zone.has-image .cover-photo-resize {
      display: block;
    }
    .cover-photo-zone.has-image:hover .cover-photo-resize::after {
      border-color: rgba(56,189,248,0.6);
    }

    .cover-photo-zone:hover {
      border-color: var(--d-300);
      background: rgba(35,87,167,0.03);
    }

    .cover-photo-zone.dragover {
      border-color: var(--d-400);
      background: rgba(35,87,167,0.06);
    }

    .cover-photo-zone.has-image {
      border: 1px solid rgba(15,23,42,0.08);
      background: transparent;
    }
    .cover-photo-zone.has-image::before {
      display: none;
    }

    .cover-photo-placeholder {
      text-align: center;
      color: rgba(15,23,42,0.30);
      font-size: 13px;
      pointer-events: none;
    }
    .cover-photo-placeholder .img-browse-btn {
      pointer-events: auto;
    }

    .cover-photo-placeholder .icon {
      font-size: 32px;
      display: block;
      margin-bottom: 8px;
    }

    .cover-photo-zone img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .cover-photo-actions {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
      gap: 4px;
    }

    .cover-photo-zone.has-image:hover .cover-photo-actions {
      display: flex;
    }

    .photo-action-btn {
      padding: 4px 10px;
      font-size: 11px;
      font-family: var(--font-ui);
      color: #fff;
      background: rgba(0,0,0,0.55);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background var(--transition-fast);
    }

    .photo-action-btn:hover {
      background: rgba(0,0,0,0.75);
    }

    .photo-action-btn.danger:hover {
      background: rgba(239,68,68,0.8);
    }

    .cover-divider {
      width: 48px;
      height: 2px;
      background: var(--d-400);
      margin: 4px auto 8px;
    }

    .cover-project-name {
      font-family: var(--font-heading);
      font-size: clamp(18px, 3vmin, 26px);
      font-weight: 700;
      padding: 8px;
      margin-bottom: 4px;
      letter-spacing: -0.01em;
      color: var(--d-700);
    }

    .cover-model {
      font-size: clamp(13px, 2vmin, 17px);
      font-weight: 500;
      padding: 6px 8px;
      margin-bottom: 2.8%;
      color: rgba(15,23,42,0.65);
    }

    .cover-meta-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: clamp(4px, 1vmin, 8px) 16px;
      align-items: center;
      width: 100%;
      max-width: 380px;
      margin-top: auto;
      padding-top: 1.9%;
    }

    .cover-meta-label {
      font-family: var(--font-mono);
      font-size: clamp(10px, 1.4vmin, 12px);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--d-500);
      text-align: right;
      white-space: nowrap;
    }

    .cover-meta-grid input,
    .cover-meta-grid select {
      text-align: left;
      font-size: clamp(11px, 1.6vmin, 14px);
      padding: 4px 8px;
      border-radius: 4px;
    }

    .cover-meta-grid select {
      cursor: pointer;
      appearance: auto;
    }

    /* ━━━ Shared Report Page Elements (Editor) ━━━ */
    .report-page-wrap {
      width: 100%; height: 100%; position: relative;
    }
    .report-page-wrap > .prog-bar-top {
      position: absolute; top: 0; left: 0; right: 0; height: 10px; z-index: 2;
      background: linear-gradient(90deg, #0B3D7A, #2357A7, #3A7AD4, #5BA3E6, #6EC5A0, #4CAF79);
    }
    .report-page-wrap > .prog-bar-bot {
      position: absolute; bottom: 0; left: 0; right: 0; height: 10px; z-index: 2;
      background: linear-gradient(90deg, #0B3D7A, #2357A7, #3A7AD4, #5BA3E6, #6EC5A0, #4CAF79);
    }
    .report-page-wrap > .corner { position: absolute; width: 32px; height: 32px; pointer-events: none; z-index: 1; }
    .report-page-wrap > .corner.tl { top: 14px; left: 14px; border-top: 1.5px solid var(--d-200); border-left: 1.5px solid var(--d-200); }
    .report-page-wrap > .corner.tr { top: 14px; right: 14px; border-top: 1.5px solid var(--d-200); border-right: 1.5px solid var(--d-200); }
    .report-page-wrap > .corner.bl { bottom: 14px; left: 14px; border-bottom: 1.5px solid var(--d-200); border-left: 1.5px solid var(--d-200); }
    .report-page-wrap > .corner.br { bottom: 14px; right: 14px; border-bottom: 1.5px solid var(--d-200); border-right: 1.5px solid var(--d-200); }
    .report-page-wrap > .page-footer {
      position: absolute; bottom: 14px; left: 0; right: 0;
      display: flex; justify-content: space-between; padding: 0 18px;
      font-family: var(--font-mono); font-size: 8px; color: rgba(15,23,42,0.35); letter-spacing: 0.04em;
      pointer-events: none; z-index: 1;
    }

    /* ━━━ Conclusion Page Module ━━━ */
    .conclusion-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 3.8% 4.7% 2.8%;
      font-family: var(--font-ui);
      color: var(--text-on-white);
      overflow-y: auto;
      gap: 2.4%;
    }

    .concl-section {
      flex-shrink: 0;
    }

    .concl-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(15,23,42,0.38);
      margin-bottom: 8px;
    }

    /* Summary rich text */
    .concl-summary {
      min-height: 72px;
      padding: 10px 12px;
      border: 1px solid rgba(15,23,42,0.10);
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-on-white);
      outline: none;
      transition: border-color var(--transition-fast);
    }

    .concl-summary:empty::before {
      content: attr(data-placeholder);
      color: rgba(15,23,42,0.25);
      pointer-events: none;
    }

    .concl-summary:focus {
      border-color: rgba(56,189,248,0.4);
    }

    /* Compliance table */
    .concl-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .concl-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(15,23,42,0.45);
      padding: 6px 8px;
      border-bottom: 2px solid rgba(15,23,42,0.10);
    }

    .concl-table td {
      padding: 5px 8px;
      border-bottom: 1px solid rgba(15,23,42,0.06);
      vertical-align: middle;
    }

    .concl-table input {
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-on-white);
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      padding: 2px 0;
    }

    .concl-table input::placeholder {
      color: rgba(15,23,42,0.22);
    }

    .concl-table input:focus {
      background: rgba(56,189,248,0.04);
    }

    .concl-table select {
      font-family: var(--font-ui);
      font-size: 12px;
      border: none;
      outline: none;
      background: transparent;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      appearance: auto;
    }

    .concl-verdict-pass { background: rgba(34,197,94,0.12); color: #166534; }
    .concl-verdict-warning { background: rgba(250,204,21,0.18); color: #854d0e; }
    .concl-verdict-fail { background: rgba(239,68,68,0.12); color: #991b1b; }

    .concl-add-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: var(--font-ui);
      color: rgba(56,189,248,0.8);
      background: transparent;
      border: 1px dashed rgba(56,189,248,0.25);
      border-radius: 4px;
      cursor: pointer;
      transition: background var(--transition-fast), border-color var(--transition-fast);
    }

    .concl-add-btn:hover {
      background: rgba(56,189,248,0.06);
      border-color: rgba(56,189,248,0.5);
    }

    /* Issues list */
    .concl-issues-list {
      list-style: none;
      padding: 0;
    }

    .concl-issue-item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 4px;
    }

    .concl-issue-bullet {
      color: rgba(15,23,42,0.30);
      font-size: 13px;
      line-height: 1.7;
      flex-shrink: 0;
      user-select: none;
    }

    .concl-issue-input {
      flex: 1;
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--text-on-white);
      border: none;
      outline: none;
      background: transparent;
      padding: 2px 0;
      line-height: 1.7;
      border-bottom: 1px dashed rgba(15,23,42,0.08);
    }

    .concl-issue-input::placeholder {
      color: rgba(15,23,42,0.22);
    }

    .concl-issue-input:focus {
      border-bottom-color: rgba(56,189,248,0.3);
    }

    /* Actions table */
    .concl-actions-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .concl-actions-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(15,23,42,0.45);
      padding: 6px 8px;
      border-bottom: 2px solid rgba(15,23,42,0.10);
    }

    .concl-actions-table td {
      padding: 5px 8px;
      border-bottom: 1px solid rgba(15,23,42,0.06);
    }

    .concl-actions-table input {
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-on-white);
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      padding: 2px 0;
    }

    .concl-actions-table input::placeholder {
      color: rgba(15,23,42,0.22);
    }

    .concl-actions-table input:focus {
      background: rgba(56,189,248,0.04);
    }

    /* ━━━ Data Page Module (A4 Portrait) ━━━ */
    .data-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 3.3% 3.8% 2.8%;
      font-family: var(--font-ui);
      color: var(--text-on-white);
      overflow-y: auto;
    }

    .data-page-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: #0B3D7A;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 2px solid #C2DFF8;
    }

    .data-header-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 20px;
      margin-bottom: 10px;
      background: #EDF2F8;
      padding: 8px 10px;
      border-radius: 4px;
    }

    .data-field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .data-field-label {
      font-size: 8px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #2357A7;
      font-family: var(--font-mono);
    }

    .data-field input,
    .data-field select {
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-on-white);
      border: 1px solid rgba(15,23,42,0.10);
      border-radius: 4px;
      outline: none;
      background: transparent;
      padding: 5px 8px;
      transition: border-color var(--transition-fast), background var(--transition-fast);
    }

    .data-field input::placeholder {
      color: rgba(15,23,42,0.25);
    }

    .data-field input:hover,
    .data-field select:hover {
      border-color: rgba(15,23,42,0.20);
    }

    .data-field input:focus,
    .data-field select:focus {
      border-color: rgba(56,189,248,0.45);
      background: rgba(56,189,248,0.03);
    }

    .data-field-unit {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .data-field-unit input {
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
      flex: 1;
    }

    .data-field-unit .unit-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(15,23,42,0.40);
      background: rgba(15,23,42,0.04);
      border: 1px solid rgba(15,23,42,0.10);
      border-left: none;
      border-radius: 0 4px 4px 0;
      padding: 5px 8px;
      white-space: nowrap;
    }

    /* Ta conditions */
    .ta-section {
      border-top: 1px solid rgba(15,23,42,0.08);
      padding-top: 12px;
      margin-bottom: 16px;
    }

    .ta-section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(15,23,42,0.40);
      margin-bottom: 8px;
    }

    .ta-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .ta-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 500;
      font-family: var(--font-mono);
      color: #2357A7;
      background: rgba(35,87,167,0.08);
      border: 1px solid rgba(35,87,167,0.15);
      clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
      white-space: nowrap;
    }

    .ta-tag-remove {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      font-size: 12px;
      line-height: 1;
      color: rgba(14,116,144,0.5);
      background: transparent;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      padding: 0;
      transition: color var(--transition-fast), background var(--transition-fast);
    }

    .ta-tag-remove:hover {
      color: #991b1b;
      background: rgba(239,68,68,0.12);
    }

    .ta-add-btn {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: var(--font-ui);
      color: rgba(56,189,248,0.7);
      background: transparent;
      border: 1px dashed rgba(56,189,248,0.25);
      border-radius: 14px;
      cursor: pointer;
      transition: background var(--transition-fast), border-color var(--transition-fast);
    }

    .ta-add-btn:hover {
      background: rgba(56,189,248,0.06);
      border-color: rgba(56,189,248,0.5);
    }

    /* Data body placeholder */
    .data-body-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed rgba(15,23,42,0.12);
      border-radius: 6px;
      font-size: 13px;
      color: rgba(15,23,42,0.25);
    }

    /* ━━━ Data Table ━━━ */
    .data-table-wrap {
      flex: 1;
      overflow: auto;
      border: 1px solid #C2DFF8;
      border-radius: 4px;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      table-layout: auto;
      min-width: 100%;
    }

    .data-table th {
      position: sticky;
      top: 0;
      z-index: 2;
      text-align: center;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #ffffff;
      padding: 4px 5px;
      background: #0B3D7A;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      white-space: nowrap;
      font-family: var(--font-mono);
    }

    .data-table th.ta-group-header {
      text-align: center;
      border-left: 2px solid rgba(255,255,255,0.2);
    }

    .data-table th.ta-sub-header {
      font-size: 7px;
      text-align: center;
    }

    .data-table td {
      padding: 3px 5px;
      border-bottom: 1px solid rgba(15,23,42,0.05);
      vertical-align: middle;
      white-space: nowrap;
      text-align: center;
    }

    .data-table tr.row-fail td {
      background: rgba(254,226,226,0.4) !important;
    }

    .data-table tr.category-boundary td {
      border-top: 2px solid rgba(15,23,42,0.12);
    }

    /* Category color strip */
    .dt-cat-strip {
      width: 3px;
      height: 18px;
      border-radius: 2px;
      display: inline-block;
      vertical-align: middle;
      margin-right: 2px;
    }
    .dt-cat-strip.cat-rf   { background: #3b82f6; }
    .dt-cat-strip.cat-digital { background: #8b5cf6; }
    .dt-cat-strip.cat-pwr  { background: #f97316; }

    .data-table input,
    .data-table select {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-on-white);
      border: none;
      outline: none;
      background: transparent;
      padding: 2px 3px;
      width: 100%;
      min-width: 0;
      text-align: center;
    }

    .data-table input::placeholder { color: rgba(15,23,42,0.20); }
    .data-table input:focus,
    .data-table select:focus { background: rgba(56,189,248,0.05); }

    .data-table select { cursor: pointer; appearance: auto; width: auto; min-width: 50px; }

    .dt-readonly {
      background: rgba(15,23,42,0.03) !important;
      color: rgba(15,23,42,0.55);
      font-weight: 600;
      text-align: center;
      padding: 2px 4px;
      font-size: 11px;
    }

    .dt-margin-pass  { background: #dcfce7 !important; color: #15803d !important; font-weight: 600; text-align: center; }
    .dt-margin-warn  { background: #fef9c3 !important; color: #a16207 !important; font-weight: 600; text-align: center; }
    .dt-margin-fail  { background: #fee2e2 !important; color: #b91c1c !important; font-weight: 600; text-align: center; }

    .dt-passfail-pass { color: #15803d; font-weight: 700; }
    .dt-passfail-fail { color: #b91c1c; font-weight: 700; }

    .dt-tc-input { width: 55px; text-align: center; }

    .data-table td.dt-ta-col {
      border-left: 1px solid rgba(15,23,42,0.06);
      text-align: center;
    }
    .data-table td.dt-ta-col-first {
      border-left: 2px solid rgba(15,23,42,0.08);
    }

    .dt-add-row-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      padding: 4px 12px;
      font-size: 11px;
      font-family: var(--font-ui);
      color: rgba(56,189,248,0.8);
      background: transparent;
      border: 1px dashed rgba(56,189,248,0.25);
      border-radius: 4px;
      cursor: pointer;
      transition: background var(--transition-fast), border-color var(--transition-fast);
    }
    .dt-add-row-btn:hover {
      background: rgba(56,189,248,0.06);
      border-color: rgba(56,189,248,0.5);
    }
    .dt-del-header { width: 28px; padding: 0 !important; }
    .dt-del-cell { width: 28px; padding: 2px !important; text-align: center; }
    .dt-del-btn {
      width: 20px; height: 20px; padding: 0; border: none; border-radius: 3px;
      background: transparent; color: rgba(15,23,42,0.25); font-size: 11px;
      cursor: pointer; line-height: 1; transition: all 0.15s;
    }
    .dt-del-btn:hover { background: rgba(231,76,60,0.12); color: #E74C3C; }

    .editor-area.has-tim-panel { padding-top: 52px; }

    /* TIM Library Panel — sits in .editor-area, top-left */
    #tim-panel-container {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 30;
    }
    #tim-panel-container:empty { display: none; }
    .tim-panel {
      width: 340px;
      background: #ffffff;
      border: 1px solid #C2DFF8;
      border-radius: 8px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.18);
      font-family: var(--font-ui);
      overflow: hidden;
    }
    .tim-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      background: #EDF2F8;
      cursor: pointer;
      user-select: none;
      font-size: 11px;
      font-weight: 600;
      color: #0B3D7A;
    }
    .tim-panel-header:hover { background: #dde8f5; }
    .tim-panel-arrow { font-size: 9px; transition: transform 0.2s; color: #5BA3E6; }
    .tim-panel-arrow.open { transform: rotate(90deg); }
    .tim-panel-body { display: none; }
    .tim-panel-body.open { display: block; }
    .tim-tabs {
      display: flex;
      border-bottom: 1px solid #C2DFF8;
    }
    .tim-tab {
      flex: 1;
      padding: 5px 4px;
      font-size: 9px;
      font-weight: 600;
      text-align: center;
      color: rgba(15,23,42,0.45);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-ui);
    }
    .tim-tab:hover { color: #0B3D7A; background: rgba(11,61,122,0.04); }
    .tim-tab.active {
      color: #0B3D7A;
      border-bottom-color: #0B3D7A;
      background: rgba(11,61,122,0.06);
    }
    .tim-list {
      max-height: 220px;
      overflow-y: auto;
      padding: 4px 8px;
    }
    .tim-entry {
      display: grid;
      grid-template-columns: 1fr 50px 70px 24px;
      gap: 4px;
      align-items: center;
      padding: 3px 0;
      border-bottom: 1px solid rgba(15,23,42,0.06);
    }
    .tim-entry input {
      font-family: var(--font-ui);
      font-size: 10px;
      border: 1px solid rgba(15,23,42,0.12);
      border-radius: 3px;
      padding: 2px 4px;
      outline: none;
      width: 100%;
      min-width: 0;
      color: var(--text-on-white);
    }
    .tim-entry input::placeholder { color: rgba(15,23,42,0.25); }
    .tim-entry input:focus { border-color: #3A7AD4; }
    .tim-entry-del {
      width: 20px; height: 20px; padding: 0; border: none;
      border-radius: 3px; background: transparent;
      color: rgba(15,23,42,0.25); font-size: 11px;
      cursor: pointer; line-height: 1;
    }
    .tim-entry-del:hover { background: rgba(231,76,60,0.12); color: #E74C3C; }
    .tim-add-btn {
      display: block;
      padding: 4px;
      font-size: 10px;
      font-family: var(--font-ui);
      color: rgba(56,189,248,0.8);
      background: transparent;
      border: 1px dashed rgba(56,189,248,0.25);
      border-radius: 3px;
      cursor: pointer;
      margin: 4px 8px 6px;
      width: calc(100% - 16px);
    }
    .tim-add-btn:hover { background: rgba(56,189,248,0.06); border-color: rgba(56,189,248,0.5); }
    .tim-list-header {
      display: grid;
      grid-template-columns: 1fr 50px 70px 24px;
      gap: 4px;
      padding: 2px 0;
      font-size: 8px;
      font-weight: 600;
      color: rgba(15,23,42,0.4);
      letter-spacing: 0.04em;
      font-family: var(--font-mono);
      border-bottom: 1px solid rgba(15,23,42,0.08);
      margin: 0 8px;
    }

    /* Sensor section */
    .sensor-section {
      margin-top: 10px;
      border: 1px solid rgba(15,23,42,0.08);
      border-radius: 6px;
      overflow: hidden;
    }

    .sensor-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-ui);
      color: rgba(15,23,42,0.50);
      background: rgba(15,23,42,0.02);
      border: none;
      cursor: pointer;
      text-align: left;
    }
    .sensor-toggle:hover { background: rgba(15,23,42,0.04); }

    .sensor-toggle .arrow {
      display: inline-block;
      transition: transform 0.15s;
      font-size: 10px;
    }
    .sensor-toggle .arrow.open { transform: rotate(90deg); }

    .sensor-body {
      padding: 8px;
      display: none;
    }
    .sensor-body.open { display: block; }

    .sensor-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    .sensor-table th {
      text-align: left;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(15,23,42,0.45);
      padding: 4px 6px;
      border-bottom: 1px solid rgba(15,23,42,0.08);
      white-space: nowrap;
    }
    .sensor-table td {
      padding: 3px 5px;
      border-bottom: 1px solid rgba(15,23,42,0.04);
    }
    .sensor-table input,
    .sensor-table select {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-on-white);
      border: none;
      outline: none;
      background: transparent;
      padding: 2px 3px;
      width: 100%;
    }
    .sensor-table input::placeholder { color: rgba(15,23,42,0.20); }
    .sensor-table input:focus { background: rgba(56,189,248,0.05); }
    .sensor-table select { cursor: pointer; appearance: auto; width: auto; }

    /* ━━━ Sim vs Meas Comparison Page ━━━ */
    .sim-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 2.4% 2.8% 1.9%;
      font-family: var(--font-ui);
      color: var(--text-on-white);
      overflow-y: auto;
      gap: 1.2%;
    }

    .sim-page-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sim-page-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(15,23,42,0.50);
    }

    .sim-select-btn {
      padding: 4px 12px;
      font-size: 11px;
      font-family: var(--font-ui);
      color: rgba(56,189,248,0.85);
      background: rgba(56,189,248,0.08);
      border: 1px solid rgba(56,189,248,0.20);
      border-radius: 4px;
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    .sim-select-btn:hover {
      background: rgba(56,189,248,0.15);
    }

    /* Image pair zone */
    .sim-images {
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    .sim-img-zone {
      flex: 1;
      height: clamp(120px, 22vmin, 170px);
      border: 2px dashed rgba(15,23,42,0.14);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color var(--transition-fast), background var(--transition-fast);
    }
    .sim-img-zone:hover {
      border-color: rgba(56,189,248,0.35);
      background: rgba(56,189,248,0.02);
    }
    .sim-img-zone.dragover {
      border-color: var(--color-primary);
      background: rgba(56,189,248,0.06);
    }
    .sim-img-zone.has-image {
      border: 1px solid rgba(15,23,42,0.10);
    }
    .sim-img-zone.has-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .sim-img-placeholder {
      text-align: center;
      color: rgba(15,23,42,0.28);
      font-size: 11px;
      pointer-events: none;
    }
    .sim-img-placeholder .img-browse-btn {
      pointer-events: auto;
    }
    .sim-img-placeholder .icon {
      font-size: 24px;
      display: block;
      margin-bottom: 4px;
    }

    .sim-img-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(15,23,42,0.35);
      margin-top: 4px;
      text-align: center;
    }

    .sim-img-caption {
      width: 100%;
      font-family: var(--font-ui);
      font-size: 10px;
      color: var(--text-on-white);
      border: none;
      outline: none;
      background: transparent;
      text-align: center;
      padding: 3px 4px;
      border-top: 1px solid rgba(15,23,42,0.06);
    }
    .sim-img-caption::placeholder { color: rgba(15,23,42,0.20); }
    .sim-img-caption:focus { background: rgba(56,189,248,0.03); }

    .sim-img-actions {
      position: absolute;
      top: 4px;
      right: 4px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity var(--transition-fast);
    }
    .sim-img-zone:hover .sim-img-actions { opacity: 1; }

    .sim-img-action-btn {
      padding: 2px 6px;
      font-size: 9px;
      font-family: var(--font-ui);
      color: #fff;
      background: rgba(0,0,0,0.5);
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    .sim-img-action-btn.danger { background: rgba(220,38,38,0.7); }

    /* Comparison table */
    .sim-table-wrap {
      flex: 1;
      overflow: auto;
      border: 1px solid rgba(15,23,42,0.10);
      border-radius: 6px;
    }

    .sim-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
    }

    .sim-table th {
      position: sticky;
      top: 0;
      z-index: 2;
      text-align: left;
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(15,23,42,0.50);
      padding: 4px 6px;
      background: rgba(15,23,42,0.03);
      border-bottom: 2px solid rgba(15,23,42,0.10);
      white-space: nowrap;
    }

    .sim-table td {
      padding: 3px 5px;
      border-bottom: 1px solid rgba(15,23,42,0.05);
      vertical-align: middle;
      white-space: nowrap;
    }

    .sim-table input {
      font-family: var(--font-ui);
      font-size: 10px;
      color: var(--text-on-white);
      border: none;
      outline: none;
      background: transparent;
      padding: 2px 3px;
      width: 100%;
    }
    .sim-table input::placeholder { color: rgba(15,23,42,0.20); }
    .sim-table input:focus { background: rgba(56,189,248,0.05); }

    .sim-table .sim-readonly {
      color: rgba(15,23,42,0.55);
      font-size: 10px;
    }

    .sim-dev-good  { background: #dcfce7 !important; color: #15803d !important; font-weight: 600; text-align: center; }
    .sim-dev-warn  { background: #fef9c3 !important; color: #a16207 !important; font-weight: 600; text-align: center; }
    .sim-dev-bad   { background: #fee2e2 !important; color: #b91c1c !important; font-weight: 600; text-align: center; }

    .sim-table .sim-judge { text-align: center; font-size: 12px; }

    /* Bottom note */
    .sim-note-input {
      width: 100%;
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-on-white);
      border: 1px solid rgba(15,23,42,0.10);
      border-radius: 4px;
      outline: none;
      padding: 6px 8px;
      background: transparent;
      flex-shrink: 0;
    }
    .sim-note-input::placeholder { color: rgba(15,23,42,0.22); }
    .sim-note-input:focus { border-color: rgba(56,189,248,0.4); }

    /* Component selection modal */
    .sim-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sim-modal {
      width: 420px;
      max-height: 70vh;
      background: rgba(15,23,42,0.92);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 10px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sim-modal-header {
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 700;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .sim-modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .sim-modal-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    .sim-modal-item:hover { background: rgba(255,255,255,0.05); }

    .sim-modal-item input[type="checkbox"] {
      accent-color: #38bdf8;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .sim-modal-item-label {
      font-size: 13px;
    }

    .sim-modal-item-cat {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 600;
    }
    .sim-modal-item-cat.cat-rf { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .sim-modal-item-cat.cat-digital { background: rgba(139,92,246,0.2); color: #a78bfa; }
    .sim-modal-item-cat.cat-pwr { background: rgba(249,115,22,0.2); color: #fb923c; }

    .sim-modal-footer {
      padding: 10px 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .sim-modal-btn {
      padding: 6px 16px;
      font-size: 12px;
      font-family: var(--font-ui);
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.12);
      cursor: pointer;
      background: transparent;
      color: #e2e8f0;
      transition: background var(--transition-fast);
    }
    .sim-modal-btn:hover { background: rgba(255,255,255,0.08); }
    .sim-modal-btn.primary {
      background: rgba(56,189,248,0.25);
      border-color: rgba(56,189,248,0.35);
    }
    .sim-modal-btn.primary:hover { background: rgba(56,189,248,0.4); }

    /* ━━━ Image Page Module (A4 Landscape 842×595) ━━━ */
    #editor-canvas.landscape {
      --canvas-aspect: 842 / 595;
    }

    .image-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 2.4% 2.8% 1.9%;
      font-family: var(--font-ui);
      color: var(--text-on-white);
      overflow: hidden;
    }

    .image-page-title {
      font-size: clamp(14px, 2.2vmin, 18px);
      font-weight: 700;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-on-white);
      width: 100%;
      padding: 6px 8px;
      margin-bottom: 1.4%;
      font-family: var(--font-ui);
      flex-shrink: 0;
    }

    .image-page-title::placeholder {
      color: rgba(15,23,42,0.28);
    }

    .image-page-title:hover {
      background: rgba(56,189,248,0.04);
    }

    .image-page-title:focus {
      background: rgba(56,189,248,0.06);
      border-radius: 4px;
    }

    .image-grid {
      flex: 1;
      display: grid;
      gap: 10px;
      min-height: 0;
      position: relative;
    }

    .image-grid.layout-0 {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }

    .image-grid.layout-1 {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }

    .image-grid.layout-2 {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
    }

    .image-grid.layout-3,
    .image-grid.layout-4 {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }

    .img-resize-handle {
      position: absolute;
      z-index: 20;
      transition: background 0.15s, transform 0.12s;
    }
    .img-resize-handle-v {
      top: 0; bottom: 0;
      width: 10px;
      cursor: col-resize;
      background: transparent;
      border-left: 2px solid transparent;
      border-right: 2px solid transparent;
    }
    .img-resize-handle-v:hover,
    .img-resize-handle-v.dragging {
      border-color: #3A7AD4;
      background: rgba(58,122,212,0.18);
    }
    .img-resize-grip {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #3A7AD4;
      border: 3px solid #fff;
      box-shadow: 0 1px 6px rgba(11,61,122,0.35);
      cursor: nwse-resize;
      transform: translate(-50%, -50%);
    }
    .img-resize-grip:hover,
    .img-resize-grip.dragging {
      background: #0B3D7A;
      transform: translate(-50%, -50%) scale(1.15);
    }

    .image-cell {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
    }

    .image-drop-zone {
      flex: 1;
      border: 2px dashed rgba(15,23,42,0.15);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color var(--transition-fast), background var(--transition-fast);
      min-height: 0;
    }

    .image-drop-zone:hover {
      border-color: rgba(56,189,248,0.4);
      background: rgba(56,189,248,0.03);
    }

    .image-drop-zone.dragover {
      border-color: var(--color-primary);
      background: rgba(56,189,248,0.08);
    }
    .image-drop-zone.paste-target {
      border-color: rgba(91,163,230,0.5);
      background: rgba(91,163,230,0.04);
    }

    .image-drop-zone.has-image {
      border: 1px solid rgba(15,23,42,0.08);
    }

    .image-drop-zone img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .image-drop-placeholder {
      text-align: center;
      color: rgba(15,23,42,0.25);
      font-size: 13px;
      pointer-events: none;
    }

    .image-drop-placeholder .plus-icon {
      font-size: 28px;
      display: block;
      margin-bottom: 4px;
      font-weight: 300;
      color: rgba(15,23,42,0.20);
    }

    /* Shared browse button for image zones */
    .img-browse-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 14px;
      font-size: 11px;
      font-family: var(--font-ui);
      color: rgba(15,23,42,0.55);
      background: rgba(15,23,42,0.06);
      border: 1px solid rgba(15,23,42,0.12);
      border-radius: 4px;
      cursor: pointer;
      pointer-events: auto;
      transition: all var(--transition-fast);
    }
    .img-browse-btn:hover {
      background: rgba(56,189,248,0.10);
      border-color: rgba(56,189,248,0.3);
      color: rgba(15,23,42,0.75);
    }

    .image-cell-actions {
      display: none;
      position: absolute;
      top: 6px;
      right: 6px;
      gap: 4px;
      z-index: 5;
    }

    .image-drop-zone.has-image:hover .image-cell-actions {
      display: flex;
    }

    .image-caption {
      font-size: 12px;
      color: rgba(15,23,42,0.55);
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      padding: 4px 6px;
      margin-top: 4px;
      font-family: var(--font-ui);
      border-bottom: 1px dashed rgba(15,23,42,0.12);
      flex-shrink: 0;
    }

    .image-caption::placeholder {
      color: rgba(15,23,42,0.25);
    }

    .image-caption:hover {
      background: rgba(56,189,248,0.03);
    }

    .image-caption:focus {
      background: rgba(56,189,248,0.05);
      border-bottom-color: var(--color-primary);
    }

    /* ━━━ Annotation Page Module ━━━ */
    .annotation-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      font-family: var(--font-ui);
      color: var(--text-on-white);
      overflow: hidden;
      position: relative;
    }


    .annotation-title {
      font-size: clamp(13px, 2vmin, 16px);
      font-weight: 700;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-on-white);
      width: 100%;
      padding: 1.4% 1.9% 1%;
      font-family: var(--font-ui);
      flex-shrink: 0;
      z-index: 5;
    }

    .annotation-title::placeholder {
      color: rgba(15,23,42,0.28);
    }

    .annotation-title:hover {
      background: rgba(56,189,248,0.04);
    }

    .annotation-title:focus {
      background: rgba(56,189,248,0.06);
    }

    .annotation-workspace {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .annotation-workspace-inner {
      position: relative;
      overflow: hidden;
    }

    .annotation-photo-zone {
      position: absolute;
      border: 2px dashed rgba(15,23,42,0.15);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      transition: border-color var(--transition-fast), background var(--transition-fast);
    }

    .anno-photo-resize {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 20px;
      height: 20px;
      cursor: nwse-resize;
      z-index: 25;
      display: none;
    }
    .anno-photo-resize::after {
      content: '';
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 8px;
      height: 8px;
      border-right: 2px solid rgba(15,23,42,0.25);
      border-bottom: 2px solid rgba(15,23,42,0.25);
    }
    .annotation-photo-zone.has-photo .anno-photo-resize {
      display: block;
    }
    .annotation-photo-zone.has-photo:hover .anno-photo-resize::after {
      border-color: rgba(56,189,248,0.6);
    }

    .anno-replace-photo-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      z-index: 30;
      background: rgba(15,23,42,0.65);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: auto;
    }
    .annotation-photo-zone.has-photo:hover .anno-replace-photo-btn {
      opacity: 1;
    }
    .anno-replace-photo-btn:hover {
      background: rgba(15,23,42,0.85);
    }

    .annotation-photo-zone:hover {
      border-color: rgba(56,189,248,0.4);
      background: rgba(56,189,248,0.03);
    }

    .annotation-photo-zone.dragover {
      border-color: var(--color-primary);
      background: rgba(56,189,248,0.08);
    }

    .annotation-photo-zone.has-photo {
      border: 1px solid rgba(15,23,42,0.08);
      cursor: crosshair;
    }

    .annotation-photo-zone.has-photo:hover {
      background: transparent;
    }

    .annotation-photo-zone img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .annotation-photo-placeholder {
      text-align: center;
      color: rgba(15,23,42,0.25);
      font-size: 13px;
      pointer-events: none;
    }
    .annotation-photo-placeholder .img-browse-btn {

    }

    .annotation-photo-placeholder .icon {
      font-size: 32px;
      display: block;
      margin-bottom: 6px;
    }

    .annotation-svg-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .annotation-svg-overlay line {
      stroke: #dc2626;
      stroke-width: 1.5;
      pointer-events: none;
    }

    .marker-dot {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: transparent;
      cursor: grab;
      z-index: 15;
      transform: translate(-50%, -50%);
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .marker-dot::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #dc2626;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.9);
      transition: transform 0.12s;
    }

    .marker-dot:active {
      cursor: grabbing;
    }

    .marker-dot:hover::before {
      transform: scale(1.5);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.9), 0 1px 4px rgba(220,38,38,0.5);
    }

    .marker-label-wrap {
      position: absolute;
      z-index: 20;
      display: flex;
      align-items: stretch;
    }

    .marker-delete-btn {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #dc2626;
      color: #fff;
      border: 1.5px solid #fff;
      font-size: 10px;
      line-height: 1;
      font-weight: 700;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
      z-index: 21;

    .marker-label-wrap:hover .marker-delete-btn,
    .marker-label-wrap:focus-within .marker-delete-btn {
      display: flex;
    }

    .marker-delete-btn:hover {
      background: #b91c1c;
      transform: scale(1.15);
    }

    .marker-label {
      width: 53px;
      min-width: 40px;
      padding: 4px 8px;
      background: #fff;
      border: 1.5px solid #333;
      border-radius: 4px 0 0 4px;
      font-size: 11px;
      font-family: var(--font-ui);

    .annotation-drag-line {

      left: 0;

      height: 100%;

    .annotation-drag-line line {

    /* ━━━ Preview Overlay ━━━ */

    .preview-footer {

    .preview-nav-btn {

      -webkit-backdrop-filter: blur(20px);

      align-items: center;

    .preview-nav-btn:hover {
      background: rgba(35,87,167,0.6);

    .preview-nav-btn:disabled {

      cursor: default;
      pointer-events: none;
    }
    .preview-nav-btn.prev { left: 24px; }
    .preview-nav-btn.next { right: 24px; }

    /* ━━━ PDF Export helper ━━━ */
    .pdf-render-stage {

      pointer-events: none;

    /* ━━━ Report Homepage ━━━ */

      inset: 0;
      z-index: 8000;

    .hp-header {

    .hp-new-btn {
      padding: 9px 22px;

      font-family: var(--font-heading);

    }

    .hp-body {
      flex: 1;

      z-index: 1;
    }

    .hp-empty {

      align-items: center;

    .hp-empty .text { font-size: 15px; }

    .hp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .hp-card {
      background: rgba(4,41,82,0.25);
      border: 1px solid rgba(91,163,230,0.12);
      border-top: 1px solid rgba(91,163,230,0.20);

      flex-direction: column;

      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      position: relative;
      overflow: hidden;
    }
    .hp-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, #0B3D7A, #2357A7, #3A7AD4, #5BA3E6, #6EC5A0, #4CAF79);
      opacity: 0;
      transition: opacity var(--transition-base);
    }
    .hp-card:hover {
      background: rgba(4,41,82,0.35);
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.25), 0 0 20px rgba(35,87,167,0.1);
    }
    .hp-card:hover::before {
      opacity: 1;
    }

    .hp-card-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;

      padding: 2px 6px;
      margin: -2px -6px;

    .hp-card-title:hover {
      background: rgba(255,255,255,0.06);
    }
    .hp-card-title:focus {
      outline: none;
      background: rgba(91,163,230,0.10);
      box-shadow: 0 0 0 2px rgba(91,163,230,0.3);
      white-space: normal;
      overflow: visible;
    }

    .hp-card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .hp-badge {
      display: inline-block;
      padding: 3px 10px;
      font-size: 10px;
      font-family: var(--font-mono);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
      background: rgba(91,163,230,0.15);
      color: var(--d-300);
      border: 1px solid rgba(91,163,230,0.20);
    }

    .hp-card-date {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .hp-card-updated {
      font-size: 11px;
      color: var(--text-placeholder);
    }

    .hp-card-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    .hp-card-btn {
      padding: 5px 14px;
      font-size: 11px;
      font-family: var(--font-heading);
      font-weight: 500;
      letter-spacing: 0.04em;
      clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);

      cursor: pointer;
      background: rgba(91,163,230,0.08);
      color: var(--d-200);

    .hp-card-btn:hover {

      transform: translateY(-1px);

    .hp-card-btn.primary {

    .hp-card-btn.primary:hover {
      background: rgba(58,122,212,0.35);
    }
    .hp-card-btn.danger:hover {
      background: rgba(231,76,60,0.2);
      color: #E74C3C;
      border-color: rgba(231,76,60,0.3);
    }

    /* ━━━ Homepage Modals ━━━ */
    .hp-modal-overlay {

    .hp-modal {

    .hp-modal-header {
      padding: 16px 20px;

      font-weight: 700;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .hp-modal-body {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .hp-modal-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hp-modal-field label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.45);
    }

    .hp-modal-field input,
    .hp-modal-field select {
      padding: 9px 12px;
      font-size: 13px;
      font-family: var(--font-ui);
      color: #e2e8f0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);

    .hp-modal-field select option {
