<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thermal Report Builder</title>

  <!-- Firebase SDK 10.x via CDN -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
    import { getFirestore, enableIndexedDbPersistence } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';
    import { getStorage } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBBhIIGUe3yzxarC3OHoIhuFr5Yg8IfAoo",
      authDomain: "thermal-test-report-builder.firebaseapp.com",
      projectId: "thermal-test-report-builder",
      storageBucket: "thermal-test-report-builder.firebasestorage.app",
      messagingSenderId: "440712941744",
      appId: "1:440712941744:web:0f4417911669e43e0f2b75"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // Enable offline persistence
    enableIndexedDbPersistence(db).catch((err) => {
      if (err.code === 'failed-precondition') {
        console.warn('Persistence failed: multiple tabs open');
      } else if (err.code === 'unimplemented') {
        console.warn('Persistence not supported by browser');
      }
    });

    // Expose to global scope for future modules
    window._app = app;
    window._db = db;
    window._storage = storage;

    console.log('✅ Firebase initialized (Firestore + Storage + Offline Persistence)');
  </script>

  <!-- SortableJS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>

  <style>
    /* ━━━ CSS Design System: Liquid Glass ━━━ */
    :root {
      --bg-base: #0a0f1e;
      --bg-gradient: linear-gradient(135deg, #0a0f1e 0%, #0d1b2e 50%, #0a1628 100%);
      --bg-glow-1: radial-gradient(ellipse at 20% 20%, rgba(56,189,248,0.08) 0%, transparent 60%);
      --bg-glow-2: radial-gradient(ellipse at 80% 80%, rgba(99,102,241,0.06) 0%, transparent 60%);

      --glass-bg: rgba(255,255,255,0.08);
      --glass-bg-hover: rgba(255,255,255,0.12);
      --glass-bg-active: rgba(255,255,255,0.16);
      --glass-border: rgba(255,255,255,0.18);
      --glass-border-top: rgba(255,255,255,0.35);
      --glass-blur: 20px;
      --glass-blur-heavy: 40px;
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.2);

      --color-primary: rgba(56,189,248,1);
      --color-primary-glass: rgba(56,189,248,0.15);
      --color-primary-glow: rgba(56,189,248,0.30);
      --color-success: rgba(34,197,94,1);
      --color-warning: rgba(250,204,21,1);
      --color-danger: rgba(239,68,68,1);

      --text-primary: rgba(255,255,255,0.95);
      --text-secondary: rgba(255,255,255,0.60);
      --text-placeholder: rgba(255,255,255,0.30);
      --text-on-white: rgba(15,23,42,0.90);

      --font-ui: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang TC", sans-serif;
      --font-data: "SF Mono", "JetBrains Mono", monospace;

      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-2xl: 24px;
      --radius-full: 9999px;

      --transition-fast: 0.15s ease;
      --transition-base: 0.20s ease;
      --transition-slow: 0.30s ease;
    }

    /* ━━━ Reset & Base ━━━ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font-ui);
      color: var(--text-primary);
      background: var(--bg-base);
    }

    body {
      background: var(--bg-gradient);
      position: relative;
    }

    /* Ambient glow layers */
    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background: var(--bg-glow-1);
    }

    body::after {
      background: var(--bg-glow-2);
    }

    /* ━━━ Layout ━━━ */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ━━━ Toolbar ━━━ */
    .toolbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-5);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-bottom: 1px solid var(--glass-border);
      border-top: 1px solid var(--glass-border-top);
      box-shadow: var(--glass-shadow);
      flex-shrink: 0;
      z-index: 100;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
    }

    .toolbar-center {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* Glass button */
    .glass-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      font-size: 13px;
      font-family: var(--font-ui);
      color: var(--text-primary);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-top-color: var(--glass-border-top);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition-fast), box-shadow var(--transition-fast);
      white-space: nowrap;
    }

    .glass-btn:hover {
      background: var(--glass-bg-hover);
      box-shadow: 0 0 12px var(--color-primary-glow);
      border-color: var(--color-primary);
    }

    .glass-btn:active {
      background: var(--glass-bg-active);
    }

    /* ━━━ Body (Sidebar + Editor) ━━━ */
    .body {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ━━━ Sidebar ━━━ */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-right: 1px solid var(--glass-border);
      z-index: 50;
    }

    .sidebar-header {
      padding: var(--space-4) var(--space-4) var(--space-3);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    #page-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 var(--space-3);
    }

    .sidebar-footer {
      padding: var(--space-3) var(--space-4);
      border-top: 1px solid var(--glass-border);
    }

    .sidebar-add-btn {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      width: 100%;
      padding: var(--space-2) var(--space-3);
      font-size: 13px;
      font-family: var(--font-ui);
      color: var(--color-primary);
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition-fast);
    }

    .sidebar-add-btn:hover {
      background: var(--color-primary-glass);
    }

    /* ━━━ Editor Area ━━━ */
    .editor-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: var(--space-8);
    }

    #editor-canvas {
      width: 595px;
      height: 842px;
      background: #ffffff;
      border-radius: 4px;
      box-shadow:
        0 4px 24px rgba(0,0,0,0.4),
        0 1px 4px rgba(0,0,0,0.3),
        0 0 0 1px rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .canvas-placeholder {
      font-size: 15px;
      color: var(--text-on-white);
      opacity: 0.4;
      user-select: none;
    }

    /* ━━━ Status dot ━━━ */
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: var(--radius-full);
      background: var(--color-success);
      margin-right: var(--space-2);
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Toolbar -->
    <header class="toolbar">
      <div class="toolbar-left">🌡 Thermal Report Builder</div>
      <div class="toolbar-center">
        <button class="glass-btn">+ 新增頁面 ▾</button>
        <button class="glass-btn">預覽</button>
        <button class="glass-btn">匯出 PDF</button>
      </div>
      <div class="toolbar-right">
        <span class="status-dot"></span>就緒
      </div>
    </header>

    <div class="body">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">頁面列表</div>
        <div id="page-list"></div>
        <div class="sidebar-footer">
          <button class="sidebar-add-btn">+ 新增頁面</button>
        </div>
      </aside>

      <!-- Editor -->
      <main class="editor-area">
        <div id="editor-canvas">
          <span class="canvas-placeholder">← 請從左側選擇或新增頁面</span>
        </div>
      </main>
    </div>
  </div>

  <script>
    // Initialize SortableJS on page list
    document.addEventListener('DOMContentLoaded', () => {
      const pageList = document.getElementById('page-list');
      if (pageList && typeof Sortable !== 'undefined') {
        Sortable.create(pageList, {
          animation: 150,
          ghostClass: 'sortable-ghost',
        });
        console.log('✅ SortableJS initialized on #page-list');
      }
    });
  </script>
</body>
</html>
