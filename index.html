<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thermal Report Builder</title>

  <!-- Firebase SDK 10.x via CDN -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
    import { getFirestore, enableIndexedDbPersistence, doc, setDoc, getDoc, deleteDoc, collection, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBBhIIGUe3yzxarC3OHoIhuFr5Yg8IfAoo",
      authDomain: "thermal-test-report-builder.firebaseapp.com",
      projectId: "thermal-test-report-builder",
      storageBucket: "thermal-test-report-builder.firebasestorage.app",
      messagingSenderId: "440712941744",
      appId: "1:440712941744:web:0f4417911669e43e0f2b75"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    enableIndexedDbPersistence(db).catch((err) => {
      if (err.code === 'failed-precondition') {
        console.warn('Persistence failed: multiple tabs open');
      } else if (err.code === 'unimplemented') {
        console.warn('Persistence not supported by browser');
      }
    });

    window._app = app;
    window._db = db;
    window._storage = storage;
    window._doc = doc;
    window._setDoc = setDoc;
    window._getDoc = getDoc;
    window._deleteDoc = deleteDoc;
    window._collection = collection;
    window._serverTimestamp = serverTimestamp;
    window._storageRef = storageRef;
    window._uploadBytes = uploadBytes;
    window._getDownloadURL = getDownloadURL;

    console.log('✅ Firebase initialized (Firestore + Storage + Offline Persistence)');
  </script>

  <!-- SortableJS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>

  <!-- html2canvas + jsPDF CDN -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>

  <style>
    /* ━━━ CSS Design System: Liquid Glass ━━━ */
    :root {
      --bg-base: #0a0f1e;
      --bg-gradient: linear-gradient(135deg, #0a0f1e 0%, #0d1b2e 50%, #0a1628 100%);
      --bg-glow-1: radial-gradient(ellipse at 20% 20%, rgba(56,189,248,0.08) 0%, transparent 60%);
      --bg-glow-2: radial-gradient(ellipse at 80% 80%, rgba(99,102,241,0.06) 0%, transparent 60%);

      --glass-bg: rgba(255,255,255,0.08);
      --glass-bg-hover: rgba(255,255,255,0.12);
      --glass-bg-active: rgba(255,255,255,0.16);
      --glass-border: rgba(255,255,255,0.18);
      --glass-border-top: rgba(255,255,255,0.35);
      --glass-blur: 20px;
      --glass-blur-heavy: 40px;
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.2);

      --color-primary: rgba(56,189,248,1);
      --color-primary-glass: rgba(56,189,248,0.15);
      --color-primary-glow: rgba(56,189,248,0.30);
      --color-success: rgba(34,197,94,1);
      --color-warning: rgba(250,204,21,1);
      --color-danger: rgba(239,68,68,1);

      --text-primary: rgba(255,255,255,0.95);
      --text-secondary: rgba(255,255,255,0.60);
      --text-placeholder: rgba(255,255,255,0.30);
      --text-on-white: rgba(15,23,42,0.90);

      --font-ui: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang TC", sans-serif;
      --font-data: "SF Mono", "JetBrains Mono", monospace;

      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-2xl: 24px;
      --radius-full: 9999px;

      --transition-fast: 0.15s ease;
      --transition-base: 0.20s ease;
      --transition-slow: 0.30s ease;
    }

    /* ━━━ Reset & Base ━━━ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font-ui);
      color: var(--text-primary);
      background: var(--bg-base);
    }

    body {
      background: var(--bg-gradient);
      position: relative;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before { background: var(--bg-glow-1); }
    body::after { background: var(--bg-glow-2); }

    /* ━━━ Layout ━━━ */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ━━━ Toolbar ━━━ */
    .toolbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-5);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-bottom: 1px solid var(--glass-border);
      border-top: 1px solid var(--glass-border-top);
      box-shadow: var(--glass-shadow);
      flex-shrink: 0;
      z-index: 100;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
    }

    .toolbar-center {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* Glass button */
    .glass-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      font-size: 13px;
      font-family: var(--font-ui);
      color: var(--text-primary);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-top-color: var(--glass-border-top);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition-fast), box-shadow var(--transition-fast);
      white-space: nowrap;
      position: relative;
    }

    .glass-btn:hover {
      background: var(--glass-bg-hover);
      box-shadow: 0 0 12px var(--color-primary-glow);
      border-color: var(--color-primary);
    }

    .glass-btn:active {
      background: var(--glass-bg-active);
    }

    /* ━━━ Dropdown Menu ━━━ */
    .dropdown-wrap { position: relative; }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      min-width: 180px;
      background: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(var(--glass-blur-heavy));
      -webkit-backdrop-filter: blur(var(--glass-blur-heavy));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      box-shadow: var(--glass-shadow);
      padding: var(--space-1) 0;
      z-index: 200;
    }

    .dropdown-menu.open { display: block; }

    .dropdown-item {
      display: block;
      width: 100%;
      padding: var(--space-2) var(--space-4);
      font-size: 13px;
      font-family: var(--font-ui);
      color: var(--text-primary);
      background: transparent;
      border: none;
      text-align: left;
      cursor: pointer;
      transition: background var(--transition-fast);
    }

    .dropdown-item:hover {
      background: var(--color-primary-glass);
    }

    /* ━━━ Context Menu ━━━ */
    .context-menu {
      display: none;
      position: fixed;
      min-width: 140px;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(var(--glass-blur-heavy));
      -webkit-backdrop-filter: blur(var(--glass-blur-heavy));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      box-shadow: var(--glass-shadow);
      padding: var(--space-1) 0;
      z-index: 300;
    }

    .context-menu.open { display: block; }

    .context-item {
      display: block;
      width: 100%;
      padding: var(--space-2) var(--space-4);
      font-size: 13px;
      font-family: var(--font-ui);
      color: var(--color-danger);
      background: transparent;
      border: none;
      text-align: left;
      cursor: pointer;
      transition: background var(--transition-fast);
    }

    .context-item:hover {
      background: rgba(239,68,68,0.15);
    }

    /* ━━━ Body ━━━ */
    .body {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ━━━ Sidebar ━━━ */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-right: 1px solid var(--glass-border);
      z-index: 50;
    }

    .sidebar-header {
      padding: var(--space-4) var(--space-4) var(--space-3);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    #page-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 var(--space-3);
    }

    .page-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      margin-bottom: var(--space-1);
      font-size: 13px;
      color: var(--text-primary);
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition-fast), border-color var(--transition-fast);
      user-select: none;
    }

    .page-item:hover {
      background: var(--glass-bg-hover);
    }

    .page-item.active {
      background: var(--color-primary-glass);
      border-color: var(--color-primary);
    }

    .page-item.sortable-ghost {
      opacity: 0.4;
    }

    .sidebar-footer {
      padding: var(--space-3) var(--space-4);
      border-top: 1px solid var(--glass-border);
    }

    .sidebar-add-btn {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      width: 100%;
      padding: var(--space-2) var(--space-3);
      font-size: 13px;
      font-family: var(--font-ui);
      color: var(--color-primary);
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition-fast);
      position: relative;
    }

    .sidebar-add-btn:hover {
      background: var(--color-primary-glass);
    }

    /* Sidebar bottom dropdown opens upward */
    .sidebar-footer .dropdown-menu {
      top: auto;
      bottom: calc(100% + 4px);
      left: var(--space-3);
    }

    /* ━━━ Editor Area ━━━ */
    .editor-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: var(--space-8);
    }

    #editor-canvas {
      width: 595px;
      height: 842px;
      background: #ffffff;
      border-radius: 4px;
      box-shadow:
        0 4px 24px rgba(0,0,0,0.4),
        0 1px 4px rgba(0,0,0,0.3),
        0 0 0 1px rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .canvas-placeholder {
      font-size: 15px;
      color: var(--text-on-white);
      opacity: 0.4;
      user-select: none;
    }

    /* ━━━ Status dot ━━━ */
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: var(--radius-full);
      background: var(--color-success);
      margin-right: var(--space-2);
      transition: background var(--transition-fast);
    }

    .status-dot.saving { background: var(--color-warning); }
    .status-dot.offline { background: var(--color-warning); }

    /* ━━━ Cover Page Module ━━━ */
    .cover-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 48px 32px;
      font-family: var(--font-ui);
      color: var(--text-on-white);
      overflow-y: auto;
    }

    .cover-page input,
    .cover-page select {
      font-family: var(--font-ui);
      color: var(--text-on-white);
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      text-align: center;
    }

    .cover-page input::placeholder {
      color: rgba(15,23,42,0.30);
    }

    .cover-page input:hover,
    .cover-page select:hover {
      background: rgba(56,189,248,0.04);
    }

    .cover-page input:focus,
    .cover-page select:focus {
      background: rgba(56,189,248,0.06);
      border-radius: 4px;
    }

    .cover-dept {
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(15,23,42,0.50);
      padding: 6px 8px;
      margin-bottom: 16px;
    }

    .cover-photo-zone {
      width: 380px;
      height: 240px;
      border: 2px dashed rgba(15,23,42,0.18);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
      transition: border-color var(--transition-fast), background var(--transition-fast);
      flex-shrink: 0;
    }

    .cover-photo-zone:hover {
      border-color: rgba(56,189,248,0.4);
      background: rgba(56,189,248,0.03);
    }

    .cover-photo-zone.dragover {
      border-color: var(--color-primary);
      background: rgba(56,189,248,0.08);
    }

    .cover-photo-zone.has-image {
      border: none;
    }

    .cover-photo-placeholder {
      text-align: center;
      color: rgba(15,23,42,0.30);
      font-size: 13px;
      pointer-events: none;
    }

    .cover-photo-placeholder .icon {
      font-size: 32px;
      display: block;
      margin-bottom: 8px;
    }

    .cover-photo-zone img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .cover-photo-actions {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
      gap: 4px;
    }

    .cover-photo-zone.has-image:hover .cover-photo-actions {
      display: flex;
    }

    .photo-action-btn {
      padding: 4px 10px;
      font-size: 11px;
      font-family: var(--font-ui);
      color: #fff;
      background: rgba(0,0,0,0.55);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background var(--transition-fast);
    }

    .photo-action-btn:hover {
      background: rgba(0,0,0,0.75);
    }

    .photo-action-btn.danger:hover {
      background: rgba(239,68,68,0.8);
    }

    .cover-project-name {
      font-size: 26px;
      font-weight: 700;
      padding: 8px;
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }

    .cover-model {
      font-size: 17px;
      font-weight: 500;
      padding: 6px 8px;
      margin-bottom: 24px;
      color: rgba(15,23,42,0.65);
    }

    .cover-meta-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 16px;
      align-items: center;
      width: 100%;
      max-width: 380px;
      margin-top: auto;
      padding-top: 16px;
    }

    .cover-meta-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(15,23,42,0.45);
      text-align: right;
      white-space: nowrap;
    }

    .cover-meta-grid input,
    .cover-meta-grid select {
      text-align: left;
      font-size: 14px;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .cover-meta-grid select {
      cursor: pointer;
      appearance: auto;
    }

    /* ━━━ Conclusion Page Module ━━━ */
    .conclusion-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 32px 40px 24px;
      font-family: var(--font-ui);
      color: var(--text-on-white);
      overflow-y: auto;
      gap: 20px;
    }

    .concl-section {
      flex-shrink: 0;
    }

    .concl-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(15,23,42,0.38);
      margin-bottom: 8px;
    }

    /* Summary rich text */
    .concl-summary {
      min-height: 72px;
      padding: 10px 12px;
      border: 1px solid rgba(15,23,42,0.10);
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-on-white);
      outline: none;
      transition: border-color var(--transition-fast);
    }

    .concl-summary:empty::before {
      content: attr(data-placeholder);
      color: rgba(15,23,42,0.25);
      pointer-events: none;
    }

    .concl-summary:focus {
      border-color: rgba(56,189,248,0.4);
    }

    /* Compliance table */
    .concl-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .concl-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(15,23,42,0.45);
      padding: 6px 8px;
      border-bottom: 2px solid rgba(15,23,42,0.10);
    }

    .concl-table td {
      padding: 5px 8px;
      border-bottom: 1px solid rgba(15,23,42,0.06);
      vertical-align: middle;
    }

    .concl-table input {
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-on-white);
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      padding: 2px 0;
    }

    .concl-table input::placeholder {
      color: rgba(15,23,42,0.22);
    }

    .concl-table input:focus {
      background: rgba(56,189,248,0.04);
    }

    .concl-table select {
      font-family: var(--font-ui);
      font-size: 12px;
      border: none;
      outline: none;
      background: transparent;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      appearance: auto;
    }

    .concl-verdict-pass { background: rgba(34,197,94,0.12); color: #166534; }
    .concl-verdict-warning { background: rgba(250,204,21,0.18); color: #854d0e; }
    .concl-verdict-fail { background: rgba(239,68,68,0.12); color: #991b1b; }

    .concl-add-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: var(--font-ui);
      color: rgba(56,189,248,0.8);
      background: transparent;
      border: 1px dashed rgba(56,189,248,0.25);
      border-radius: 4px;
      cursor: pointer;
      transition: background var(--transition-fast), border-color var(--transition-fast);
    }

    .concl-add-btn:hover {
      background: rgba(56,189,248,0.06);
      border-color: rgba(56,189,248,0.5);
    }

    /* Issues list */
    .concl-issues-list {
      list-style: none;
      padding: 0;
    }

    .concl-issue-item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 4px;
    }

    .concl-issue-bullet {
      color: rgba(15,23,42,0.30);
      font-size: 13px;
      line-height: 1.7;
      flex-shrink: 0;
      user-select: none;
    }

    .concl-issue-input {
      flex: 1;
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--text-on-white);
      border: none;
      outline: none;
      background: transparent;
      padding: 2px 0;
      line-height: 1.7;
      border-bottom: 1px dashed rgba(15,23,42,0.08);
    }

    .concl-issue-input::placeholder {
      color: rgba(15,23,42,0.22);
    }

    .concl-issue-input:focus {
      border-bottom-color: rgba(56,189,248,0.3);
    }

    /* Actions table */
    .concl-actions-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .concl-actions-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(15,23,42,0.45);
      padding: 6px 8px;
      border-bottom: 2px solid rgba(15,23,42,0.10);
    }

    .concl-actions-table td {
      padding: 5px 8px;
      border-bottom: 1px solid rgba(15,23,42,0.06);
    }

    .concl-actions-table input {
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-on-white);
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      padding: 2px 0;
    }

    .concl-actions-table input::placeholder {
      color: rgba(15,23,42,0.22);
    }

    .concl-actions-table input:focus {
      background: rgba(56,189,248,0.04);
    }

    /* ━━━ Image Page Module (A4 Landscape 842×595) ━━━ */
    #editor-canvas.landscape {
      width: 842px;
      height: 595px;
    }

    .image-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 20px 24px 16px;
      font-family: var(--font-ui);
      color: var(--text-on-white);
      overflow: hidden;
    }

    .image-page-title {
      font-size: 18px;
      font-weight: 700;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-on-white);
      width: 100%;
      padding: 6px 8px;
      margin-bottom: 12px;
      font-family: var(--font-ui);
      flex-shrink: 0;
    }

    .image-page-title::placeholder {
      color: rgba(15,23,42,0.28);
    }

    .image-page-title:hover {
      background: rgba(56,189,248,0.04);
    }

    .image-page-title:focus {
      background: rgba(56,189,248,0.06);
      border-radius: 4px;
    }

    .image-grid {
      flex: 1;
      display: grid;
      gap: 10px;
      min-height: 0;
    }

    .image-grid.layout-0 {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }

    .image-grid.layout-1 {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }

    .image-grid.layout-2 {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
    }

    .image-grid.layout-3,
    .image-grid.layout-4 {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }

    .image-cell {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
    }

    .image-drop-zone {
      flex: 1;
      border: 2px dashed rgba(15,23,42,0.15);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color var(--transition-fast), background var(--transition-fast);
      min-height: 0;
    }

    .image-drop-zone:hover {
      border-color: rgba(56,189,248,0.4);
      background: rgba(56,189,248,0.03);
    }

    .image-drop-zone.dragover {
      border-color: var(--color-primary);
      background: rgba(56,189,248,0.08);
    }

    .image-drop-zone.has-image {
      border: 1px solid rgba(15,23,42,0.08);
    }

    .image-drop-zone img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .image-drop-placeholder {
      text-align: center;
      color: rgba(15,23,42,0.25);
      font-size: 13px;
      pointer-events: none;
    }

    .image-drop-placeholder .plus-icon {
      font-size: 28px;
      display: block;
      margin-bottom: 4px;
      font-weight: 300;
      color: rgba(15,23,42,0.20);
    }

    .image-cell-actions {
      display: none;
      position: absolute;
      top: 6px;
      right: 6px;
      gap: 4px;
      z-index: 5;
    }

    .image-drop-zone.has-image:hover .image-cell-actions {
      display: flex;
    }

    .image-caption {
      font-size: 12px;
      color: rgba(15,23,42,0.55);
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      padding: 4px 6px;
      margin-top: 4px;
      font-family: var(--font-ui);
      border-bottom: 1px dashed rgba(15,23,42,0.12);
      flex-shrink: 0;
    }

    .image-caption::placeholder {
      color: rgba(15,23,42,0.25);
    }

    .image-caption:hover {
      background: rgba(56,189,248,0.03);
    }

    .image-caption:focus {
      background: rgba(56,189,248,0.05);
      border-bottom-color: var(--color-primary);
    }

    /* ━━━ Annotation Page Module ━━━ */
    .annotation-page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      font-family: var(--font-ui);
      color: var(--text-on-white);
      overflow: hidden;
      position: relative;
    }

    .annotation-title {
      font-size: 16px;
      font-weight: 700;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-on-white);
      width: 100%;
      padding: 12px 16px 8px;
      font-family: var(--font-ui);
      flex-shrink: 0;
      z-index: 5;
    }

    .annotation-title::placeholder {
      color: rgba(15,23,42,0.28);
    }

    .annotation-title:hover {
      background: rgba(56,189,248,0.04);
    }

    .annotation-title:focus {
      background: rgba(56,189,248,0.06);
    }

    .annotation-workspace {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .annotation-photo-zone {
      position: absolute;
      top: 60px;
      left: 80px;
      right: 80px;
      bottom: 60px;
      border: 2px dashed rgba(15,23,42,0.15);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      transition: border-color var(--transition-fast), background var(--transition-fast);
    }

    .annotation-photo-zone:hover {
      border-color: rgba(56,189,248,0.4);
      background: rgba(56,189,248,0.03);
    }

    .annotation-photo-zone.dragover {
      border-color: var(--color-primary);
      background: rgba(56,189,248,0.08);
    }

    .annotation-photo-zone.has-photo {
      border: 1px solid rgba(15,23,42,0.08);
      cursor: crosshair;
    }

    .annotation-photo-zone.has-photo:hover {
      background: transparent;
    }

    .annotation-photo-zone img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .annotation-photo-placeholder {
      text-align: center;
      color: rgba(15,23,42,0.25);
      font-size: 13px;
      pointer-events: none;
    }

    .annotation-photo-placeholder .icon {
      font-size: 32px;
      display: block;
      margin-bottom: 6px;
    }

    .annotation-svg-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .annotation-svg-overlay line {
      stroke: #dc2626;
      stroke-width: 1.5;
      pointer-events: none;
    }

    .marker-dot {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #dc2626;
      border: 2px solid #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      z-index: 15;
      transform: translate(-50%, -50%);
      user-select: none;
    }

    .marker-dot:hover {
      transform: translate(-50%, -50%) scale(1.15);
      box-shadow: 0 2px 8px rgba(220,38,38,0.4);
    }

    .marker-label {
      position: absolute;
      min-width: 80px;
      padding: 4px 8px;
      background: #fff;
      border: 1.5px solid #333;
      border-radius: 4px;
      font-size: 11px;
      font-family: var(--font-ui);
      color: var(--text-on-white);
      cursor: move;
      z-index: 20;
      outline: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
      white-space: nowrap;
    }

    .marker-label:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px rgba(56,189,248,0.2);
    }

    .marker-label::placeholder {
      color: rgba(15,23,42,0.25);
    }

    .annotation-drag-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 12;
    }

    .annotation-drag-line line {
      stroke: #dc2626;
      stroke-width: 1.5;
      stroke-dasharray: 4 3;
    }

    /* ━━━ Preview Overlay ━━━ */
    .preview-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: #000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .preview-overlay.open {
      display: flex;
    }

    .preview-close {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 28px;
      color: rgba(255,255,255,0.6);
      background: none;
      border: none;
      cursor: pointer;
      z-index: 10001;
      line-height: 1;
      padding: 4px 10px;
      border-radius: 6px;
      transition: color var(--transition-fast), background var(--transition-fast);
    }

    .preview-close:hover {
      color: #fff;
      background: rgba(255,255,255,0.1);
    }

    .preview-canvas-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      padding: 32px;
    }

    .preview-canvas-wrap > div {
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    .preview-footer {
      padding: 12px 0 20px;
      font-size: 14px;
      color: rgba(255,255,255,0.50);
      user-select: none;
    }

    /* ━━━ PDF Export helper ━━━ */
    .pdf-render-stage {
      position: fixed;
      left: -9999px;
      top: 0;
      z-index: -1;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Toolbar -->
    <header class="toolbar">
      <div class="toolbar-left">🌡 Thermal Report Builder</div>
      <div class="toolbar-center">
        <div class="dropdown-wrap">
          <button class="glass-btn" id="toolbar-add-btn">+ 新增頁面 ▾</button>
          <div class="dropdown-menu" id="toolbar-add-menu">
            <button class="dropdown-item" data-type="cover">🏠 封面頁</button>
            <button class="dropdown-item" data-type="image">🖼 圖片頁</button>
            <button class="dropdown-item" data-type="annotation">📍 標註頁</button>
            <button class="dropdown-item" data-type="conclusion">📝 結論頁</button>
          </div>
        </div>
        <button class="glass-btn" id="btn-preview">預覽</button>
        <button class="glass-btn" id="btn-export-pdf">匯出 PDF</button>
      </div>
      <div class="toolbar-right" id="status-bar">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">就緒</span>
      </div>
    </header>

    <div class="body">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">頁面列表</div>
        <div id="page-list"></div>
        <div class="sidebar-footer">
          <div class="dropdown-wrap">
            <button class="sidebar-add-btn" id="sidebar-add-btn">+ 新增頁面</button>
            <div class="dropdown-menu" id="sidebar-add-menu">
              <button class="dropdown-item" data-type="cover">🏠 封面頁</button>
              <button class="dropdown-item" data-type="image">🖼 圖片頁</button>
              <button class="dropdown-item" data-type="annotation">📍 標註頁</button>
              <button class="dropdown-item" data-type="conclusion">📝 結論頁</button>
            </div>
          </div>
        </div>
      </aside>

      <!-- Editor -->
      <main class="editor-area">
        <div id="editor-canvas">
          <span class="canvas-placeholder" id="canvas-placeholder">← 請從左側選擇或新增頁面</span>
        </div>
      </main>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="context-menu">
    <button class="context-item" id="context-duplicate" style="color: var(--text-primary);">📋 複製此頁</button>
    <button class="context-item" id="context-delete">🗑 刪除此頁面</button>
  </div>

  <!-- Preview Overlay -->
  <div class="preview-overlay" id="preview-overlay">
    <button class="preview-close" id="preview-close">✕</button>
    <div class="preview-canvas-wrap" id="preview-canvas-wrap"></div>
    <div class="preview-footer" id="preview-footer"></div>
  </div>

  <script>
    // ━━━ App State ━━━
    const state = {
      reportId: null,
      pages: [],          // [{id, type, order, data}]
      activePage: null,   // index into pages[]
      saveTimer: null,
    };

    // ━━━ DOM refs ━━━
    const $pageList = document.getElementById('page-list');
    const $canvas = document.getElementById('editor-canvas');
    const $placeholder = document.getElementById('canvas-placeholder');
    const $statusDot = document.getElementById('status-dot');
    const $statusText = document.getElementById('status-text');
    const $contextMenu = document.getElementById('context-menu');

    // ━━━ Status helpers ━━━
    function setStatus(type, text) {
      $statusDot.className = 'status-dot' + (type === 'saving' ? ' saving' : type === 'offline' ? ' offline' : '');
      $statusText.textContent = text;
    }

    // ━━━ Report ID management ━━━
    function getOrCreateReportId() {
      let id = localStorage.getItem('thermal_current_report');
      if (!id) {
        id = 'rpt_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
        localStorage.setItem('thermal_current_report', id);
      }
      return id;
    }

    // ━━━ Firebase helpers (wait for module to load) ━━━
    function waitForFirebase() {
      return new Promise((resolve) => {
        const check = () => {
          if (window._db) resolve();
          else setTimeout(check, 50);
        };
        check();
      });
    }

    async function savePageToFirestore(pageIndex) {
      if (!window._db) return;
      const page = state.pages[pageIndex];
      if (!page) return;

      setStatus('saving', '儲存中...');

      try {
        const docRef = window._doc(window._db, 'thermal_reports', state.reportId, 'pages', String(page.order));
        await window._setDoc(docRef, {
          type: page.type,
          order: page.order,
          data: page.data,
          updated_at: new Date().toISOString(),
        });
        setStatus('saved', '已儲存 ✅');
        console.log('✅ Saved page', page.order, 'to Firestore');
      } catch (err) {
        console.error('Save error:', err);
        if (err.code === 'unavailable' || err.message.includes('offline')) {
          setStatus('offline', '離線模式 ⚠️');
        } else {
          setStatus('saved', '已儲存 ✅');
        }
      }
    }

    async function loadPageFromFirestore(pageOrder) {
      if (!window._db) return null;
      try {
        const docRef = window._doc(window._db, 'thermal_reports', state.reportId, 'pages', String(pageOrder));
        const snap = await window._getDoc(docRef);
        if (snap.exists()) {
          return snap.data();
        }
      } catch (err) {
        console.warn('Load error:', err);
      }
      return null;
    }

    async function deletePageFromFirestore(pageOrder) {
      if (!window._db) return;
      try {
        const docRef = window._doc(window._db, 'thermal_reports', state.reportId, 'pages', String(pageOrder));
        await window._deleteDoc(docRef);
        console.log('🗑 Deleted page', pageOrder, 'from Firestore');
      } catch (err) {
        console.warn('Delete error:', err);
      }
    }

    // ━━━ Debounced auto-save ━━━
    const saveTimers = {};
    function scheduleSave(pageIndex) {
      if (saveTimers[pageIndex]) clearTimeout(saveTimers[pageIndex]);
      saveTimers[pageIndex] = setTimeout(() => {
        delete saveTimers[pageIndex];
        savePageToFirestore(pageIndex);
      }, 1000);
    }

    // ━━━ Image handling (base64 / Storage) ━━━
    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function processImage(file) {
      const MAX_BASE64_SIZE = 500 * 1024; // 500KB

      if (file.size < MAX_BASE64_SIZE) {
        return await fileToDataURL(file);
      }

      // Upload to Firebase Storage
      if (!window._storage) {
        // Fallback to base64 if storage unavailable
        return await fileToDataURL(file);
      }

      try {
        setStatus('saving', '上傳圖片中...');
        const path = `reports/${state.reportId}/img_${Date.now()}_${file.name}`;
        const sRef = window._storageRef(window._storage, path);
        await window._uploadBytes(sRef, file);
        const url = await window._getDownloadURL(sRef);
        setStatus('saved', '已儲存 ✅');
        return url;
      } catch (err) {
        console.warn('Storage upload failed, falling back to base64:', err);
        return await fileToDataURL(file);
      }
    }

    // ━━━ Dropdown logic ━━━
    function setupDropdown(btnId, menuId) {
      const btn = document.getElementById(btnId);
      const menu = document.getElementById(menuId);

      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        // Close all other dropdowns
        document.querySelectorAll('.dropdown-menu.open').forEach(m => {
          if (m !== menu) m.classList.remove('open');
        });
        menu.classList.toggle('open');
      });

      menu.querySelectorAll('.dropdown-item').forEach(item => {
        item.addEventListener('click', (e) => {
          e.stopPropagation();
          menu.classList.remove('open');
          const type = item.dataset.type;
          if (type === 'cover') addCoverPage();
          else if (type === 'image') addImagePage();
          else if (type === 'annotation') addAnnotationPage();
          else if (type === 'conclusion') addConclusionPage();
        });
      });
    }

    // Close dropdowns / context menu on outside click
    document.addEventListener('click', () => {
      document.querySelectorAll('.dropdown-menu.open').forEach(m => m.classList.remove('open'));
      $contextMenu.classList.remove('open');
    });

    // ━━━ Page management ━━━
    function addCoverPage() {
      const today = new Date().toISOString().slice(0, 10);
      const page = {
        id: 'page_' + Date.now(),
        type: 'cover',
        order: state.pages.length,
        data: {
          project_name: '',
          model: '',
          stage: 'DVT',
          tested_by: '',
          date: today,
          dept: '',
          report_version: 'v1.0',
          cover_image: '',
        }
      };
      state.pages.push(page);
      renderPageList();
      selectPage(state.pages.length - 1);
      scheduleSave(state.pages.length - 1);
    }

    function renderPageList() {
      $pageList.innerHTML = '';
      state.pages.forEach((page, idx) => {
        const el = document.createElement('div');
        el.className = 'page-item' + (idx === state.activePage ? ' active' : '');
        el.dataset.index = idx;

        let icon = '📄';
        let label = '未知頁面';
        if (page.type === 'cover') { icon = '🏠'; label = '封面頁'; }
        if (page.type === 'image') {
          icon = '🖼';
          let imgCount = 0;
          for (let j = 0; j <= idx; j++) {
            if (state.pages[j].type === 'image') imgCount++;
          }
          label = '圖片頁 ' + imgCount;
        }
        if (page.type === 'annotation') { icon = '📍'; label = '標註頁'; }
        if (page.type === 'conclusion') { icon = '📝'; label = '結論頁'; }

        el.textContent = icon + ' ' + label;

        el.addEventListener('click', () => selectPage(idx));
        el.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          showContextMenu(e, idx);
        });

        $pageList.appendChild(el);
      });
    }

    function selectPage(idx) {
      state.activePage = idx;
      renderPageList();
      renderCanvas();
    }

    // ━━━ Context menu ━━━
    let contextTarget = null;

    function showContextMenu(e, pageIdx) {
      contextTarget = pageIdx;
      $contextMenu.style.left = e.clientX + 'px';
      $contextMenu.style.top = e.clientY + 'px';
      $contextMenu.classList.add('open');
    }

    document.getElementById('context-delete').addEventListener('click', () => {
      $contextMenu.classList.remove('open');
      if (contextTarget === null) return;

      if (!confirm('確定要刪除此頁面嗎？')) return;

      const page = state.pages[contextTarget];
      deletePageFromFirestore(page.order);
      state.pages.splice(contextTarget, 1);

      // Re-index orders
      state.pages.forEach((p, i) => p.order = i);

      if (state.activePage >= state.pages.length) {
        state.activePage = state.pages.length - 1;
      }
      if (state.pages.length === 0) state.activePage = null;

      renderPageList();
      renderCanvas();
      contextTarget = null;
    });

    // ━━━ Duplicate page ━━━
    document.getElementById('context-duplicate').addEventListener('click', () => {
      $contextMenu.classList.remove('open');
      if (contextTarget === null) return;

      const src = state.pages[contextTarget];
      const clone = {
        id: 'page_' + Date.now(),
        type: src.type,
        order: contextTarget + 1,
        data: JSON.parse(JSON.stringify(src.data)),
      };

      // Insert after source
      state.pages.splice(contextTarget + 1, 0, clone);
      // Re-index orders
      state.pages.forEach((p, i) => p.order = i);

      renderPageList();
      selectPage(contextTarget + 1);
      // Save the new page and any reordered pages after it
      for (let i = contextTarget + 1; i < state.pages.length; i++) {
        scheduleSave(i);
      }
      contextTarget = null;
    });

    // ━━━ Canvas rendering ━━━
    function renderCanvas() {
      if (state.activePage === null || state.activePage < 0 || !state.pages[state.activePage]) {
        $canvas.classList.remove('landscape');
        $canvas.innerHTML = '<span class="canvas-placeholder">← 請從左側選擇或新增頁面</span>';
        return;
      }

      const page = state.pages[state.activePage];
      // Switch canvas orientation
      if (page.type === 'image' || page.type === 'annotation') {
        $canvas.classList.add('landscape');
      } else {
        $canvas.classList.remove('landscape');
      }

      if (page.type === 'cover') {
        renderCoverPage(page);
      } else if (page.type === 'image') {
        renderImagePage(page);
      } else if (page.type === 'annotation') {
        renderAnnotationPage(page);
      } else if (page.type === 'conclusion') {
        renderConclusionPage(page);
      }
    }

    function renderCoverPage(page) {
      const d = page.data;
      const hasImage = !!d.cover_image;

      $canvas.innerHTML = `
        <div class="cover-page">
          <input class="cover-dept" type="text" placeholder="公司 / 部門名稱"
                 value="${escapeAttr(d.dept)}" data-field="dept">

          <div class="cover-photo-zone ${hasImage ? 'has-image' : ''}" id="cover-photo-zone">
            ${hasImage
              ? `<img src="${escapeAttr(d.cover_image)}" alt="Cover">
                 <div class="cover-photo-actions">
                   <button class="photo-action-btn" id="photo-replace">替換</button>
                   <button class="photo-action-btn danger" id="photo-delete">刪除</button>
                 </div>`
              : `<div class="cover-photo-placeholder">
                   <span class="icon">📷</span>
                   拖拉圖片、點擊選檔，或 Ctrl+V 貼上
                 </div>`
            }
            <input type="file" accept="image/*" id="cover-file-input" style="display:none">
          </div>

          <input class="cover-project-name" type="text" placeholder="案名（Project Name）"
                 value="${escapeAttr(d.project_name)}" data-field="project_name">
          <input class="cover-model" type="text" placeholder="產品型號（Model）"
                 value="${escapeAttr(d.model)}" data-field="model">

          <div class="cover-meta-grid">
            <span class="cover-meta-label">Stage</span>
            <select data-field="stage">
              ${['Prototype','EVT','DVT','PVT','MP'].map(s =>
                `<option value="${s}" ${d.stage === s ? 'selected' : ''}>${s}</option>`
              ).join('')}
            </select>

            <span class="cover-meta-label">Version</span>
            <input type="text" placeholder="v1.0" value="${escapeAttr(d.report_version)}" data-field="report_version">

            <span class="cover-meta-label">Date</span>
            <input type="date" value="${escapeAttr(d.date)}" data-field="date">

            <span class="cover-meta-label">Tested By</span>
            <input type="text" placeholder="工程師姓名" value="${escapeAttr(d.tested_by)}" data-field="tested_by">
          </div>
        </div>
      `;

      // Bind field change events
      $canvas.querySelectorAll('[data-field]').forEach(el => {
        const eventType = el.tagName === 'SELECT' ? 'change' : 'input';
        el.addEventListener(eventType, (e) => {
          page.data[el.dataset.field] = el.value;
          scheduleSave(state.activePage);
        });
      });

      // Image handling
      setupCoverImageHandlers(page);
    }

    function setupCoverImageHandlers(page) {
      const zone = document.getElementById('cover-photo-zone');
      const fileInput = document.getElementById('cover-file-input');
      if (!zone || !fileInput) return;

      // Click to select file
      zone.addEventListener('click', (e) => {
        if (e.target.closest('.photo-action-btn')) return;
        fileInput.click();
      });

      fileInput.addEventListener('change', async () => {
        if (fileInput.files.length > 0) {
          await handleCoverImage(page, fileInput.files[0]);
        }
      });

      // Drag & Drop
      zone.addEventListener('dragover', (e) => {
        e.preventDefault();
        zone.classList.add('dragover');
      });

      zone.addEventListener('dragleave', () => {
        zone.classList.remove('dragover');
      });

      zone.addEventListener('drop', async (e) => {
        e.preventDefault();
        zone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
          await handleCoverImage(page, file);
        }
      });

      // Replace / Delete buttons
      const replaceBtn = document.getElementById('photo-replace');
      const deleteBtn = document.getElementById('photo-delete');

      if (replaceBtn) {
        replaceBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          fileInput.click();
        });
      }

      if (deleteBtn) {
        deleteBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          page.data.cover_image = '';
          renderCoverPage(page);
          scheduleSave(state.activePage);
        });
      }

      // Ctrl+V paste
      document.addEventListener('paste', handlePaste);
    }

    async function handlePaste(e) {
      if (state.activePage === null) return;
      const page = state.pages[state.activePage];

      const items = e.clipboardData?.items;
      if (!items) return;

      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const file = item.getAsFile();
          if (!file) return;

          if (page.type === 'cover') {
            await handleCoverImage(page, file);
          } else if (page.type === 'image') {
            await handleImagePagePaste(page, file);
          } else if (page.type === 'annotation') {
            await handleAnnotationPhoto(page, file);
          }
          return;
        }
      }
    }

    async function handleCoverImage(page, file) {
      const imageData = await processImage(file);
      page.data.cover_image = imageData;
      renderCoverPage(page);
      scheduleSave(state.activePage);
    }

    // ━━━ Image Page Module ━━━
    function addImagePage() {
      const page = {
        id: 'page_' + Date.now(),
        type: 'image',
        order: state.pages.length,
        data: {
          title: '',
          images: [] // [{position: 0-3, url_or_base64: '', caption: ''}]
        }
      };
      state.pages.push(page);
      renderPageList();
      selectPage(state.pages.length - 1);
      scheduleSave(state.pages.length - 1);
    }

    function renderImagePage(page) {
      const d = page.data;
      const imgs = d.images || [];
      const count = imgs.length;
      const layoutClass = 'layout-' + Math.min(count, 4);

      // Determine which cells to show
      let cellCount;
      if (count === 0) cellCount = 1;       // single full placeholder
      else if (count < 4) cellCount = count + 1; // existing + 1 placeholder
      else cellCount = 4;

      // For layout-0 (no images), show single big placeholder
      // For layout-1 (1 image), show just the 1 cell (full)
      // For layout-2, show 2 cells top row
      // For layout-3, show 3 cells + 1 placeholder
      // For layout-4, show 4 cells

      let gridCells = '';

      if (count === 0) {
        // Single full-page placeholder
        gridCells = buildImageCell(null, 0, page);
      } else {
        // Render existing images in order
        for (let i = 0; i < count; i++) {
          gridCells += buildImageCell(imgs[i], i, page);
        }
        // Add placeholder for next slot if < 4
        if (count < 4) {
          gridCells += buildImageCell(null, count, page);
        }
      }

      $canvas.innerHTML = `
        <div class="image-page">
          <input class="image-page-title" type="text" placeholder="點此輸入標題"
                 value="${escapeAttr(d.title)}" data-field="title">
          <div class="image-grid ${layoutClass}">
            ${gridCells}
          </div>
        </div>
      `;

      // Bind title
      const titleInput = $canvas.querySelector('[data-field="title"]');
      if (titleInput) {
        titleInput.addEventListener('input', () => {
          page.data.title = titleInput.value;
          scheduleSave(state.activePage);
        });
      }

      // Bind caption inputs
      $canvas.querySelectorAll('.image-caption').forEach(cap => {
        cap.addEventListener('input', () => {
          const pos = parseInt(cap.dataset.pos);
          if (page.data.images[pos]) {
            page.data.images[pos].caption = cap.value;
            scheduleSave(state.activePage);
          }
        });
      });

      // Bind image zone interactions
      setupImagePageHandlers(page);
    }

    function buildImageCell(imgData, position, page) {
      const hasImage = imgData && imgData.url_or_base64;

      if (hasImage) {
        return `
          <div class="image-cell">
            <div class="image-drop-zone has-image" data-pos="${position}">
              <img src="${escapeAttr(imgData.url_or_base64)}" alt="Image ${position + 1}">
              <div class="image-cell-actions">
                <button class="photo-action-btn img-replace-btn" data-pos="${position}">替換</button>
                <button class="photo-action-btn danger img-delete-btn" data-pos="${position}">刪除</button>
              </div>
              <input type="file" accept="image/*" class="img-file-input" data-pos="${position}" style="display:none">
            </div>
            <input class="image-caption" type="text" placeholder="點此輸入說明"
                   value="${escapeAttr(imgData.caption || '')}" data-pos="${position}">
          </div>
        `;
      } else {
        return `
          <div class="image-cell">
            <div class="image-drop-zone" data-pos="${position}">
              <div class="image-drop-placeholder">
                <span class="plus-icon">+</span>
                點此或拖拉圖片
              </div>
              <input type="file" accept="image/*" class="img-file-input" data-pos="${position}" style="display:none">
            </div>
          </div>
        `;
      }
    }

    function setupImagePageHandlers(page) {
      const zones = $canvas.querySelectorAll('.image-drop-zone');

      zones.forEach(zone => {
        const pos = parseInt(zone.dataset.pos);
        const fileInput = zone.querySelector('.img-file-input');

        // Click to select
        zone.addEventListener('click', (e) => {
          if (e.target.closest('.photo-action-btn')) return;
          fileInput.click();
        });

        fileInput.addEventListener('change', async () => {
          if (fileInput.files.length > 0) {
            await handleImagePageImage(page, pos, fileInput.files[0]);
          }
        });

        // Drag & Drop
        zone.addEventListener('dragover', (e) => {
          e.preventDefault();
          zone.classList.add('dragover');
        });

        zone.addEventListener('dragleave', () => {
          zone.classList.remove('dragover');
        });

        zone.addEventListener('drop', async (e) => {
          e.preventDefault();
          zone.classList.remove('dragover');
          const file = e.dataTransfer.files[0];
          if (file && file.type.startsWith('image/')) {
            await handleImagePageImage(page, pos, file);
          }
        });

        // Replace / Delete
        const replaceBtn = zone.querySelector('.img-replace-btn');
        const deleteBtn = zone.querySelector('.img-delete-btn');

        if (replaceBtn) {
          replaceBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
          });
        }

        if (deleteBtn) {
          deleteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            page.data.images.splice(pos, 1);
            renderImagePage(page);
            scheduleSave(state.activePage);
          });
        }
      });
    }

    async function handleImagePageImage(page, position, file) {
      const imageData = await processImage(file);

      // If position exists, replace; otherwise add
      if (page.data.images[position]) {
        page.data.images[position].url_or_base64 = imageData;
      } else {
        // Fill up to position
        while (page.data.images.length < position) {
          page.data.images.push({ position: page.data.images.length, url_or_base64: '', caption: '' });
        }
        page.data.images.push({ position: position, url_or_base64: imageData, caption: '' });
      }

      renderImagePage(page);
      scheduleSave(state.activePage);
    }

    async function handleImagePagePaste(page, file) {
      const imgs = page.data.images || [];
      if (imgs.length >= 4) return; // already full
      const nextPos = imgs.length;
      await handleImagePageImage(page, nextPos, file);
    }

    // ━━━ Annotation Page Module ━━━
    let annotationDragState = null; // { markerId, startX, startY } during leader-line drag

        type: 'annotation',

    function renderAnnotationPage(page) {

      $canvas.innerHTML = `

    function setupAnnotationPhotoHandlers(page) {
      const zone = document.getElementById('anno-photo-zone');
      const fileInput = document.getElementById('anno-file-input');
      if (!zone || !fileInput) return;

      zone.addEventListener('click', (e) => {
        if (page.data.photo_url_or_base64) return; // photo already placed, click = add marker
        fileInput.click();
      });

      fileInput.addEventListener('change', async () => {
        if (fileInput.files.length > 0) {
          await handleAnnotationPhoto(page, fileInput.files[0]);
        }
      });

      zone.addEventListener('dragover', (e) => {
        e.preventDefault();
        zone.classList.add('dragover');
      });
      zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
      zone.addEventListener('drop', async (e) => {
        e.preventDefault();
        zone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
          await handleAnnotationPhoto(page, file);

    async function handleAnnotationPhoto(page, file) {
      const imageData = await processImage(file);
      page.data.photo_url_or_base64 = imageData;
      renderAnnotationPage(page);
      scheduleSave(state.activePage);
    }

    function setupAnnotationClickHandler(page) {
      const zone = document.getElementById('anno-photo-zone');
      if (!zone) return;

      zone.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return; // left click only
        if (!page.data.photo_url_or_base64) return;
        // Ignore if clicking an existing marker or label
        if (e.target.closest('.marker-dot') || e.target.closest('.marker-label')) return;

        const rect = zone.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        // Generate marker
        const id = 'm_' + Date.now();
        const num = page.data.markers.length + 1;
        const marker = {
          id,
          x: Math.round(x * 100) / 100,
          y: Math.round(y * 100) / 100,
          label: '',
          label_x: -1, // unset → will be placed on drag release
          label_y: -1,
        };

        page.data.markers.push(marker);

        // Start drag to place label
        const workspace = document.getElementById('anno-workspace');
        const wsRect = workspace.getBoundingClientRect();
        const dotAbsX = e.clientX - wsRect.left;
        const dotAbsY = e.clientY - wsRect.top;

        annotationDragState = { markerId: id, dotAbsX, dotAbsY };

        // Show drag line
        const dragSvg = document.getElementById('anno-drag-svg');
        dragSvg.style.display = 'block';
        const line = dragSvg.querySelector('line');
        line.setAttribute('x1', dotAbsX);
        line.setAttribute('y1', dotAbsY);
        line.setAttribute('x2', dotAbsX);
        line.setAttribute('y2', dotAbsY);

        // Render markers (dot will appear)
        renderAnnotationMarkers(page);
        scheduleSave(state.activePage);
      });

      // Mouse move for drag line
      const workspace = document.getElementById('anno-workspace');
      workspace.addEventListener('mousemove', (e) => {
        if (!annotationDragState) return;
        const wsRect = workspace.getBoundingClientRect();
        const mx = e.clientX - wsRect.left;
        const my = e.clientY - wsRect.top;
        const dragSvg = document.getElementById('anno-drag-svg');
        const line = dragSvg.querySelector('line');
        line.setAttribute('x2', mx);
        line.setAttribute('y2', my);
      });

      // Mouse up for placing label
      workspace.addEventListener('mouseup', (e) => {
        if (!annotationDragState) return;
        const ds = annotationDragState;
        annotationDragState = null;

        const dragSvg = document.getElementById('anno-drag-svg');
        dragSvg.style.display = 'none';

        const wsRect = workspace.getBoundingClientRect();
        const labelAbsX = e.clientX - wsRect.left;
        const labelAbsY = e.clientY - wsRect.top;

        // Convert to % of workspace
        const lxPct = (labelAbsX / wsRect.width) * 100;
        const lyPct = (labelAbsY / wsRect.height) * 100;

        // Update marker data
        const marker = page.data.markers.find(m => m.id === ds.markerId);
        if (marker) {
          // If label was barely dragged, auto-place to the right/left
          const dist = Math.sqrt((labelAbsX - ds.dotAbsX) ** 2 + (labelAbsY - ds.dotAbsY) ** 2);
          if (dist < 15) {
            // Auto place: if dot is in left half, place label right; else left
            const zone = document.getElementById('anno-photo-zone');
            const zRect = zone.getBoundingClientRect();
            const dotClientX = ds.dotAbsX + wsRect.left;
            const midX = zRect.left + zRect.width / 2;
            if (dotClientX < midX) {
              marker.label_x = 85;
            } else {
              marker.label_x = 2;
            }
            marker.label_y = Math.max(2, Math.min(90, lyPct));
          } else {
            marker.label_x = Math.max(0, Math.min(95, lxPct));
            marker.label_y = Math.max(0, Math.min(95, lyPct));
          }
        }

        renderAnnotationMarkers(page);
        scheduleSave(state.activePage);

        // Focus the new label
        setTimeout(() => {
          const labelEl = document.querySelector(`.marker-label[data-id="${ds.markerId}"]`);
          if (labelEl) labelEl.focus();
        }, 50);
      });
    }

    function renderAnnotationMarkers(page) {
      const workspace = document.getElementById('anno-workspace');
      const zone = document.getElementById('anno-photo-zone');
      const svg = document.getElementById('anno-svg');
      if (!workspace || !zone || !svg) return;

      // Remove old markers & labels (but keep photo zone and SVGs)
      workspace.querySelectorAll('.marker-dot, .marker-label').forEach(el => el.remove());
      svg.innerHTML = '';

      const markers = page.data.markers;
      const zoneRect = zone.getBoundingClientRect();
      const wsRect = workspace.getBoundingClientRect();

      // Compute zone offset relative to workspace
      const zoneOffX = zoneRect.left - wsRect.left;
      const zoneOffY = zoneRect.top - wsRect.top;

      markers.forEach((m, idx) => {
        // Dot position: x,y are % of photo zone
        const dotX = zoneOffX + (m.x / 100) * zoneRect.width;
        const dotY = zoneOffY + (m.y / 100) * zoneRect.height;

        // Create dot
        const dot = document.createElement('div');
        dot.className = 'marker-dot';
        dot.style.left = dotX + 'px';
        dot.style.top = dotY + 'px';
        dot.textContent = idx + 1;
        dot.dataset.id = m.id;

        // Right-click to delete
        dot.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (confirm(`刪除標記 #${idx + 1}？`)) {
            page.data.markers = page.data.markers.filter(mk => mk.id !== m.id);
            renderAnnotationMarkers(page);
            scheduleSave(state.activePage);
          }
        });

        workspace.appendChild(dot);

        // Label (only if placed)
        if (m.label_x >= 0 && m.label_y >= 0) {
          const labelX = (m.label_x / 100) * wsRect.width;
          const labelY = (m.label_y / 100) * wsRect.height;

          const label = document.createElement('input');
          label.type = 'text';
          label.className = 'marker-label';
          label.placeholder = `TC${idx + 1} - 元件名稱`;
          label.value = m.label || '';
          label.dataset.id = m.id;
          label.style.left = labelX + 'px';
          label.style.top = labelY + 'px';

          // Editable
          label.addEventListener('input', () => {
            m.label = label.value;
            scheduleSave(state.activePage);
          });

          // Draggable label
          let labelDragging = false;
          let labelOffX = 0, labelOffY = 0;

          label.addEventListener('mousedown', (e) => {
            if (e.target === label && e.button === 0) {
              // Only drag if not focusing for text editing
              labelDragging = true;
              labelOffX = e.clientX - label.getBoundingClientRect().left;
              labelOffY = e.clientY - label.getBoundingClientRect().top;
              e.preventDefault();
            }
          });

          document.addEventListener('mousemove', (e) => {
            if (!labelDragging) return;
            const newX = e.clientX - wsRect.left - labelOffX;
            const newY = e.clientY - wsRect.top - labelOffY;
            label.style.left = newX + 'px';
            label.style.top = newY + 'px';
            // Update SVG line
            updateAnnotationLine(svg, m.id, dotX, dotY, newX + label.offsetWidth / 2, newY + label.offsetHeight / 2);
          });

          document.addEventListener('mouseup', () => {
            if (!labelDragging) return;
            labelDragging = false;
            // Save new position as %
            const rect = workspace.getBoundingClientRect();
            m.label_x = (parseFloat(label.style.left) / rect.width) * 100;
            m.label_y = (parseFloat(label.style.top) / rect.height) * 100;
            scheduleSave(state.activePage);
          });

          // Double-click to edit text
          label.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            label.focus();
            label.select();
          });

          workspace.appendChild(label);

          // Draw SVG leader line
          const labelCenterX = labelX + 40; // approximate center
          const labelCenterY = labelY + 10;
          drawAnnotationLine(svg, m.id, dotX, dotY, labelCenterX, labelCenterY);
        }
      });
    }

    function drawAnnotationLine(svg, markerId, x1, y1, x2, y2) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1);
      line.setAttribute('y1', y1);
      line.setAttribute('x2', x2);
      line.setAttribute('y2', y2);
      line.dataset.markerId = markerId;
      svg.appendChild(line);
    }

    function updateAnnotationLine(svg, markerId, x1, y1, x2, y2) {
      const line = svg.querySelector(`line[data-marker-id="${markerId}"]`);
      if (line) {
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
      }
    }

    // ━━━ Conclusion Page Module ━━━
    function addConclusionPage() {
      const page = {
        id: 'page_' + Date.now(),
        type: 'conclusion',
        order: state.pages.length,
        data: {
          summary: '',
          compliance: [],
          issues: [''],
