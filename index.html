      selectPage(state.pages.length - 1);
      scheduleSave(state.pages.length - 1);
    }

    function getDataPageComponents() {
      // Gather all components from all data pages
      const result = [];
      state.pages.forEach(p => {
        if (p.type !== 'data') return;
        const comps = p.data.components || [];
        const tas = p.data.ta_conditions || [];
        const catCounters = { RF: 0, Digital: 0, PWR: 0 };
        comps.forEach(comp => {
          const cat = comp.category || 'RF';
          catCounters[cat] = (catCounters[cat] || 0) + 1;
          const tcSpec = parseFloat(comp.tc_spec) || 0;
          const derating = parseFloat(comp.derating) || 0.9;
          const derated = tcSpec * derating;

          // Find meas Tc at Ta=55 (or highest Ta)
          let measTc = '';
          const ta55Key = 'ta_55';
          if (comp.readings && comp.readings[ta55Key] !== undefined && comp.readings[ta55Key] !== '') {
            measTc = comp.readings[ta55Key];
          } else if (tas.length > 0) {
            // Fallback: use the last (highest) Ta
            const lastTa = tas[tas.length - 1];
            const lastKey = 'ta_' + lastTa;
            if (comp.readings && comp.readings[lastKey] !== undefined) {
              measTc = comp.readings[lastKey];
            }
          }

          result.push({
            category: cat,
            component_name: comp.name || ('(' + cat + '-' + catCounters[cat] + ')'),
            tc_derated: derated,
            meas_tc: measTc,
            sourceId: cat + '-' + catCounters[cat],
          });
        });
      });
      return result;
    }

    function showComponentSelectModal(page, callback) {
      const available = getDataPageComponents();
      if (available.length === 0) {
        alert('尚無數據頁元件可選取。請先在數據頁新增元件。');
        return;
      }

      // Track already-selected names
      const existing = new Set((page.data.items || []).map(it => it.component_name));

      const overlay = document.createElement('div');
      overlay.className = 'sim-modal-overlay';

      let itemsHTML = available.map((comp, i) => {
        const checked = existing.has(comp.component_name) ? 'checked' : '';
        const catClass = comp.category === 'RF' ? 'cat-rf' : comp.category === 'Digital' ? 'cat-digital' : 'cat-pwr';
        return `<label class="sim-modal-item">
          <input type="checkbox" value="${i}" ${checked}>
          <span class="sim-modal-item-cat ${catClass}">${comp.category}</span>
          <span class="sim-modal-item-label">${escapeAttr(comp.component_name)}</span>
        </label>`;
      }).join('');

      overlay.innerHTML = `
        <div class="sim-modal">
          <div class="sim-modal-header">從數據頁選取元件</div>
          <div class="sim-modal-body">${itemsHTML}</div>
          <div class="sim-modal-footer">
            <button class="sim-modal-btn" id="sim-modal-cancel">取消</button>
            <button class="sim-modal-btn primary" id="sim-modal-confirm">確認選取</button>
          </div>
        </div>
      `;

      document.body.appendChild(overlay);

      overlay.querySelector('#sim-modal-cancel').addEventListener('click', () => {
        document.body.removeChild(overlay);
      });

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) document.body.removeChild(overlay);
      });

      overlay.querySelector('#sim-modal-confirm').addEventListener('click', () => {
        const checked = overlay.querySelectorAll('input[type="checkbox"]:checked');
        const selected = [];
        checked.forEach(cb => {
          const comp = available[parseInt(cb.value)];
          // Preserve existing sim_tc / note if already present
          const existingItem = (page.data.items || []).find(it => it.component_name === comp.component_name);
          selected.push({
            category: comp.category,
            component_name: comp.component_name,
            tc_derated: comp.tc_derated,
            sim_tc: existingItem ? existingItem.sim_tc : '',
            meas_tc: comp.meas_tc,
            note: existingItem ? existingItem.note : '',
          });
        });
        document.body.removeChild(overlay);
        callback(selected);
      });
    }

    function renderSimVsMeasPage(page) {
      const d = page.data;
      if (!d.items) d.items = [];

      const hasSim = !!d.sim_image;
      const hasMeas = !!d.meas_image;

      // Refresh meas_tc from data pages
      const latestComps = getDataPageComponents();
      d.items.forEach(item => {
        const match = latestComps.find(c => c.component_name === item.component_name && c.category === item.category);
        if (match) {
          item.meas_tc = match.meas_tc;
          item.tc_derated = match.tc_derated;
        }
      });

      // Build table rows
      const rows = d.items.map((item, i) => {
        const simTc = parseFloat(item.sim_tc);
        const measTc = parseFloat(item.meas_tc);
        let devC = '—', devPct = '—', judgeText = '—', devCClass = '', devPClass = '', judgeClass = '';

        if (!isNaN(simTc) && !isNaN(measTc)) {
          const dc = simTc - measTc;
          devC = dc.toFixed(1);
          if (measTc !== 0) {
            const dp = (dc / measTc) * 100;
            devPct = dp.toFixed(1) + '%';
            const absDp = Math.abs(dp);
            if (absDp <= 10) {
              devCClass = devPClass = 'sim-dev-good';
              judgeText = '✅'; judgeClass = 'sim-dev-good';
            } else if (absDp <= 20) {
              devCClass = devPClass = 'sim-dev-warn';
              judgeText = '⚠️'; judgeClass = 'sim-dev-warn';
            } else {
              devCClass = devPClass = 'sim-dev-bad';
              judgeText = '❌'; judgeClass = 'sim-dev-bad';
            }
          }
        }

        const catClass = item.category === 'RF' ? 'cat-rf' : item.category === 'Digital' ? 'cat-digital' : 'cat-pwr';

        return `<tr data-sim-row="${i}">
          <td><span class="dt-cat-strip ${catClass}"></span><span class="sim-readonly">${escapeAttr(item.category)}</span></td>
          <td class="sim-readonly">${escapeAttr(item.component_name)}</td>
          <td class="sim-readonly">${item.tc_derated ? parseFloat(item.tc_derated).toFixed(1) : '—'}</td>
          <td><input type="number" step="any" style="width:55px;text-align:center;" placeholder="—" value="${item.sim_tc !== undefined && item.sim_tc !== '' ? escapeAttr(String(item.sim_tc)) : ''}" data-sim-idx="${i}" data-sim-field="sim_tc"></td>
          <td class="sim-readonly">${!isNaN(measTc) ? measTc.toFixed(1) : '—'}</td>
          <td class="${devCClass}" style="text-align:center;">${devC}</td>
          <td class="${devPClass}" style="text-align:center;">${devPct}</td>
          <td class="sim-judge ${judgeClass}">${judgeText}</td>
          <td><input type="text" placeholder="備註" value="${escapeAttr(item.note || '')}" data-sim-idx="${i}" data-sim-field="note"></td>
        </tr>`;
      }).join('');

      $canvas.innerHTML = editorPageWrapHTML(`
        <div class="sim-page">
          <div class="sim-page-top">
            <div class="sim-page-title">Simulation vs Measurement Comparison</div>
            <button class="sim-select-btn" id="sim-select-comp">從數據頁選取元件</button>
          </div>

          <!-- Image pair -->
          <div class="sim-images">
            <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
              <div class="sim-img-zone ${hasSim ? 'has-image' : ''}" id="sim-img-zone-sim">
                ${hasSim
                  ? `<img src="${escapeAttr(d.sim_image)}" alt="FloTHERM">
                     <div class="sim-img-actions">
                       <button class="sim-img-action-btn" id="sim-replace-sim">替換</button>
                       <button class="sim-img-action-btn danger" id="sim-delete-sim">刪除</button>
                     </div>`
                  : `<div class="sim-img-placeholder"><span class="icon">🖥</span>拖拉或 Ctrl+V 貼上<button class="img-browse-btn" data-browse="sim">瀏覽檔案</button></div>`}
                <input type="file" accept="image/*" id="sim-file-sim" style="display:none">
              </div>
              <div class="sim-img-label">FloTHERM Simulation</div>
            </div>
            <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
              <div class="sim-img-zone ${hasMeas ? 'has-image' : ''}" id="sim-img-zone-meas">
                ${hasMeas
                  ? `<img src="${escapeAttr(d.meas_image)}" alt="Measurement">
                     <div class="sim-img-actions">
                       <button class="sim-img-action-btn" id="sim-replace-meas">替換</button>
                       <button class="sim-img-action-btn danger" id="sim-delete-meas">刪除</button>
                     </div>`
                  : `<div class="sim-img-placeholder"><span class="icon">📷</span>拖拉或 Ctrl+V 貼上<button class="img-browse-btn" data-browse="meas">瀏覽檔案</button></div>`}
                <input type="file" accept="image/*" id="sim-file-meas" style="display:none">
              </div>
              <div class="sim-img-label">Measurement (IR / TC)</div>
            </div>
          </div>

          <!-- Comparison table -->
          <div class="sim-table-wrap">
            <table class="sim-table">
              <thead>
                <tr>
                  <th>類別</th>
                  <th>元件名稱</th>
                  <th>Derated</th>
                  <th>Sim Tc</th>
                  <th>Meas Tc</th>
                  <th>Dev (°C)</th>
                  <th>Dev (%)</th>
                  <th>判斷</th>
                  <th>備註</th>
                </tr>
              </thead>
              <tbody id="sim-tbody">${rows}</tbody>
            </table>
          </div>

          <!-- Bottom note -->
          <input class="sim-note-input" type="text" placeholder="請輸入模擬條件說明，如邊界條件假設、功耗設定..."
                 value="${escapeAttr(d.sim_note || '')}" id="sim-note">
        </div>
      `);

      // ── Select components button ──
      document.getElementById('sim-select-comp').addEventListener('click', () => {
        showComponentSelectModal(page, (selected) => {
          d.items = selected;
          scheduleSave(state.activePage);
          renderSimVsMeasPage(page);
        });
      });

      // ── Image handlers ──
      setupSimImageZone(page, 'sim', 'sim_image');
      setupSimImageZone(page, 'meas', 'meas_image');

      // ── Sim Tc input ──
      $canvas.querySelectorAll('[data-sim-field="sim_tc"]').forEach(el => {
        el.addEventListener('input', () => {
          const idx = parseInt(el.dataset.simIdx);
          d.items[idx].sim_tc = el.value;
          scheduleSave(state.activePage);
          // Re-render for computed Dev columns
          renderSimVsMeasPage(page);
        });
      });

      // ── Note fields ──
      $canvas.querySelectorAll('[data-sim-field="note"]').forEach(el => {
        el.addEventListener('input', () => {
          const idx = parseInt(el.dataset.simIdx);
          d.items[idx].note = el.value;
          scheduleSave(state.activePage);
        });
      });

      // ── Bottom sim note ──
      const simNote = document.getElementById('sim-note');
      if (simNote) {
        simNote.addEventListener('input', () => {
          d.sim_note = simNote.value;
          scheduleSave(state.activePage);
        });
      }

      // ── Row right-click delete ──
      const simTbody = document.getElementById('sim-tbody');
      if (simTbody) {
        simTbody.addEventListener('contextmenu', (e) => {
          const tr = e.target.closest('tr[data-sim-row]');
          if (!tr) return;
          e.preventDefault();
          const ri = parseInt(tr.dataset.simRow);
          if (confirm('確定要移除此比對元件？')) {
            d.items.splice(ri, 1);
            scheduleSave(state.activePage);
            renderSimVsMeasPage(page);
          }
        });
      }
    }

    async function handleSimPaste(page, file) {
      const d = page.data;
      // Paste to first empty slot (sim first, then meas)
      if (!d.sim_image) {
        const imageData = await processImage(file);
        d.sim_image = imageData;
        scheduleSave(state.activePage);
        renderSimVsMeasPage(page);
      } else if (!d.meas_image) {
        const imageData = await processImage(file);
        d.meas_image = imageData;
        scheduleSave(state.activePage);
        renderSimVsMeasPage(page);
      }
    }

    function setupSimImageZone(page, key, dataField) {
      const zone = document.getElementById('sim-img-zone-' + key);
      const fileInput = document.getElementById('sim-file-' + key);
      if (!zone || !fileInput) return;

      const handleFile = async (file) => {
        if (!file || !file.type.startsWith('image/')) return;
        const imageData = await processImage(file);
        page.data[dataField] = imageData;
        scheduleSave(state.activePage);
        renderSimVsMeasPage(page);
      };

      // Browse button opens file dialog
      const browseBtn = zone.querySelector('.img-browse-btn');
      if (browseBtn) {
        browseBtn.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });
      }
      // Double-click on empty zone opens file dialog
      zone.addEventListener('dblclick', (e) => {
        if (e.target.closest('.sim-img-action-btn')) return;
        if (!zone.classList.contains('has-image')) fileInput.click();
      });

      fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
      });

      zone.addEventListener('dragover', (e) => {
        e.preventDefault();
        zone.classList.add('dragover');
      });
      zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.classList.remove('dragover');
        if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
      });

      // Replace / Delete
      const replaceBtn = document.getElementById('sim-replace-' + key);
      const deleteBtn = document.getElementById('sim-delete-' + key);

      if (replaceBtn) {
        replaceBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          fileInput.click();
        });
      }

      if (deleteBtn) {
        deleteBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          page.data[dataField] = '';
          scheduleSave(state.activePage);
          renderSimVsMeasPage(page);
        });
      }
    }

    // ━━━ Conclusion Page Module ━━━
    function addConclusionPage() {
      const page = {
        id: 'page_' + Date.now(),
        type: 'conclusion',
        order: state.pages.length,
        data: {
          summary: '',
          compliance: [],
          issues: [''],
          actions: [],
        }
      };
      state.pages.push(page);
      initPageSnapshot(page);
      renderPageList();
      selectPage(state.pages.length - 1);
      scheduleSave(state.pages.length - 1);
    }

    function renderConclusionPage(page) {
      const d = page.data;
      if (!d.issues) d.issues = [''];
      if (!d.compliance) d.compliance = [];
      if (!d.actions) d.actions = [];

      // Build compliance rows
      let complianceRows = '';
      d.compliance.forEach((row, i) => {
        const verdictClass = row.verdict === 'pass' ? 'concl-verdict-pass'
          : row.verdict === 'warning' ? 'concl-verdict-warning'
          : row.verdict === 'fail' ? 'concl-verdict-fail' : '';
        complianceRows += `
          <tr>
            <td><input type="text" placeholder="元件名稱" value="${escapeAttr(row.component)}" data-comp-idx="${i}" data-comp-field="component"></td>
            <td><input type="text" placeholder="°C" value="${escapeAttr(row.tc_max)}" data-comp-idx="${i}" data-comp-field="tc_max"></td>
            <td><input type="text" placeholder="°C" value="${escapeAttr(row.spec)}" data-comp-idx="${i}" data-comp-field="spec"></td>
            <td class="${verdictClass}">
              <select data-comp-idx="${i}" data-comp-field="verdict">
                <option value="" ${!row.verdict ? 'selected' : ''}>—</option>
                <option value="pass" ${row.verdict === 'pass' ? 'selected' : ''}>✅ Pass</option>
                <option value="warning" ${row.verdict === 'warning' ? 'selected' : ''}>⚠️ Warning</option>
                <option value="fail" ${row.verdict === 'fail' ? 'selected' : ''}>❌ Fail</option>
              </select>
            </td>
          </tr>`;
      });

      // Build issues
      let issuesHtml = '';
      d.issues.forEach((issue, i) => {
        issuesHtml += `
          <li class="concl-issue-item">
            <span class="concl-issue-bullet">•</span>
            <input class="concl-issue-input" type="text" placeholder="輸入問題描述..."
                   value="${escapeAttr(issue)}" data-issue-idx="${i}">
          </li>`;
      });

      // Build actions rows
      let actionsRows = '';
      d.actions.forEach((act, i) => {
        actionsRows += `
          <tr>
            <td><input type="text" placeholder="行動描述" value="${escapeAttr(act.description)}" data-act-idx="${i}" data-act-field="description"></td>
            <td><input type="text" placeholder="Owner" value="${escapeAttr(act.owner)}" data-act-idx="${i}" data-act-field="owner"></td>
            <td><input type="date" value="${escapeAttr(act.due_date)}" data-act-idx="${i}" data-act-field="due_date"></td>
          </tr>`;
      });

      $canvas.innerHTML = editorPageWrapHTML(`
        <div class="conclusion-page">
          <!-- 1. Summary -->
          <div class="concl-section">
            <div class="concl-section-title">Conclusion</div>
            <div class="concl-summary" contenteditable="true" data-placeholder="請輸入實驗結論..."
                 id="concl-summary-editor">${d.summary || ''}</div>
          </div>

          <!-- 2. Compliance Summary -->
          <div class="concl-section">
            <div class="concl-section-title">Compliance Summary</div>
            <table class="concl-table">
              <thead>
                <tr>
                  <th style="width:30%">Component</th>
                  <th style="width:20%">Max Tc (°C)</th>
                  <th style="width:20%">Derated Spec</th>
                  <th style="width:30%">Verdict</th>
                </tr>
              </thead>
              <tbody id="compliance-tbody">${complianceRows}</tbody>
            </table>
            <button class="concl-add-btn" id="add-compliance-btn">+ 新增元件</button>
          </div>

          <!-- 3. Issues Found -->
          <div class="concl-section">
            <div class="concl-section-title">Issues Found</div>
            <ul class="concl-issues-list" id="issues-list">${issuesHtml}</ul>
          </div>

          <!-- 4. Next Action -->
          <div class="concl-section">
            <div class="concl-section-title">Next Action</div>
            <table class="concl-actions-table">
              <thead>
                <tr>
                  <th style="width:50%">Action</th>
                  <th style="width:25%">Owner</th>
                  <th style="width:25%">Due Date</th>
                </tr>
              </thead>
              <tbody id="actions-tbody">${actionsRows}</tbody>
            </table>
            <button class="concl-add-btn" id="add-action-btn">+ 新增行動</button>

        </div>

      bindConclusionHandlers(page);
    }

    function bindConclusionHandlers(page) {
      const d = page.data;
      const pageIdx = state.activePage;

      // Summary (contenteditable)
      const summaryEl = document.getElementById('concl-summary-editor');
      if (summaryEl) {
        summaryEl.addEventListener('input', () => {
          d.summary = summaryEl.innerHTML;
          scheduleSave(pageIdx);
        });
        // Ctrl+B for bold
        summaryEl.addEventListener('keydown', (e) => {
          if (e.ctrlKey && e.key === 'b') {
            e.preventDefault();
            document.execCommand('bold');
          }
        });
      }

      // Compliance table inputs
      $canvas.querySelectorAll('[data-comp-idx]').forEach(el => {
        const idx = parseInt(el.dataset.compIdx);
        const field = el.dataset.compField;
        const eventType = el.tagName === 'SELECT' ? 'change' : 'input';
        el.addEventListener(eventType, () => {
          if (d.compliance[idx]) {
            d.compliance[idx][field] = el.value;
            // Re-render to update verdict color
            if (field === 'verdict') {
              renderConclusionPage(page);
            }
            scheduleSave(pageIdx);
          }
        });
      });

      // Add compliance row
      document.getElementById('add-compliance-btn')?.addEventListener('click', () => {
        d.compliance.push({ component: '', tc_max: '', spec: '', verdict: '' });
        renderConclusionPage(page);
        scheduleSave(pageIdx);
        // Focus the last component input
        setTimeout(() => {
          const inputs = $canvas.querySelectorAll('[data-comp-field="component"]');
          inputs[inputs.length - 1]?.focus();
        }, 30);
      });

      // Issues inputs
      $canvas.querySelectorAll('[data-issue-idx]').forEach(el => {
        const idx = parseInt(el.dataset.issueIdx);

        el.addEventListener('input', () => {
          d.issues[idx] = el.value;
          scheduleSave(pageIdx);
        });

        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            // Insert new issue after current
            d.issues.splice(idx + 1, 0, '');
            renderConclusionPage(page);
            scheduleSave(pageIdx);
            setTimeout(() => {
              const inputs = $canvas.querySelectorAll('[data-issue-idx]');
              inputs[idx + 1]?.focus();
            }, 30);
          }
          if (e.key === 'Backspace' && el.value === '' && d.issues.length > 1) {
            e.preventDefault();
            d.issues.splice(idx, 1);
            renderConclusionPage(page);
            scheduleSave(pageIdx);
            setTimeout(() => {
              const inputs = $canvas.querySelectorAll('[data-issue-idx]');
              const focusIdx = Math.max(0, idx - 1);
              inputs[focusIdx]?.focus();
            }, 30);
          }
        });
      });

      // Actions table inputs
      $canvas.querySelectorAll('[data-act-idx]').forEach(el => {
        const idx = parseInt(el.dataset.actIdx);
        const field = el.dataset.actField;
        el.addEventListener('input', () => {
          if (d.actions[idx]) {
            d.actions[idx][field] = el.value;
            scheduleSave(pageIdx);
          }
        });
      });

      // Add action row
      document.getElementById('add-action-btn')?.addEventListener('click', () => {
        d.actions.push({ description: '', owner: '', due_date: '' });
        renderConclusionPage(page);
        scheduleSave(pageIdx);
        setTimeout(() => {
          const inputs = $canvas.querySelectorAll('[data-act-field="description"]');
          inputs[inputs.length - 1]?.focus();
        }, 30);
      });
    }

    // ━━━ Virtual Pages (flattens data page sub-pages for preview/PDF) ━━━
    function buildVirtualPages() {
      const list = [];
      state.pages.forEach((page, pageIdx) => {
        if (page.type === 'data') {
          const subPages = buildDataPagePagesHTML(page.data);
          subPages.forEach(html => {
            list.push({ page, pageIdx, html, isLandscape: true });
          });
        } else {
          let html = '';
          const isLandscape = page.type === 'image' || page.type === 'annotation' || page.type === 'sim_vs_meas';
          if (page.type === 'cover') html = buildCoverHTML(page.data);
          else if (page.type === 'image') html = buildImagePageHTML(page.data);
          else if (page.type === 'annotation') html = buildAnnotationHTML(page.data);
          else if (page.type === 'sim_vs_meas') html = buildSimVsMeasHTML(page.data);
          else if (page.type === 'conclusion') html = buildConclusionHTML(page.data);
          list.push({ page, pageIdx, html, isLandscape });
        }
      });
      return list;
    }

    // ━━━ Preview Mode ━━━
    let previewIdx = 0;
    let _virtualPages = [];

    function openPreview() {
      if (state.pages.length === 0) return;
      _virtualPages = buildVirtualPages();
      if (state.activePage !== null) {
        const vpIdx = _virtualPages.findIndex(vp => vp.pageIdx === state.activePage);
        previewIdx = vpIdx >= 0 ? vpIdx : 0;
      } else {
        previewIdx = 0;
      }
      renderPreviewPage();
      document.getElementById('preview-overlay').classList.add('open');
    }

    function closePreview() {
      document.getElementById('preview-overlay').classList.remove('open');
    }

    function renderPreviewPage() {
      const wrap = document.getElementById('preview-canvas-wrap');
      const footer = document.getElementById('preview-footer');
      const vp = _virtualPages[previewIdx];
      if (!vp) return;

      const isLandscape = vp.isLandscape;
      const w = isLandscape ? 842 : 595;
      const h = isLandscape ? 595 : 842;

      const vw = window.innerWidth - 64;
      const vh = window.innerHeight - 120;
      const scale = Math.min(vw / w, vh / h, 1);

      const el = document.createElement('div');
      el.style.cssText = `width:${w}px;height:${h}px;background:#fff;border-radius:4px;box-shadow:0 8px 40px rgba(0,0,0,0.5);overflow:hidden;transform:scale(${scale});transform-origin:center center;flex-shrink:0;font-family:${getComputedStyle(document.body).fontFamily};`;
      el.innerHTML = vp.html;

      wrap.innerHTML = '';
      wrap.appendChild(el);
      footer.textContent = `第 ${previewIdx + 1} 頁 / 共 ${_virtualPages.length} 頁`;

      const prevBtn = document.getElementById('preview-prev');
      const nextBtn = document.getElementById('preview-next');
      if (prevBtn) prevBtn.disabled = previewIdx <= 0;
      if (nextBtn) nextBtn.disabled = previewIdx >= _virtualPages.length - 1;
    }

    // Preview nav buttons
    document.getElementById('preview-prev').addEventListener('click', () => {
      if (previewIdx > 0) { previewIdx--; renderPreviewPage(); }
    });
    document.getElementById('preview-next').addEventListener('click', () => {
      if (previewIdx < _virtualPages.length - 1) { previewIdx++; renderPreviewPage(); }
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      const overlay = document.getElementById('preview-overlay');
      const isPreviewOpen = overlay.classList.contains('open');

      // Skip if user is typing in an input/textarea/select
      const tag = document.activeElement?.tagName;
      const isTyping = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || document.activeElement?.isContentEditable;

      if (isPreviewOpen) {
        // Preview mode navigation
        if (e.key === 'Escape') {
          closePreview();
        } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
          e.preventDefault();
          if (previewIdx < _virtualPages.length - 1) { previewIdx++; renderPreviewPage(); }
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          e.preventDefault();
          if (previewIdx > 0) { previewIdx--; renderPreviewPage(); }
        }
      } else if (!isTyping && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
        // Editor mode: left/right arrow to flip pages (only when not in an input)
        e.preventDefault();
        if (e.key === 'ArrowLeft' && state.activePage > 0) {
          selectPage(state.activePage - 1);
        } else if (e.key === 'ArrowRight' && state.activePage < state.pages.length - 1) {
          selectPage(state.activePage + 1);
        }
      }
    });

    // ━━━ PDF Export ━━━

    // Offscreen renderer: builds static HTML for a page (no event bindings)
    // NOTE: html2canvas has a known bug with letter-spacing — all builders must avoid it
    const PDF_FONT = "'Space Grotesk','DM Sans','Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif";

    // Delta Blue page wrapper: adds progression bars, corner brackets, footer to all PDF pages
    function wrapPageHTML(innerHtml, opts = {}) {
      const progBar = 'linear-gradient(90deg, #0B3D7A, #2357A7, #3A7AD4, #5BA3E6, #6EC5A0, #4CAF79)';
      const cs = 'position:absolute;width:32px;height:32px;';
      const dept = opts.dept || '';
      return `<div style="width:100%;height:100%;position:relative;">
        <div style="position:absolute;top:0;left:0;right:0;height:10px;background:${progBar};z-index:2;"></div>
        <div style="position:absolute;bottom:0;left:0;right:0;height:10px;background:${progBar};z-index:2;"></div>
        <div style="${cs}top:14px;left:14px;border-top:1.5px solid #8DC4F0;border-left:1.5px solid #8DC4F0;"></div>
        <div style="${cs}top:14px;right:14px;border-top:1.5px solid #8DC4F0;border-right:1.5px solid #8DC4F0;"></div>

    function renderPageOffscreen(page, container) {
      const isLandscape = page.type === 'image' || page.type === 'annotation' || page.type === 'sim_vs_meas' || page.type === 'data';
      const w = isLandscape ? 842 : 595;
      const h = isLandscape ? 595 : 842;

      container.style.cssText = `position:fixed;left:-9999px;top:0;width:${w}px;height:${h}px;background:#fff;z-index:-1;overflow:hidden;font-family:${PDF_FONT};letter-spacing:0px;word-spacing:0px;`;

      // Inject a hard CSS reset to kill any inherited letter-spacing (html2canvas bug workaround)
      const resetStyle = document.createElement('style');
      resetStyle.textContent = '*, *::before, *::after { letter-spacing: 0px !important; word-spacing: 0px !important; text-transform: none !important; }';
      container.appendChild(resetStyle);

      const content = document.createElement('div');
      content.style.cssText = `width:100%;height:100%;letter-spacing:0px;word-spacing:0px;`;

      if (page.type === 'cover') {
        content.innerHTML = buildCoverHTML(page.data);
      } else if (page.type === 'image') {
        content.innerHTML = buildImagePageHTML(page.data);
      } else if (page.type === 'annotation') {
        content.innerHTML = buildAnnotationHTML(page.data);
      } else if (page.type === 'data') {
        content.innerHTML = buildDataPageHTML(page.data);
      } else if (page.type === 'sim_vs_meas') {
        content.innerHTML = buildSimVsMeasHTML(page.data);
      } else if (page.type === 'conclusion') {
        content.innerHTML = buildConclusionHTML(page.data);
      }
      container.appendChild(content);
    }

    // ── Static HTML builders (pure layout, no inputs/events) ──

    function buildCoverHTML(d) {
      const hasImg = !!d.cover_image;
      const imgW = d.cover_image_w || 460;
      const imgH = d.cover_image_h || 300;
      const maxPdfW = 499;
      const scale = imgW > maxPdfW ? maxPdfW / imgW : 1;
      const pdfW = Math.round(imgW * scale);
      const pdfH = Math.round(imgH * scale);
      const deptUpper = (d.dept || '').toUpperCase();
      const progBar = 'linear-gradient(90deg, #0B3D7A, #2357A7, #3A7AD4, #5BA3E6, #6EC5A0, #4CAF79)';
      const cornerStyle = 'position:absolute;width:32px;height:32px;';
      return `<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:46px 48px 32px;color:rgba(15,23,42,0.90);overflow:hidden;font-family:${PDF_FONT};letter-spacing:0px;word-spacing:0px;position:relative;">
        <!-- Progression bar top -->
        <div style="position:absolute;top:0;left:0;right:0;height:10px;background:${progBar};"></div>
        <!-- Progression bar bottom -->
        <div style="position:absolute;bottom:0;left:0;right:0;height:10px;background:${progBar};"></div>
        <!-- Corner brackets -->
        <div style="${cornerStyle}top:12px;left:12px;border-top:1.5px solid #8DC4F0;border-left:1.5px solid #8DC4F0;"></div>
        <div style="${cornerStyle}top:12px;right:12px;border-top:1.5px solid #8DC4F0;border-right:1.5px solid #8DC4F0;"></div>
        <div style="${cornerStyle}bottom:12px;left:12px;border-bottom:1.5px solid #8DC4F0;border-left:1.5px solid #8DC4F0;"></div>
        <div style="${cornerStyle}bottom:12px;right:12px;border-bottom:1.5px solid #8DC4F0;border-right:1.5px solid #8DC4F0;"></div>
        <!-- Delta logo top-right -->
        <img src="${DELTA_FULL_LOGO_B64}" style="position:absolute;top:14px;right:16px;height:28px;width:auto;object-fit:contain;z-index:5;" alt="Delta">
        <!-- Type label -->
        <div style="font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.18em;color:#3A7AD4;align-self:flex-start;margin-bottom:8px;">THERMAL TEST REPORT</div>
        <div style="font-size:14px;font-weight:700;letter-spacing:0px;word-spacing:0px;color:#1A4E96;padding:6px 8px;margin-bottom:16px;text-align:center;width:100%;">${escHtml(d.dept || '')}</div>
        ${hasImg
          ? `<div style="width:${pdfW}px;height:${pdfH}px;margin-bottom:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid #C2DFF8;">
               <img src="${escapeAttr(d.cover_image)}" style="max-width:100%;max-height:100%;object-fit:contain;">
             </div>`
          : `<div style="width:${pdfW}px;height:${pdfH}px;margin-bottom:24px;flex-shrink:0;background:#F7F9FC;border:1px solid #C2DFF8;"></div>`}
        <div style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;text-align:center;letter-spacing:-0.01em;word-spacing:0px;padding:8px;margin-bottom:4px;width:100%;color:#0B3D7A;">${escHtml(d.model)}</div>
        <div style="width:48px;height:2px;background:#3A7AD4;margin:0 auto 8px;"></div>
        <div style="font-size:15px;font-weight:500;text-align:center;letter-spacing:0px;word-spacing:0px;color:rgba(15,23,42,0.65);padding:6px 8px;margin-bottom:24px;width:100%;">${escHtml(d.project_name)}</div>
        <div style="display:grid;grid-template-columns:auto 1fr;gap:8px 16px;align-items:center;width:100%;max-width:380px;margin-top:auto;padding-top:16px;letter-spacing:0px;word-spacing:0px;">
          <span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:400;letter-spacing:0.05em;word-spacing:0px;color:#2357A7;text-align:right;">STAGE</span>
          <span style="font-size:13px;letter-spacing:0px;word-spacing:0px;padding:4px 8px;">${escHtml(d.stage)}</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:400;letter-spacing:0.05em;word-spacing:0px;color:#2357A7;text-align:right;">VERSION</span>
          <span style="font-size:13px;letter-spacing:0px;word-spacing:0px;padding:4px 8px;">${escHtml(d.report_version)}</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:400;letter-spacing:0.05em;word-spacing:0px;color:#2357A7;text-align:right;">DATE</span>
          <span style="font-size:13px;letter-spacing:0px;word-spacing:0px;padding:4px 8px;">${escHtml(d.date)}</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:400;letter-spacing:0.05em;word-spacing:0px;color:#2357A7;text-align:right;">TESTED BY</span>
          <span style="font-size:13px;letter-spacing:0px;word-spacing:0px;padding:4px 8px;">${escHtml(d.tested_by)}</span>
        </div>
        <!-- Footer -->
        <div style="position:absolute;bottom:8px;left:0;right:0;display:flex;justify-content:space-between;padding:0 16px;font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(15,23,42,0.35);letter-spacing:0.04em;">
          <span>${escHtml(deptUpper)}</span>
          <span>CONFIDENTIAL</span>
        </div>
      </div>`;
    }

    function buildImagePageHTML(d) {
      const imgs = d.images || [];
      const count = imgs.length;
      const colSplit = d.col_split ?? 50;
      const rowSplit = d.row_split ?? 50;
      // Grid CSS
      let gridStyle = 'flex:1;display:grid;gap:10px;min-height:0;';
      if (count <= 1) gridStyle += 'grid-template-columns:1fr;grid-template-rows:1fr;';
      else if (count === 2) gridStyle += `grid-template-columns:${colSplit}fr ${100-colSplit}fr;grid-template-rows:1fr;`;
      else gridStyle += `grid-template-columns:${colSplit}fr ${100-colSplit}fr;grid-template-rows:${rowSplit}fr ${100-rowSplit}fr;`;

      let cells = '';
      for (let i = 0; i < count; i++) {
        const img = imgs[i];
        const src = img && img.url_or_base64;
        cells += `<div style="display:flex;flex-direction:column;min-height:0;min-width:0;">
          <div style="flex:1;border:${src ? '1px solid rgba(15,23,42,0.08)' : '2px dashed rgba(15,23,42,0.15)'};border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0;">
            ${src ? `<img src="${escapeAttr(src)}" style="max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;">` : ''}
          </div>
          ${src && img.caption ? `<div style="font-size:12px;color:rgba(15,23,42,0.55);padding:4px 6px;margin-top:4px;border-bottom:1px dashed rgba(15,23,42,0.12);">${escHtml(img.caption)}</div>` : ''}
        </div>`;
      }
      if (count === 0) {
        cells = '<div style="display:flex;align-items:center;justify-content:center;flex:1;"></div>';
      }

      const inner = `<div style="width:100%;height:100%;display:flex;flex-direction:column;padding:22px 28px 28px;overflow:hidden;color:rgba(15,23,42,0.90);letter-spacing:0px;word-spacing:0px;">
        <div style="font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;letter-spacing:0.02em;word-spacing:0px;padding:6px 8px;margin-bottom:10px;color:#0B3D7A;">${escHtml(d.title)}</div>
        <div style="${gridStyle}">${cells}</div>
      </div>`;
      return wrapPageHTML(inner);
    }

    function buildAnnotationHTML(d) {
      const hasPhoto = !!d.photo_url_or_base64;
      const markers = d.markers || [];
      const pzW = d.anno_photo_w || 680;
      const pzH = d.anno_photo_h || 430;
      // Title height ~36px out of 595px total → workspace height = 595-36 = 559px
      const titleH = 36;
      const pageW = 842;
      const pageH = 595;
      const wsH = pageH - titleH;
      // Photo zone as % of workspace
      const pzWPct = (pzW / pageW) * 100;
      const pzHPct = (pzH / wsH) * 100;
      const pzLPct = (100 - pzWPct) / 2;
      const pzTPct = (100 - pzHPct) / 2;

      let dots = '', svgLines = '';
      markers.forEach((m, idx) => {
        // Dot: % of photo zone → convert to % of workspace
        const dxPct = pzLPct + (m.x / 100) * pzWPct;
        const dyPct = pzTPct + (m.y / 100) * pzHPct;
        dots += `<div style="position:absolute;left:${dxPct}%;top:${dyPct}%;width:5px;height:5px;border-radius:50%;background:#dc2626;box-shadow:0 0 0 1px rgba(255,255,255,0.9);transform:translate(-50%,-50%);z-index:15;"></div>`;

          const lxPct = m.label_x;
          const lyPct = m.label_y;
          const lw = m.label_w || 53;
          // Clamp label so right edge doesn't exceed container
          const maxLw = pageW * ((100 - lxPct) / 100) - 4; // 4px safety margin
          const clampedLw = Math.min(lw, maxLw);
          dots += `<div style="position:absolute;left:${lxPct}%;top:${lyPct}%;width:${clampedLw}px;min-width:40px;padding:4px 8px;background:#fff;border:1.5px solid #2357A7;font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(15,23,42,0.90);z-index:20;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-shadow:0 1px 4px rgba(0,0,0,0.12);box-sizing:border-box;">${escHtml(m.label || 'TC' + (idx + 1))}</div>`;
          // SVG line: use viewBox percentages (0-100 range)
          const slxPct = lxPct + (clampedLw / pageW) * 50; // approximate label center X %
          const slyPct = lyPct + 1.8; // approximate label center Y %
          svgLines += `<line x1="${dxPct}" y1="${dyPct}" x2="${slxPct}" y2="${slyPct}" stroke="#dc2626" stroke-width="0.2"/>`;
        }

      const inner = `<div style="width:100%;height:100%;display:flex;flex-direction:column;position:relative;color:rgba(15,23,42,0.90);letter-spacing:0px;word-spacing:0px;">

            <td style="${sTdStyle}">${escHtml(s.name)}</td>
            <td style="${sTdStyle}">${escHtml(s.type || 'Tj only')}</td>
            ${taCells}
            <td style="${sTdStyle}">${escHtml(s.note)}</td>
          </tr>`;
        }).join('');
        sensorHtml = `
          <div style="margin-top:10px;border:1px solid rgba(15,23,42,0.08);border-radius:4px;flex-shrink:0;">
            <div style="padding:6px 10px;font-size:10px;font-weight:700;color:rgba(15,23,42,0.45);background:rgba(15,23,42,0.02);border-bottom:1px solid rgba(15,23,42,0.06);letter-spacing:0px;word-spacing:0px;">EMBEDDED SENSOR READINGS</div>
            <table style="width:100%;border-collapse:collapse;font-size:10px;">
              <thead><tr>
                <th style="${sThStyle}">Sensor</th>
                <th style="${sThStyle}">類型</th>
                ${sensorTaHeaders}
                <th style="${sThStyle}">備註</th>
              </tr></thead>
              <tbody>${sensorRows}</tbody>
            </table>
          </div>`;
      }

      const makeInner = (title, headerBlock, rows, sensor) =>
        `<div style="width:100%;height:100%;padding:28px 32px 28px;color:rgba(15,23,42,0.90);overflow:hidden;letter-spacing:0px;word-spacing:0px;">
          ${title}${headerBlock}
          <div style="border:1px solid #C2DFF8;">
            <table style="width:100%;border-collapse:collapse;font-size:10px;">
              ${theadHtml}
              <tbody>${rows}</tbody>
            </table>
          </div>
          ${sensor}
        </div>`;

      if (rowsHtml.length === 0) {
        return [wrapPageHTML(makeInner(titleHtml, infoGridHtml + taTagsHtml, '', sensorHtml))];
      }

      const PAGE_H = 595;
      const MAX_CONTENT_Y = PAGE_H - 28;

      const measurer = document.createElement('div');
      measurer.style.cssText = `position:fixed;left:-9999px;top:0;width:842px;background:#fff;z-index:-1;visibility:hidden;font-family:${PDF_FONT};`;
      document.body.appendChild(measurer);

      // ── Pass 1: measure component row positions on page 1 layout ──
      measurer.innerHTML = `<div style="width:100%;padding:28px 32px 28px;letter-spacing:0;word-spacing:0;">
        ${titleHtml}${infoGridHtml}${taTagsHtml}
        <div style="border:1px solid #C2DFF8;">
          <table style="width:100%;border-collapse:collapse;font-size:10px;">
            ${theadHtml}
            <tbody>${rowsHtml.join('')}</tbody>
          </table>
        </div>
      </div>`;
      void measurer.offsetHeight;

      const mTop = measurer.getBoundingClientRect().top;
      const trs = Array.from(measurer.querySelectorAll('tbody tr'));
      const rowBottoms = trs.map(tr => tr.getBoundingClientRect().bottom - mTop);
      const firstRowTop = trs[0].getBoundingClientRect().top - mTop;
      const rowHeights = trs.map((tr, i) =>
        i === 0 ? rowBottoms[0] - firstRowTop : rowBottoms[i] - rowBottoms[i - 1]
      );

      // ── Pass 2: measure sensor section height ──
      let sensorH = 0;
      if (sensorHtml) {
        measurer.innerHTML = `<div style="width:100%;padding:0 32px;letter-spacing:0;word-spacing:0;">${sensorHtml}</div>`;
        void measurer.offsetHeight;
        sensorH = measurer.firstElementChild.getBoundingClientRect().height + 10;
      }

      // ── Pass 3: measure continuation page header overhead ──
      measurer.innerHTML = `<div style="width:100%;padding:28px 32px 28px;letter-spacing:0;word-spacing:0;">
        <div style="${titleStyle}">THERMAL TEST DATA (續)</div>
        <div style="border:1px solid #C2DFF8;">
          <table style="width:100%;border-collapse:collapse;font-size:10px;">
            ${theadHtml}
            <tbody><tr><td style="padding:0;height:0;line-height:0;font-size:0;border:none;"></td></tr></tbody>
          </table>
        </div>
      </div>`;
      void measurer.offsetHeight;
      const contRowStartY = measurer.querySelector('tbody tr').getBoundingClientRect().top - measurer.getBoundingClientRect().top;
      const contAvailH = MAX_CONTENT_Y - contRowStartY;

      document.body.removeChild(measurer);

      // ── Check single-page: all rows + sensor fit? ──
      const lastRowBottom = rowBottoms[rowBottoms.length - 1];
      if (lastRowBottom + sensorH <= MAX_CONTENT_Y) {
        return [wrapPageHTML(makeInner(titleHtml, infoGridHtml + taTagsHtml, rowsHtml.join(''), sensorHtml))];
      }

      // ── Compute page 1 split (no sensor on page 1 unless it's the only page) ──
      let page1End = 0;
      for (let i = 0; i < rowBottoms.length; i++) {
        if (rowBottoms[i] <= MAX_CONTENT_Y) page1End = i + 1;
        else break;
      }

      // ── Build continuation page splits, reserving sensor space on last page ──
      const splits = [{ start: 0, end: page1End }];
      let idx = page1End;
      while (idx < rowsHtml.length) {
        let totalRemaining = 0;
        for (let t = idx; t < rowsHtml.length; t++) totalRemaining += rowHeights[t];

        const isLastPage = totalRemaining + sensorH <= contAvailH;
        const budget = isLastPage ? contAvailH - sensorH : contAvailH;

        let accum = 0;
        let end = idx;
        while (end < rowsHtml.length && accum + rowHeights[end] <= budget) {
          accum += rowHeights[end];
          end++;
        }
        if (end === idx) end = idx + 1;
        splits.push({ start: idx, end });
        idx = end;
      }

      return splits.map((split, i) => {
        const isFirst = i === 0;
        const isLast = i === splits.length - 1;
        const rows = rowsHtml.slice(split.start, split.end).join('');
        const subTotal = splits.length;

        if (isFirst) {
          return wrapPageHTML(makeInner(titleHtml, infoGridHtml + taTagsHtml, rows, isLast ? sensorHtml : ''));
        }
        const label = `THERMAL TEST DATA (續) · ${i + 1}/${subTotal}`;
        const contTitle = `<div style="${titleStyle}">${label}</div>`;
        return wrapPageHTML(makeInner(contTitle, '', rows, isLast ? sensorHtml : ''));
      });
    }

    async function exportPDF() {
      if (state.pages.length === 0) return;
      if (typeof html2canvas === 'undefined' || typeof jspdf === 'undefined') {
        alert('PDF 匯出函式庫載入中，請稍後再試');
        return;
      }

      setStatus('saving', '匯出中...');
      const { jsPDF } = jspdf;

      // Build filename from cover page
      let filename = 'ThermalReport';
      const coverPage = state.pages.find(p => p.type === 'cover');
      if (coverPage && coverPage.data) {
        const d = coverPage.data;
        const parts = [];
        if (d.project_name) parts.push(d.project_name.replace(/[^a-zA-Z0-9\u4e00-\u9fff_-]/g, '_'));
        if (d.stage) parts.push(d.stage);
        if (d.date) parts.push(d.date);
        parts.push('ThermalReport');
        filename = parts.join('_');
      } else {
        filename += '_' + new Date().toISOString().slice(0, 10);
      }

      let pdf = null;
      const virtualPages = buildVirtualPages();

      try {
        for (let i = 0; i < virtualPages.length; i++) {
          const vp = virtualPages[i];
          const isLandscape = vp.isLandscape;
          const w = isLandscape ? 842 : 595;
          const h = isLandscape ? 595 : 842;

          const offscreen = document.createElement('div');
          document.body.appendChild(offscreen);
          offscreen.style.cssText = `position:fixed;left:-9999px;top:0;width:${w}px;height:${h}px;background:#fff;z-index:-1;overflow:hidden;font-family:${PDF_FONT};letter-spacing:0px;word-spacing:0px;`;
          const resetStyle = document.createElement('style');
          resetStyle.textContent = '*, *::before, *::after { letter-spacing: 0px !important; word-spacing: 0px !important; text-transform: none !important; }';
          offscreen.appendChild(resetStyle);
          const content = document.createElement('div');
          content.style.cssText = 'width:100%;height:100%;letter-spacing:0px;word-spacing:0px;';
          content.innerHTML = vp.html;
          offscreen.appendChild(content);

          const imgs = offscreen.querySelectorAll('img');
          if (imgs.length > 0) {
            await Promise.all(Array.from(imgs).map(img =>
              img.complete ? Promise.resolve() : new Promise(r => { img.onload = r; img.onerror = r; })
            ));
          }
          await new Promise(r => setTimeout(r, 100));

          const canvasImg = await html2canvas(offscreen, {
            scale: 2,
            useCORS: true,
            backgroundColor: '#ffffff',
            width: w,
            height: h,
            logging: false,
          });

          document.body.removeChild(offscreen);

          const orientation = isLandscape ? 'landscape' : 'portrait';
          const pdfW = isLandscape ? 297 : 210;
          const pdfH = isLandscape ? 210 : 297;

          if (pdf === null) {
            pdf = new jsPDF({ orientation, unit: 'mm', format: 'a4' });
          } else {
            pdf.addPage('a4', orientation);
          }

          const imgData = canvasImg.toDataURL('image/jpeg', 0.92);
          pdf.addImage(imgData, 'JPEG', 0, 0, pdfW, pdfH);
        }

        pdf.save(filename + '.pdf');
        setStatus('saved', '已儲存');
        console.log('✅ PDF exported:', filename + '.pdf');
      } catch (err) {
        console.error('PDF export error:', err);
        setStatus('saved', '匯出失敗');
        alert('PDF 匯出失敗：' + err.message);
      }
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return '剛剛';
      if (diff < 3600) return Math.floor(diff / 60) + ' 分鐘前';
      if (diff < 86400) return Math.floor(diff / 3600) + ' 小時前';
      const days = Math.floor(diff / 86400);
      if (days <= 30) return days + ' 天前';
      return d.toLocaleDateString('zh-TW');
    }

    async function createNewReport(name, model, stage, date) {
      const id = 'rpt_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
      const now = new Date().toISOString();

      // Create report meta document
      try {
        await dbAdapter.createReport(id, {
          project_name: name,
          model: model,
          stage: stage,
          date: date,
          created_at: now,
          updated_at: now,
        });
      } catch (err) {
        console.warn('Could not create report doc:', err);
      }

      // Open the new report with a default cover page
      state.reportId = id;
      state.pages = [];
      state.activePage = null;
      addCoverPage();
      // Pre-fill cover page fields
      const cover = state.pages[0];
      if (cover) {
        cover.data.project_name = name;
        cover.data.model = model;
        cover.data.stage = stage;
        cover.data.date = date;
        scheduleSave(0);
      }
      showEditor();

      selectPage(0);

    async function openReport(reportId) {
      state.reportId = reportId;
      state.pages = [];
      state.activePage = null;

      try { state.timLibrary = await dbAdapter.getTimLibrary(); }
      catch (e) { state.timLibrary = { grease: [], pad: [], putty: [] }; }

      // Load pages — tolerate gaps from previously broken deletes
      try {
        let consecutiveMisses = 0;
        const loadedFromIds = []; // track original Firestore doc IDs
        for (let i = 0; i < 50; i++) {
          const existingData = await loadPageFromFirestore(i);
          if (!existingData) {
            consecutiveMisses++;
            if (consecutiveMisses >= 3) break; // stop after 3 consecutive gaps
            continue;
          }
          consecutiveMisses = 0;
          loadedFromIds.push(i);
          state.pages.push({
            id: 'page_loaded_' + i,
            type: existingData.type,
            order: state.pages.length,
            data: existingData.data,
          });
        }
        // If pages were loaded across gaps, re-save with contiguous IDs to heal Firestore
        const hasGaps = loadedFromIds.some((docId, idx) => docId !== idx);
        if (hasGaps && state.pages.length > 0) {
          console.log('🩹 Healing Firestore page gaps...', loadedFromIds, '→ 0-' + (state.pages.length - 1));
          state.pages.forEach((p, i) => p.order = i);
          for (let i = 0; i < state.pages.length; i++) {
            scheduleSave(i);
          }
          // Delete orphaned docs that are beyond the new contiguous range
          for (const oldId of loadedFromIds) {
            if (oldId >= state.pages.length) {
              deletePageFromFirestore(oldId);
            }
          }
        }
      } catch (err) {
        console.warn('Could not load pages:', err);
      }

      showEditor();
      renderPageList();
      state.pages.forEach(p => initPageSnapshot(p));
      if (state.pages.length > 0) {
        selectPage(0);
        setStatus('saved', '已儲存');
      }
    }

    async function duplicateReport(sourceId) {
      const newId = 'rpt_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
      const now = new Date().toISOString();

      try {
        const srcMeta = await dbAdapter.getReportMeta(sourceId);
        const newName = ((srcMeta && srcMeta.project_name) || '') + ' (副本)';
        await dbAdapter.copyReport(sourceId, newId, {
          project_name: newName,
          created_at: now,
          updated_at: now,
        });
      } catch (err) {
        console.warn('Duplicate error:', err);
      }

      await renderHomepage();
    }

    function showDeleteDialog(reportId, reportName) {
      const overlay = document.createElement('div');
      overlay.className = 'hp-modal-overlay';
      overlay.innerHTML = `
        <div class="hp-modal">
          <div class="hp-modal-header">確認刪除</div>
          <div class="hp-modal-body">
            <div class="hp-delete-msg">確定刪除「<strong>${escapeAttr(reportName)}</strong>」嗎？<br>此操作無法復原。</div>
          </div>
          <div class="hp-modal-footer">
            <button class="hp-modal-btn" id="hp-del-cancel">取消</button>
            <button class="hp-modal-btn danger" id="hp-del-confirm">確認刪除</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      overlay.querySelector('#hp-del-cancel').addEventListener('click', () => document.body.removeChild(overlay));
      overlay.addEventListener('click', (e) => { if (e.target === overlay) document.body.removeChild(overlay); });

      overlay.querySelector('#hp-del-confirm').addEventListener('click', async () => {
        document.body.removeChild(overlay);
        // Immediately remove the card from DOM for instant feedback
        const card = $hpGrid.querySelector(`.hp-card[data-report-id="${reportId}"]`);
        if (card) card.remove();
        // Check if grid is now empty
        if ($hpGrid.children.length === 0) {
          $hpEmpty.style.display = 'flex';
          $hpGrid.style.display = 'none';
        }
        await deleteReport(reportId);
      });
    }

    async function deleteReport(reportId) {
      try {
        await dbAdapter.deleteReport(reportId);

        // Delete images from Storage (Firebase only)
        // const folderRef = window._storageRef(window._storage, `reports/${reportId}`);
        // const files = await window._listAll(folderRef);
        // for (const fileRef of files.items) {
        //   await window._deleteObject(fileRef);
        // }

        console.log('🗑 Deleted report:', reportId);
      } catch (err) {
        console.warn('Delete error:', err);
      }

      await renderHomepage();
    }

    // Update report meta on each save
    async function updateReportMeta() {
      if (!state.reportId) return;
      try {
        const coverPage = state.pages.find(p => p.type === 'cover');
        const meta = {
          updated_at: new Date().toISOString(),
        };
        if (coverPage) {
          meta.project_name = coverPage.data.project_name || '';
          meta.model = coverPage.data.model || '';
          meta.stage = coverPage.data.stage || '';
          meta.date = coverPage.data.date || '';
        }
        await dbAdapter.updateReportMeta(state.reportId, meta);
      } catch (err) {
        // Silent - meta update is non-critical
      }
    }

    // ━━━ Init ━━━
    async function init() {
      // Set logo images from base64 constants
      const toolbarLogoEl = document.getElementById('toolbar-logo-img');
      if (toolbarLogoEl) toolbarLogoEl.src = TOOLBAR_LOGO_B64;
      const hpLogoEl = document.getElementById('hp-logo-img');
      if (hpLogoEl) hpLogoEl.src = TOOLBAR_LOGO_B64;

      // Global paste handler (registered once)
      document.addEventListener('paste', handlePaste);

      // Setup dropdowns
      setupDropdown('toolbar-add-btn', 'toolbar-add-menu');
      setupDropdown('sidebar-add-btn', 'sidebar-add-menu');

      // Undo & Redo
      document.getElementById('btn-undo').addEventListener('click', performUndo);
      document.getElementById('btn-redo').addEventListener('click', performRedo);
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
          const el = document.activeElement;
          if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable)) return;
          e.preventDefault();
          performUndo();
        }
        if ((e.ctrlKey || e.metaKey) && ((e.key === 'z' && e.shiftKey) || e.key === 'y')) {
          const el = document.activeElement;
          if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable)) return;
          e.preventDefault();
          performRedo();
        }
      });

      // Preview & PDF buttons
      document.getElementById('btn-preview').addEventListener('click', openPreview);
      document.getElementById('preview-close').addEventListener('click', closePreview);
      document.getElementById('btn-export-pdf').addEventListener('click', exportPDF);

      // Back to homepage
      document.getElementById('btn-back-home').addEventListener('click', () => {
        // Reset editor state
        state.reportId = null;
        state.pages = [];
        state.activePage = null;
        $pageList.innerHTML = '';
        $canvas.classList.remove('landscape');
        $canvas.innerHTML = '<span class="canvas-placeholder">← 請從左側選擇或新增頁面</span>';
        updatePageNavButtons();
        showHomepage();
      });

      // New report button
      document.getElementById('hp-new-report').addEventListener('click', showNewReportModal);

      // Setup SortableJS
      if (typeof Sortable !== 'undefined') {
        Sortable.create($pageList, {
          animation: 150,
          ghostClass: 'sortable-ghost',
          onEnd: (evt) => {
            const moved = state.pages.splice(evt.oldIndex, 1)[0];
            state.pages.splice(evt.newIndex, 0, moved);
            state.pages.forEach((p, i) => p.order = i);
            if (state.activePage === evt.oldIndex) {
              state.activePage = evt.newIndex;
            } else if (state.activePage > evt.oldIndex && state.activePage <= evt.newIndex) {
              state.activePage--;
            } else if (state.activePage < evt.oldIndex && state.activePage >= evt.newIndex) {
              state.activePage++;
            }
            renderPageList();
            state.pages.forEach((_, i) => scheduleSave(i));
          }
        });
      }

      // Wait for Firebase, then show homepage
      // await waitForFirebase();  // 已改為本機模式，不需等待 Firebase
      showHomepage();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
<script>
function updateDbStatus(message, type) {
  const color = type === 'success' ? '#4caf50' : '#ffcc00';
  ['db-status-text', 'hp-db-status-text'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = message;
    el.style.color = color;
  });
}

async function handlePickDb() {
  // If a handle was saved but blocked by permission, reconnect silently on this click.
  if (!dbAdapter.isReady()) {
    const restored = await dbAdapter.reconnect();
    if (restored && restored.success) {
      updateDbStatus('✅ ' + restored.filename, 'success');
      if (typeof renderHomepage === 'function') await renderHomepage();
      return;
    }
  }
  const result = await dbAdapter.pickFile();
  if (result && result.success) {
    updateDbStatus('✅ ' + result.filename, 'success');
    if (typeof renderHomepage === 'function') {
      await renderHomepage();
    }
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  // Ensure homepage logo is set (fallback in case init() hasn't run yet)
  if (typeof TOOLBAR_LOGO_B64 !== 'undefined') {
    const hpLogo = document.getElementById('hp-logo-img');
    if (hpLogo && !hpLogo.src) hpLogo.src = TOOLBAR_LOGO_B64;
  }

  // Try to silently restore previously granted file handle (no user gesture needed).
  const restored = await dbAdapter.tryRestore();
  if (restored && restored.success) {
    updateDbStatus('✅ ' + restored.filename, 'success');
    if (typeof renderHomepage === 'function') await renderHomepage();
    return;
  }
  if (restored && restored.needsPermission) {
    // A handle exists but browser requires a user click to re-grant access.
    updateDbStatus('🔒 點擊恢復資料庫: ' + restored.filename, 'warning');
    return;
  }
  updateDbStatus('⚠️ 請選擇資料庫', 'warning');
});
</script>
