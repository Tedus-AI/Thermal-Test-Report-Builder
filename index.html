      }
    }

    function setupAnnotationPhotoHandlers(page) {
      const zone = document.getElementById('anno-photo-zone');
      const fileInput = document.getElementById('anno-file-input');
      if (!zone || !fileInput) return;

      zone.addEventListener('click', (e) => {
        if (page.data.photo_url_or_base64) return; // photo already placed, click = add marker
        fileInput.click();
      });

      fileInput.addEventListener('change', async () => {
        if (fileInput.files.length > 0) {
          await handleAnnotationPhoto(page, fileInput.files[0]);
        }
      });

      // Replace photo button
      const replaceBtn = document.getElementById('anno-replace-btn');
      if (replaceBtn) {
        replaceBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          fileInput.click();
        });
        replaceBtn.addEventListener('mousedown', (e) => {
          e.stopPropagation(); // prevent marker creation
        });
      }

      zone.addEventListener('dragover', (e) => {
        e.preventDefault();
        zone.classList.add('dragover');
      });
      zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
      zone.addEventListener('drop', async (e) => {
        e.preventDefault();
        zone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
          await handleAnnotationPhoto(page, file);
        }
      });

      // Resize handle
      const resizeHandle = document.getElementById('anno-photo-resize');
      if (resizeHandle) {
        resizeHandle.addEventListener('mousedown', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const startX = e.clientX;
          const startY = e.clientY;
          const startW = zone.offsetWidth;
          const startH = zone.offsetHeight;
          const aspect = startW / startH;

          const onMove = (ev) => {
            const dx = ev.clientX - startX;
            const dy = ev.clientY - startY;
            let newW = Math.max(300, startW + dx * 2);
            let newH = Math.round(newW / aspect);
            // Clamp to workspace
            const ws = document.getElementById('anno-workspace');
            const maxW = ws ? ws.offsetWidth - 20 : 800;
            const maxH = ws ? ws.offsetHeight - 20 : 550;
            if (newW > maxW) { newW = maxW; newH = Math.round(newW / aspect); }
            if (newH > maxH) { newH = maxH; newW = Math.round(newH * aspect); }
            zone.style.width = newW + 'px';
            zone.style.height = newH + 'px';
          };

          const onUp = () => {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            page.data.anno_photo_w = zone.offsetWidth;
            page.data.anno_photo_h = zone.offsetHeight;
            scheduleSave(state.activePage);
            // Re-render markers at new size
            renderAnnotationMarkers(page);
          };

          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      }
    }

    async function handleAnnotationPhoto(page, file) {
      const imageData = await processImage(file);
      page.data.photo_url_or_base64 = imageData;
      renderAnnotationPage(page);
      scheduleSave(state.activePage);
    }

    function setupAnnotationClickHandler(page) {
      const zone = document.getElementById('anno-photo-zone');
      if (!zone) return;

      zone.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return; // left click only
        if (!page.data.photo_url_or_base64) return;
        // Ignore if clicking an existing marker or label
        if (e.target.closest('.marker-dot') || e.target.closest('.marker-label') || e.target.closest('.marker-label-wrap') || e.target.closest('.marker-resize-handle') || e.target.closest('.anno-replace-photo-btn') || e.target.closest('.anno-photo-resize')) return;

        const rect = zone.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        // Generate marker
        const id = 'm_' + Date.now();
        const num = page.data.markers.length + 1;
        const marker = {
          id,
          x: Math.round(x * 100) / 100,
          y: Math.round(y * 100) / 100,
          label: '',
          label_x: -1, // unset → will be placed on drag release
          label_y: -1,
        };

        page.data.markers.push(marker);

        // Start drag to place label
        const workspace = document.getElementById('anno-workspace');
        const wsRect = workspace.getBoundingClientRect();
        const dotAbsX = e.clientX - wsRect.left;
        const dotAbsY = e.clientY - wsRect.top;

        annotationDragState = { markerId: id, dotAbsX, dotAbsY };

        // Show drag line
        const dragSvg = document.getElementById('anno-drag-svg');
        dragSvg.style.display = 'block';
        const line = dragSvg.querySelector('line');
        line.setAttribute('x1', dotAbsX);
        line.setAttribute('y1', dotAbsY);
        line.setAttribute('x2', dotAbsX);
        line.setAttribute('y2', dotAbsY);

        // Render markers (dot will appear)
        renderAnnotationMarkers(page);
        scheduleSave(state.activePage);
      });

      // Mouse move for drag line
      const workspace = document.getElementById('anno-workspace');
      workspace.addEventListener('mousemove', (e) => {
        if (!annotationDragState) return;
        const wsRect = workspace.getBoundingClientRect();
        const mx = e.clientX - wsRect.left;
        const my = e.clientY - wsRect.top;
        const dragSvg = document.getElementById('anno-drag-svg');
        const line = dragSvg.querySelector('line');
        line.setAttribute('x2', mx);
        line.setAttribute('y2', my);
      });

      // Mouse up for placing label
      workspace.addEventListener('mouseup', (e) => {
        if (!annotationDragState) return;
        const ds = annotationDragState;
        annotationDragState = null;

        const dragSvg = document.getElementById('anno-drag-svg');
        dragSvg.style.display = 'none';

        const wsRect = workspace.getBoundingClientRect();
        const labelAbsX = e.clientX - wsRect.left;
        const labelAbsY = e.clientY - wsRect.top;

        // Convert to % of workspace
        const lxPct = (labelAbsX / wsRect.width) * 100;
        const lyPct = (labelAbsY / wsRect.height) * 100;

        // Update marker data
        const marker = page.data.markers.find(m => m.id === ds.markerId);
        if (marker) {
          // If label was barely dragged, auto-place to the right/left
          const dist = Math.sqrt((labelAbsX - ds.dotAbsX) ** 2 + (labelAbsY - ds.dotAbsY) ** 2);
          if (dist < 15) {
            // Auto place: if dot is in left half, place label right; else left
            const zone = document.getElementById('anno-photo-zone');
            const zRect = zone.getBoundingClientRect();
            const dotClientX = ds.dotAbsX + wsRect.left;
            const midX = zRect.left + zRect.width / 2;
            if (dotClientX < midX) {
              marker.label_x = 85;
            } else {
              marker.label_x = 2;
            }
            marker.label_y = Math.max(2, Math.min(90, lyPct));
          } else {
            marker.label_x = Math.max(0, Math.min(95, lxPct));
            marker.label_y = Math.max(0, Math.min(95, lyPct));
          }
        }

        renderAnnotationMarkers(page);
        scheduleSave(state.activePage);

        // Focus the new label
        setTimeout(() => {
          const labelEl = document.querySelector(`.marker-label[data-id="${ds.markerId}"]`);
          if (labelEl) labelEl.focus();
        }, 50);
      });
    }

    function renderAnnotationMarkers(page) {
      const workspace = document.getElementById('anno-workspace');
      const zone = document.getElementById('anno-photo-zone');
      const svg = document.getElementById('anno-svg');
      if (!workspace || !zone || !svg) return;

      // Remove old markers & labels (but keep photo zone and SVGs)
      workspace.querySelectorAll('.marker-dot, .marker-label, .marker-label-wrap').forEach(el => el.remove());
      svg.innerHTML = '';

      const markers = page.data.markers;
      const zoneRect = zone.getBoundingClientRect();
      const wsRect = workspace.getBoundingClientRect();

      // Compute zone offset relative to workspace
      const zoneOffX = zoneRect.left - wsRect.left;
      const zoneOffY = zoneRect.top - wsRect.top;

      markers.forEach((m, idx) => {
        // Dot position: x,y are % of photo zone
        const dotX = zoneOffX + (m.x / 100) * zoneRect.width;
        const dotY = zoneOffY + (m.y / 100) * zoneRect.height;

        // Create dot
        const dot = document.createElement('div');
        dot.className = 'marker-dot';
        dot.style.left = dotX + 'px';
        dot.style.top = dotY + 'px';
        dot.textContent = idx + 1;
        dot.dataset.id = m.id;

        // Right-click to delete
        dot.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (confirm(`刪除標記 #${idx + 1}？`)) {
            page.data.markers = page.data.markers.filter(mk => mk.id !== m.id);
            renderAnnotationMarkers(page);
            scheduleSave(state.activePage);
          }
        });

        // Draggable dot
        let dotDragging = false;
        dot.addEventListener('mousedown', (e) => {
          if (e.button !== 0) return;
          e.preventDefault();
          e.stopPropagation();
          dotDragging = true;
        });

        document.addEventListener('mousemove', (e) => {
          if (!dotDragging) return;
          const zr = zone.getBoundingClientRect();
          const wr = workspace.getBoundingClientRect();
          // Clamp to photo zone
          const cx = Math.max(zr.left, Math.min(zr.right, e.clientX));
          const cy = Math.max(zr.top, Math.min(zr.bottom, e.clientY));
          const newDotX = (cx - wr.left);
          const newDotY = (cy - wr.top);
          dot.style.left = newDotX + 'px';
          dot.style.top = newDotY + 'px';
          // Update SVG line if label exists
          if (m.label_x >= 0 && m.label_y >= 0) {
            const lbl = workspace.querySelector(`.marker-label-wrap[data-id="${m.id}"]`);
            if (lbl) {
              updateAnnotationLine(svg, m.id, newDotX, newDotY,
                parseFloat(lbl.style.left) + lbl.offsetWidth / 2,
                parseFloat(lbl.style.top) + lbl.offsetHeight / 2);
            }
          }
        });

        document.addEventListener('mouseup', (e) => {
          if (!dotDragging) return;
          dotDragging = false;
          const zr = zone.getBoundingClientRect();
          const cx = Math.max(zr.left, Math.min(zr.right, e.clientX));
          const cy = Math.max(zr.top, Math.min(zr.bottom, e.clientY));
          // Convert back to % of photo zone
          m.x = Math.round(((cx - zr.left) / zr.width) * 10000) / 100;
          m.y = Math.round(((cy - zr.top) / zr.height) * 10000) / 100;
          renderAnnotationMarkers(page);
          scheduleSave(state.activePage);
        });

        workspace.appendChild(dot);

        // Label (only if placed)
        if (m.label_x >= 0 && m.label_y >= 0) {
          const labelX = (m.label_x / 100) * wsRect.width;
          const labelY = (m.label_y / 100) * wsRect.height;

          // Wrapper for label + resize handle
          const wrap = document.createElement('div');
          wrap.className = 'marker-label-wrap';
          wrap.style.left = labelX + 'px';
          wrap.style.top = labelY + 'px';
          wrap.dataset.id = m.id;

          const label = document.createElement('input');
          label.type = 'text';
          label.className = 'marker-label';
          label.placeholder = `TC${idx + 1} - 元件名稱`;
          label.value = m.label || '';
          label.dataset.id = m.id;
          // Restore saved width or default 80px
          const savedW = m.label_w || 80;
          label.style.width = savedW + 'px';

          // Resize handle
          const resizeHandle = document.createElement('div');
          resizeHandle.className = 'marker-resize-handle';

          wrap.appendChild(label);
          wrap.appendChild(resizeHandle);

          // Editable
          label.addEventListener('input', () => {
            m.label = label.value;
            scheduleSave(state.activePage);
          });

          // Draggable label (drag from the input area)
          let labelDragging = false;
          let labelOffX = 0, labelOffY = 0;

          label.addEventListener('mousedown', (e) => {
            if (e.target === label && e.button === 0) {
              labelDragging = true;
              labelOffX = e.clientX - wrap.getBoundingClientRect().left;
              labelOffY = e.clientY - wrap.getBoundingClientRect().top;
              e.preventDefault();
            }
          });

          document.addEventListener('mousemove', (e) => {
            if (!labelDragging) return;
            const newX = e.clientX - wsRect.left - labelOffX;
            const newY = e.clientY - wsRect.top - labelOffY;
            wrap.style.left = newX + 'px';
            wrap.style.top = newY + 'px';
            // Update SVG line
            updateAnnotationLine(svg, m.id, dotX, dotY, newX + wrap.offsetWidth / 2, newY + wrap.offsetHeight / 2);
          });

          document.addEventListener('mouseup', () => {
            if (!labelDragging) return;
            labelDragging = false;
            const rect = workspace.getBoundingClientRect();
            m.label_x = (parseFloat(wrap.style.left) / rect.width) * 100;
            m.label_y = (parseFloat(wrap.style.top) / rect.height) * 100;
            scheduleSave(state.activePage);
          });

          // Resize handle drag
          let resizing = false;
          let resizeStartX = 0, resizeStartW = 0;

          resizeHandle.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            e.preventDefault();
            e.stopPropagation();
            resizing = true;
            resizeStartX = e.clientX;
            resizeStartW = label.offsetWidth;
          });

          document.addEventListener('mousemove', (e) => {
            if (!resizing) return;
            const delta = e.clientX - resizeStartX;
            const newW = Math.max(40, resizeStartW + delta);
            label.style.width = newW + 'px';
            // Update SVG line to track center
            updateAnnotationLine(svg, m.id, dotX, dotY,
              parseFloat(wrap.style.left) + wrap.offsetWidth / 2,
              parseFloat(wrap.style.top) + wrap.offsetHeight / 2);
          });

          document.addEventListener('mouseup', () => {
            if (!resizing) return;
            resizing = false;
            m.label_w = label.offsetWidth;
            scheduleSave(state.activePage);
          });

          // Double-click to edit text
          label.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            label.focus();
            label.select();
          });

          workspace.appendChild(wrap);

          // Draw SVG leader line (use saved width + handle 6px for center calc)
          const labelCenterX = labelX + (savedW + 6) / 2;
          const labelCenterY = labelY + (wrap.offsetHeight || 24) / 2;
          drawAnnotationLine(svg, m.id, dotX, dotY, labelCenterX, labelCenterY);
        }
      });
    }

    function drawAnnotationLine(svg, markerId, x1, y1, x2, y2) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1);
      line.setAttribute('y1', y1);
      line.setAttribute('x2', x2);
      line.setAttribute('y2', y2);
      line.dataset.markerId = markerId;
      svg.appendChild(line);
    }

    function updateAnnotationLine(svg, markerId, x1, y1, x2, y2) {
      const line = svg.querySelector(`line[data-marker-id="${markerId}"]`);
      if (line) {
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
      }
    }

    // ━━━ Data Page Module ━━━
    function addDataPage() {
      const today = new Date().toISOString().slice(0, 10);
      // Sync stage from cover page if exists
      const coverPage = state.pages.find(p => p.type === 'cover');
      const defaultStage = coverPage ? coverPage.data.stage : 'DVT';

      const page = {
        id: 'page_' + Date.now(),
        type: 'data',
        order: state.pages.length,
        data: {
          header: {
            test_date: today,
            stage: defaultStage,
            sw_version: '',
            waveform_ver: '',
            eq_time_min: '',
            mounting: 'Pole Mount',
            location: '',
          },
          ta_conditions: [25, 55],
          components: [],
          sensors: [],
        }
      };
      state.pages.push(page);
      renderPageList();
      selectPage(state.pages.length - 1);
      scheduleSave(state.pages.length - 1);
    }

    function renderDataPage(page) {
      const d = page.data;
      if (!d.header) d.header = {};
      if (!d.ta_conditions) d.ta_conditions = [25, 55];
      if (!d.components) d.components = [];
      if (!d.sensors) d.sensors = [];
      const h = d.header;

      const mountOptions = ['Pole Mount', 'Wall Mount', 'Free-standing'];
      const stageOptions = ['Prototype', 'EVT', 'DVT', 'PVT', 'MP'];
      const categoryOptions = ['RF', 'Digital', 'PWR'];
      const specTypeOptions = ['Recommended', 'Absolute'];
      const deratingOptions = ['0.80', '0.85', '0.90', '0.95', '1.00'];
      const sensorTypeOptions = ['Tj only', 'Tj+Tc'];

      const taTagsHTML = d.ta_conditions.map((temp, i) =>
        `<span class="ta-tag">Ta = ${temp}°C<button class="ta-tag-remove" data-ta-idx="${i}" title="刪除">✕</button></span>`
      ).join('');

      // ── Build component rows ──
      // Assign auto-increment numbers per category
      const catCounters = { RF: 0, Digital: 0, PWR: 0 };
      const compRows = d.components.map((comp, ri) => {
        if (!comp.readings) comp.readings = {};
        if (!comp.category) comp.category = 'RF';
        if (!comp.derating) comp.derating = '0.90';
        const cat = comp.category;
        catCounters[cat] = (catCounters[cat] || 0) + 1;
        const autoNum = cat + '-' + catCounters[cat];
        const catClass = cat === 'RF' ? 'cat-rf' : cat === 'Digital' ? 'cat-digital' : 'cat-pwr';

        const tcSpec = parseFloat(comp.tc_spec) || 0;
        const derating = parseFloat(comp.derating) || 0.9;
        const derated = tcSpec * derating;

        // Check pass/fail across all Ta
        let rowFail = false;
        const taCells = d.ta_conditions.map((ta, ti) => {
          const key = 'ta_' + ta;
          const measured = comp.readings[key];
          const measuredNum = parseFloat(measured);
          let marginStr = '—';
          let marginClass = 'dt-readonly';

          if (!isNaN(measuredNum) && derated > 0) {
            const margin = ((derated - measuredNum) / derated) * 100;
            marginStr = margin.toFixed(1) + '%';
            if (margin >= 10) marginClass = 'dt-margin-pass';
            else if (margin >= 0) marginClass = 'dt-margin-warn';
            else { marginClass = 'dt-margin-fail'; rowFail = true; }
          }

          const isFirst = ti === 0;
          return `<td class="dt-ta-col${isFirst ? ' dt-ta-col-first' : ''}">
                    <input type="number" step="any" class="dt-tc-input" value="${measured !== undefined && measured !== '' ? escapeAttr(String(measured)) : ''}"
                           placeholder="—" data-comp="${ri}" data-ta-key="${key}">
                  </td>
                  <td class="dt-ta-col ${marginClass}">${marginStr}</td>`;
        }).join('');

        const pfText = rowFail ? '❌ Fail' : (d.components.length > 0 && tcSpec > 0 ? '✔ Pass' : '—');
        const pfClass = rowFail ? 'dt-passfail-fail' : 'dt-passfail-pass';

        return `<tr class="${rowFail ? 'row-fail' : ''}" data-row-idx="${ri}">
          <td><span class="dt-cat-strip ${catClass}"></span>
            <select data-comp="${ri}" data-comp-field="category">${categoryOptions.map(c =>
              `<option value="${c}" ${cat === c ? 'selected' : ''}>${c}</option>`).join('')}
            </select></td>
          <td class="dt-readonly">${autoNum}</td>
          <td><input type="text" placeholder="元件名稱" value="${escapeAttr(comp.name || '')}" data-comp="${ri}" data-comp-field="name"></td>
          <td><select data-comp="${ri}" data-comp-field="spec_type">${specTypeOptions.map(s =>
              `<option value="${s}" ${comp.spec_type === s ? 'selected' : ''}>${s}</option>`).join('')}
            </select></td>
          <td><input type="number" step="any" style="width:50px;text-align:center;" placeholder="—" value="${comp.tc_spec !== undefined && comp.tc_spec !== '' ? escapeAttr(String(comp.tc_spec)) : ''}" data-comp="${ri}" data-comp-field="tc_spec"></td>
          <td><select data-comp="${ri}" data-comp-field="derating">${deratingOptions.map(v =>
              `<option value="${v}" ${comp.derating === v ? 'selected' : ''}>${v}</option>`).join('')}
            </select></td>
          <td class="dt-readonly">${derated > 0 ? derated.toFixed(1) : '—'}</td>
          <td><input type="text" placeholder="e.g. Coolzorb" value="${escapeAttr(comp.tim_type || '')}" data-comp="${ri}" data-comp-field="tim_type" style="min-width:70px;"></td>
          ${taCells}
          <td class="${pfClass}">${pfText}</td>
          <td><input type="text" placeholder="備註" value="${escapeAttr(comp.note || '')}" data-comp="${ri}" data-comp-field="note"></td>
        </tr>`;
      });

      // Insert category boundary classes
      // (done via JS after render for simplicity)

      // ── Ta sub-headers ──
      const taHeaders1 = d.ta_conditions.map((ta, ti) =>
        `<th class="ta-group-header" colspan="2"${ti === 0 ? ' style="border-left:2px solid rgba(15,23,42,0.08);"' : ''}>Ta = ${ta}°C</th>`
      ).join('');
      const taHeaders2 = d.ta_conditions.map(() =>
        `<th class="ta-sub-header">Tc 實測</th><th class="ta-sub-header">Margin</th>`
      ).join('');

      // ── Sensor rows ──
      const sensorRows = d.sensors.map((s, si) => {
        if (!s.readings) s.readings = {};
        const taSensorCells = d.ta_conditions.map(ta => {
          const key = 'ta_' + ta;
          return `<td><input type="text" placeholder="—" value="${escapeAttr(s.readings[key] || '')}" data-sensor="${si}" data-sensor-ta="${key}"></td>`;
        }).join('');
        return `<tr>
          <td><input type="text" placeholder="Sensor 名稱" value="${escapeAttr(s.name || '')}" data-sensor="${si}" data-sensor-field="name"></td>
          <td><select data-sensor="${si}" data-sensor-field="type">${sensorTypeOptions.map(t =>
              `<option value="${t}" ${s.type === t ? 'selected' : ''}>${t}</option>`).join('')}
            </select></td>
          ${taSensorCells}
          <td><input type="text" placeholder="備註" value="${escapeAttr(s.note || '')}" data-sensor="${si}" data-sensor-field="note"></td>
        </tr>`;
      }).join('');

      const sensorTaHeaders = d.ta_conditions.map(ta =>
        `<th>Ta ${ta}°C</th>`
      ).join('');

      $canvas.innerHTML = `
        <div class="data-page">
          <div class="data-page-title">Thermal Test Data</div>

          <div class="data-header-grid">
            <div class="data-field">
              <span class="data-field-label">Test Date</span>
              <input type="date" value="${escapeAttr(h.test_date || '')}" data-header="test_date">
            </div>
            <div class="data-field">
              <span class="data-field-label">Thermal Equilibrium Time</span>
              <div class="data-field-unit">
                <input type="number" min="0" placeholder="30" value="${escapeAttr(h.eq_time_min || '')}" data-header="eq_time_min">
                <span class="unit-label">min</span>
              </div>
            </div>
            <div class="data-field">
              <span class="data-field-label">Stage</span>
              <select data-header="stage">
                ${stageOptions.map(s =>
                  `<option value="${s}" ${h.stage === s ? 'selected' : ''}>${s}</option>`
                ).join('')}
              </select>
            </div>
            <div class="data-field">
              <span class="data-field-label">Mounting</span>
              <select data-header="mounting" id="data-mounting-select">
                ${mountOptions.map(m =>
                  `<option value="${m}" ${h.mounting === m ? 'selected' : ''}>${m}</option>`
                ).join('')}
                <option value="__custom" ${!mountOptions.includes(h.mounting) && h.mounting ? 'selected' : ''}>自訂…</option>
              </select>
              ${!mountOptions.includes(h.mounting) && h.mounting
                ? `<input type="text" class="data-custom-mounting" placeholder="自訂安裝方式" value="${escapeAttr(h.mounting)}" style="margin-top:4px;">`
                : ''}
            </div>
            <div class="data-field">
              <span class="data-field-label">SW Version</span>
              <input type="text" placeholder="e.g. v2.1.0" value="${escapeAttr(h.sw_version || '')}" data-header="sw_version">
            </div>
            <div class="data-field">
              <span class="data-field-label">Location</span>
              <input type="text" placeholder="Lab / Chamber / Outdoor" value="${escapeAttr(h.location || '')}" data-header="location">
            </div>
            <div class="data-field">
              <span class="data-field-label">Waveform Ver.</span>
              <input type="text" placeholder="e.g. WF3.2" value="${escapeAttr(h.waveform_ver || '')}" data-header="waveform_ver">
            </div>
          </div>

          <!-- Ta Conditions -->
          <div class="ta-section">
            <div class="ta-section-title">量測環境溫度條件（Ta Conditions）</div>
            <div class="ta-tags" id="ta-tags-container">
              ${taTagsHTML}
              <button class="ta-add-btn" id="ta-add-btn">+ 新增</button>
            </div>
          </div>

          <!-- Data Table -->
          <div class="data-table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th rowspan="2">類別</th>
                  <th rowspan="2">#</th>
                  <th rowspan="2">元件名稱</th>
                  <th rowspan="2">Spec Type</th>
                  <th rowspan="2">Tc Spec</th>
                  <th rowspan="2">Derating</th>
                  <th rowspan="2">Derated</th>
                  <th rowspan="2">TIM Type</th>
                  ${taHeaders1}
                  <th rowspan="2">P/F</th>
                  <th rowspan="2">備註</th>
                </tr>
                <tr>${taHeaders2}</tr>
              </thead>
              <tbody id="dt-tbody">
                ${compRows.join('')}
              </tbody>
            </table>
          </div>
          <button class="dt-add-row-btn" id="dt-add-row">+ 新增元件</button>

          <!-- Embedded Sensor Section -->
          <div class="sensor-section">
            <button class="sensor-toggle" id="sensor-toggle">
              <span class="arrow" id="sensor-arrow">▶</span> Embedded Sensor Readings
            </button>
            <div class="sensor-body" id="sensor-body">
              <table class="sensor-table">
                <thead>
                  <tr>
                    <th>Sensor 名稱</th>
                    <th>類型</th>
                    ${sensorTaHeaders}
                    <th>備註</th>
                  </tr>
                </thead>
                <tbody id="sensor-tbody">${sensorRows}</tbody>
              </table>
              <button class="dt-add-row-btn" id="sensor-add-row" style="margin-top:6px;">+ 新增 Sensor</button>
            </div>
          </div>
        </div>
      `;

      // ── Mark category boundaries ──
      const tbody = document.getElementById('dt-tbody');
      if (tbody) {
        let prevCat = null;
        tbody.querySelectorAll('tr').forEach(tr => {
          const idx = parseInt(tr.dataset.rowIdx);
          if (!isNaN(idx) && d.components[idx]) {
            const cat = d.components[idx].category;
            if (prevCat !== null && cat !== prevCat) {
              tr.classList.add('category-boundary');
            }
            prevCat = cat;
          }
        });
      }

      // ── Bind header fields ──
      $canvas.querySelectorAll('[data-header]').forEach(el => {
        const eventType = el.tagName === 'SELECT' ? 'change' : 'input';
        el.addEventListener(eventType, () => {
          d.header[el.dataset.header] = el.value;
          if (el.dataset.header === 'stage') {
            const coverPage = state.pages.find(p => p.type === 'cover');
            if (coverPage) {
              coverPage.data.stage = el.value;
              scheduleSave(state.pages.indexOf(coverPage));
            }
          }
          scheduleSave(state.activePage);
        });
      });

      // Mounting custom
      const mountSelect = document.getElementById('data-mounting-select');
      if (mountSelect) {
        mountSelect.addEventListener('change', () => {
          if (mountSelect.value === '__custom') {
            d.header.mounting = '';
            renderDataPage(page);
            const ci = $canvas.querySelector('.data-custom-mounting');
            if (ci) ci.focus();
          } else {
            d.header.mounting = mountSelect.value;
            scheduleSave(state.activePage);
          }
        });
      }
      const customMounting = $canvas.querySelector('.data-custom-mounting');
      if (customMounting) {
        customMounting.addEventListener('input', () => {
          d.header.mounting = customMounting.value;
          scheduleSave(state.activePage);
        });
      }

      // ── Ta tags ──
      $canvas.querySelectorAll('.ta-tag-remove').forEach(btn => {
        btn.addEventListener('click', () => {
          d.ta_conditions.splice(parseInt(btn.dataset.taIdx), 1);
          scheduleSave(state.activePage);
          renderDataPage(page);
        });
      });
      const taAddBtn = document.getElementById('ta-add-btn');
      if (taAddBtn) {
        taAddBtn.addEventListener('click', () => {
          const val = prompt('輸入環境溫度 (°C)：', '35');
          if (val === null) return;
          const num = parseFloat(val);
          if (isNaN(num)) return;
          d.ta_conditions.push(num);
          scheduleSave(state.activePage);
          renderDataPage(page);
        });
      }

      // ── Helper: update computed cells in-place without re-render ──
      function updateRowComputed(ri) {
        const comp = d.components[ri];
        if (!comp) return;
        const tr = tbody?.querySelector(`tr[data-row-idx="${ri}"]`);
        if (!tr) return;

        const tcSpec = parseFloat(comp.tc_spec) || 0;
        const derating = parseFloat(comp.derating) || 0.9;
        const derated = tcSpec * derating;

        // Update Derated cell (7th td, index 6)
        const tds = tr.querySelectorAll('td');
        // Find derated cell — it's the one after TIM Type input
        const deratedCell = tds[6]; // 0:cat,1:#,2:name,3:specType,4:tcSpec,5:derating,6:derated
        if (deratedCell) deratedCell.textContent = derated > 0 ? derated.toFixed(1) : '—';

        // Update margin cells and P/F
        let rowFail = false;
        d.ta_conditions.forEach((ta, ti) => {
          const key = 'ta_' + ta;
          const measured = comp.readings[key];
          const measuredNum = parseFloat(measured);
          let marginStr = '—';
          let marginClass = 'dt-readonly';

          if (!isNaN(measuredNum) && derated > 0) {
            const margin = ((derated - measuredNum) / derated) * 100;
            marginStr = margin.toFixed(1) + '%';
            if (margin >= 10) marginClass = 'dt-margin-pass';
            else if (margin >= 0) marginClass = 'dt-margin-warn';
            else { marginClass = 'dt-margin-fail'; rowFail = true; }
          }

          // Margin cell: after TIM Type(7) + ta pairs (each ta = 2 cells: input + margin)
          const marginIdx = 8 + ti * 2 + 1; // 7=tim_type, 8=first ta input, 9=first margin...
          const marginCell = tds[marginIdx];
          if (marginCell) {
            marginCell.textContent = marginStr;
            marginCell.className = 'dt-ta-col ' + marginClass;
          }
        });

        // P/F cell
        const pfIdx = 8 + d.ta_conditions.length * 2;
        const pfCell = tds[pfIdx];
        if (pfCell) {
          const pfText = rowFail ? '❌ Fail' : (tcSpec > 0 ? '✔ Pass' : '—');
          pfCell.textContent = pfText;
          pfCell.className = rowFail ? 'dt-passfail-fail' : 'dt-passfail-pass';
        }

        // Row fail class
        tr.classList.toggle('row-fail', rowFail);

        // Update auto-number and category boundary (only for category change)
        updateAutoNumbers();
      }

      function updateAutoNumbers() {
        const catCounters2 = { RF: 0, Digital: 0, PWR: 0 };
        let prevCat2 = null;
        tbody?.querySelectorAll('tr[data-row-idx]').forEach(tr => {
          const idx = parseInt(tr.dataset.rowIdx);
          const comp = d.components[idx];
          if (!comp) return;
          const cat = comp.category;
          catCounters2[cat] = (catCounters2[cat] || 0) + 1;
          const autoNum = cat + '-' + catCounters2[cat];
          const tds = tr.querySelectorAll('td');
          if (tds[1]) tds[1].textContent = autoNum;
          // Category boundary
          if (prevCat2 !== null && cat !== prevCat2) {
            tr.classList.add('category-boundary');
          } else {
            tr.classList.remove('category-boundary');
          }
          prevCat2 = cat;
        });
      }

      // ── Component field bindings ──
      $canvas.querySelectorAll('[data-comp-field]').forEach(el => {
        const eventType = el.tagName === 'SELECT' ? 'change' : 'input';
        el.addEventListener(eventType, () => {
          const ri = parseInt(el.dataset.comp);
          const field = el.dataset.compField;
          d.components[ri][field] = el.value;
          scheduleSave(state.activePage);
          // Update computed cells in-place without re-render
          if (['category', 'tc_spec', 'derating'].includes(field)) {
            updateRowComputed(ri);
          }
        });
      });

      // ── Tc measured input bindings ──
      $canvas.querySelectorAll('[data-ta-key]').forEach(el => {
        el.addEventListener('input', () => {
          const ri = parseInt(el.dataset.comp);
          const key = el.dataset.taKey;
          d.components[ri].readings[key] = el.value;
          scheduleSave(state.activePage);
          // Update margin cell in-place
          updateRowComputed(ri);
        });
      });

      // ── Add row ──
      const addRowBtn = document.getElementById('dt-add-row');
      if (addRowBtn) {
        addRowBtn.addEventListener('click', () => {
          const lastCat = d.components.length > 0
            ? d.components[d.components.length - 1].category : 'RF';
          d.components.push({
            category: lastCat,
            name: '',
            spec_type: 'Recommended',
            tc_spec: '',
            derating: '0.90',
            tim_type: '',
            readings: {},
            note: '',
          });
          scheduleSave(state.activePage);
          renderDataPage(page);
        });
      }

      // ── Row context menu (delete) ──
      if (tbody) {
        tbody.addEventListener('contextmenu', (e) => {
          const tr = e.target.closest('tr[data-row-idx]');
          if (!tr) return;
          e.preventDefault();
          const ri = parseInt(tr.dataset.rowIdx);
          if (confirm('確定要刪除此元件列？')) {
            d.components.splice(ri, 1);
            scheduleSave(state.activePage);
            renderDataPage(page);
          }
        });
      }

      // ── Sensor toggle ──
      const sensorToggle = document.getElementById('sensor-toggle');
      const sensorBody = document.getElementById('sensor-body');
      const sensorArrow = document.getElementById('sensor-arrow');
      if (sensorToggle) {
        sensorToggle.addEventListener('click', () => {
          sensorBody.classList.toggle('open');
          sensorArrow.classList.toggle('open');
        });
      }

      // ── Sensor field bindings ──
      $canvas.querySelectorAll('[data-sensor-field]').forEach(el => {
        const eventType = el.tagName === 'SELECT' ? 'change' : 'input';
        el.addEventListener(eventType, () => {
          const si = parseInt(el.dataset.sensor);
          d.sensors[si][el.dataset.sensorField] = el.value;
          scheduleSave(state.activePage);
        });
      });

      $canvas.querySelectorAll('[data-sensor-ta]').forEach(el => {
        el.addEventListener('input', () => {
          const si = parseInt(el.dataset.sensor);
          d.sensors[si].readings[el.dataset.sensorTa] = el.value;
          scheduleSave(state.activePage);
        });
      });

      // ── Add sensor row ──
      const sensorAddBtn = document.getElementById('sensor-add-row');
      if (sensorAddBtn) {
        sensorAddBtn.addEventListener('click', () => {
          d.sensors.push({ name: '', type: 'Tj only', readings: {}, note: '' });
          scheduleSave(state.activePage);
          renderDataPage(page);
          // Auto-open sensor section
          if (!sensorBody.classList.contains('open')) {
            sensorBody.classList.add('open');
            sensorArrow.classList.add('open');
          }
        });
      }
    }

    // ━━━ Sim vs Meas Comparison Page Module ━━━
    function addSimVsMeasPage() {
      const page = {
        id: 'page_' + Date.now(),
        type: 'sim_vs_meas',
        order: state.pages.length,
        data: {
          title: '',
          sim_image: '',
          meas_image: '',
          sim_note: '',
          items: [],
        }
      };
      state.pages.push(page);
      renderPageList();
      selectPage(state.pages.length - 1);
      scheduleSave(state.pages.length - 1);
    }

    function getDataPageComponents() {
      // Gather all components from all data pages
      const result = [];
      state.pages.forEach(p => {
        if (p.type !== 'data') return;
        const comps = p.data.components || [];
        const tas = p.data.ta_conditions || [];
        const catCounters = { RF: 0, Digital: 0, PWR: 0 };
        comps.forEach(comp => {
          const cat = comp.category || 'RF';
          catCounters[cat] = (catCounters[cat] || 0) + 1;
          const tcSpec = parseFloat(comp.tc_spec) || 0;
          const derating = parseFloat(comp.derating) || 0.9;
          const derated = tcSpec * derating;

          // Find meas Tc at Ta=55 (or highest Ta)
          let measTc = '';
          const ta55Key = 'ta_55';
          if (comp.readings && comp.readings[ta55Key] !== undefined && comp.readings[ta55Key] !== '') {
            measTc = comp.readings[ta55Key];
          } else if (tas.length > 0) {
            // Fallback: use the last (highest) Ta
            const lastTa = tas[tas.length - 1];
            const lastKey = 'ta_' + lastTa;
            if (comp.readings && comp.readings[lastKey] !== undefined) {
              measTc = comp.readings[lastKey];
            }
          }

          result.push({
            category: cat,
            component_name: comp.name || ('(' + cat + '-' + catCounters[cat] + ')'),
            tc_derated: derated,
            meas_tc: measTc,
            sourceId: cat + '-' + catCounters[cat],
          });
        });
      });
      return result;
    }

    function showComponentSelectModal(page, callback) {
      const available = getDataPageComponents();
      if (available.length === 0) {
        alert('尚無數據頁元件可選取。請先在數據頁新增元件。');
        return;
      }

      // Track already-selected names
      const existing = new Set((page.data.items || []).map(it => it.component_name));

      const overlay = document.createElement('div');
      overlay.className = 'sim-modal-overlay';

      let itemsHTML = available.map((comp, i) => {
        const checked = existing.has(comp.component_name) ? 'checked' : '';
        const catClass = comp.category === 'RF' ? 'cat-rf' : comp.category === 'Digital' ? 'cat-digital' : 'cat-pwr';
        return `<label class="sim-modal-item">
          <input type="checkbox" value="${i}" ${checked}>
          <span class="sim-modal-item-cat ${catClass}">${comp.category}</span>
          <span class="sim-modal-item-label">${escapeAttr(comp.component_name)}</span>
        </label>`;
      }).join('');

      overlay.innerHTML = `
        <div class="sim-modal">
          <div class="sim-modal-header">從數據頁選取元件</div>
          <div class="sim-modal-body">${itemsHTML}</div>
          <div class="sim-modal-footer">
            <button class="sim-modal-btn" id="sim-modal-cancel">取消</button>
            <button class="sim-modal-btn primary" id="sim-modal-confirm">確認選取</button>
          </div>
        </div>
      `;

      document.body.appendChild(overlay);

      overlay.querySelector('#sim-modal-cancel').addEventListener('click', () => {
        document.body.removeChild(overlay);
      });

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) document.body.removeChild(overlay);
      });

      overlay.querySelector('#sim-modal-confirm').addEventListener('click', () => {
        const checked = overlay.querySelectorAll('input[type="checkbox"]:checked');
        const selected = [];
        checked.forEach(cb => {
          const comp = available[parseInt(cb.value)];
          // Preserve existing sim_tc / note if already present
          const existingItem = (page.data.items || []).find(it => it.component_name === comp.component_name);
          selected.push({
            category: comp.category,
            component_name: comp.component_name,
            tc_derated: comp.tc_derated,
            sim_tc: existingItem ? existingItem.sim_tc : '',
            meas_tc: comp.meas_tc,
            note: existingItem ? existingItem.note : '',
          });
        });
        document.body.removeChild(overlay);
        callback(selected);
      });
    }

    function renderSimVsMeasPage(page) {
      const d = page.data;
      if (!d.items) d.items = [];

      const hasSim = !!d.sim_image;
      const hasMeas = !!d.meas_image;

      // Refresh meas_tc from data pages
      const latestComps = getDataPageComponents();
      d.items.forEach(item => {
        const match = latestComps.find(c => c.component_name === item.component_name && c.category === item.category);
        if (match) {
          item.meas_tc = match.meas_tc;
          item.tc_derated = match.tc_derated;
        }
      });

      // Build table rows
      const rows = d.items.map((item, i) => {
        const simTc = parseFloat(item.sim_tc);
        const measTc = parseFloat(item.meas_tc);
        let devC = '—', devPct = '—', judgeText = '—', devCClass = '', devPClass = '', judgeClass = '';

        if (!isNaN(simTc) && !isNaN(measTc)) {
          const dc = simTc - measTc;
          devC = dc.toFixed(1);
          if (measTc !== 0) {
            const dp = (dc / measTc) * 100;
            devPct = dp.toFixed(1) + '%';
            const absDp = Math.abs(dp);
            if (absDp <= 10) {
              devCClass = devPClass = 'sim-dev-good';
              judgeText = '✅'; judgeClass = 'sim-dev-good';
            } else if (absDp <= 20) {
              devCClass = devPClass = 'sim-dev-warn';
              judgeText = '⚠️'; judgeClass = 'sim-dev-warn';
            } else {
              devCClass = devPClass = 'sim-dev-bad';
              judgeText = '❌'; judgeClass = 'sim-dev-bad';
            }
          }
        }

        const catClass = item.category === 'RF' ? 'cat-rf' : item.category === 'Digital' ? 'cat-digital' : 'cat-pwr';

        return `<tr data-sim-row="${i}">
          <td><span class="dt-cat-strip ${catClass}"></span><span class="sim-readonly">${escapeAttr(item.category)}</span></td>
          <td class="sim-readonly">${escapeAttr(item.component_name)}</td>
          <td class="sim-readonly">${item.tc_derated ? parseFloat(item.tc_derated).toFixed(1) : '—'}</td>
          <td><input type="number" step="any" style="width:55px;text-align:center;" placeholder="—" value="${item.sim_tc !== undefined && item.sim_tc !== '' ? escapeAttr(String(item.sim_tc)) : ''}" data-sim-idx="${i}" data-sim-field="sim_tc"></td>
          <td class="sim-readonly">${!isNaN(measTc) ? measTc.toFixed(1) : '—'}</td>
          <td class="${devCClass}" style="text-align:center;">${devC}</td>
          <td class="${devPClass}" style="text-align:center;">${devPct}</td>
          <td class="sim-judge ${judgeClass}">${judgeText}</td>
          <td><input type="text" placeholder="備註" value="${escapeAttr(item.note || '')}" data-sim-idx="${i}" data-sim-field="note"></td>
        </tr>`;
      }).join('');

      $canvas.innerHTML = `
        <div class="sim-page">
          <div class="sim-page-top">
            <div class="sim-page-title">Simulation vs Measurement Comparison</div>
            <button class="sim-select-btn" id="sim-select-comp">從數據頁選取元件</button>
          </div>

          <!-- Image pair -->
          <div class="sim-images">
            <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
              <div class="sim-img-zone ${hasSim ? 'has-image' : ''}" id="sim-img-zone-sim">
                ${hasSim
                  ? `<img src="${escapeAttr(d.sim_image)}" alt="FloTHERM">
                     <div class="sim-img-actions">
                       <button class="sim-img-action-btn" id="sim-replace-sim">替換</button>
                       <button class="sim-img-action-btn danger" id="sim-delete-sim">刪除</button>
                     </div>`
                  : `<div class="sim-img-placeholder"><span class="icon">🖥</span>FloTHERM 截圖</div>`}
                <input type="file" accept="image/*" id="sim-file-sim" style="display:none">
              </div>
              <div class="sim-img-label">FloTHERM Simulation</div>
            </div>
            <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
              <div class="sim-img-zone ${hasMeas ? 'has-image' : ''}" id="sim-img-zone-meas">
                ${hasMeas
                  ? `<img src="${escapeAttr(d.meas_image)}" alt="Measurement">
                     <div class="sim-img-actions">
                       <button class="sim-img-action-btn" id="sim-replace-meas">替換</button>
                       <button class="sim-img-action-btn danger" id="sim-delete-meas">刪除</button>
                     </div>`
                  : `<div class="sim-img-placeholder"><span class="icon">📷</span>IR / TC 量測照片</div>`}
                <input type="file" accept="image/*" id="sim-file-meas" style="display:none">
              </div>
              <div class="sim-img-label">Measurement (IR / TC)</div>
            </div>
          </div>

          <!-- Comparison table -->
          <div class="sim-table-wrap">
            <table class="sim-table">
              <thead>
                <tr>
                  <th>類別</th>
                  <th>元件名稱</th>
                  <th>Derated</th>
                  <th>Sim Tc</th>
                  <th>Meas Tc</th>
                  <th>Dev (°C)</th>
                  <th>Dev (%)</th>
                  <th>判斷</th>
                  <th>備註</th>
                </tr>
              </thead>
              <tbody id="sim-tbody">${rows}</tbody>
            </table>
          </div>

          <!-- Bottom note -->
          <input class="sim-note-input" type="text" placeholder="請輸入模擬條件說明，如邊界條件假設、功耗設定..."
                 value="${escapeAttr(d.sim_note || '')}" id="sim-note">
        </div>
      `;

      // ── Select components button ──
      document.getElementById('sim-select-comp').addEventListener('click', () => {
        showComponentSelectModal(page, (selected) => {
          d.items = selected;
          scheduleSave(state.activePage);
          renderSimVsMeasPage(page);
        });
      });

      // ── Image handlers ──
      setupSimImageZone(page, 'sim', 'sim_image');
      setupSimImageZone(page, 'meas', 'meas_image');

      // ── Sim Tc input ──
      $canvas.querySelectorAll('[data-sim-field="sim_tc"]').forEach(el => {
        el.addEventListener('input', () => {
          const idx = parseInt(el.dataset.simIdx);
          d.items[idx].sim_tc = el.value;
          scheduleSave(state.activePage);
          // Re-render for computed Dev columns
          renderSimVsMeasPage(page);
        });
      });

      // ── Note fields ──
      $canvas.querySelectorAll('[data-sim-field="note"]').forEach(el => {
        el.addEventListener('input', () => {
          const idx = parseInt(el.dataset.simIdx);
          d.items[idx].note = el.value;
          scheduleSave(state.activePage);
        });
      });

      // ── Bottom sim note ──
      const simNote = document.getElementById('sim-note');
      if (simNote) {
        simNote.addEventListener('input', () => {
          d.sim_note = simNote.value;
          scheduleSave(state.activePage);
        });
      }

      // ── Row right-click delete ──
      const simTbody = document.getElementById('sim-tbody');
      if (simTbody) {
        simTbody.addEventListener('contextmenu', (e) => {
          const tr = e.target.closest('tr[data-sim-row]');
          if (!tr) return;
          e.preventDefault();
          const ri = parseInt(tr.dataset.simRow);
          if (confirm('確定要移除此比對元件？')) {
            d.items.splice(ri, 1);
            scheduleSave(state.activePage);
            renderSimVsMeasPage(page);
          }
        });
      }
    }

    function setupSimImageZone(page, key, dataField) {
      const zone = document.getElementById('sim-img-zone-' + key);
      const fileInput = document.getElementById('sim-file-' + key);
      if (!zone || !fileInput) return;

      const handleFile = async (file) => {
        if (!file || !file.type.startsWith('image/')) return;
        const imageData = await processImage(file);
        page.data[dataField] = imageData;
        scheduleSave(state.activePage);
        renderSimVsMeasPage(page);
      };

      zone.addEventListener('click', (e) => {
        if (e.target.closest('.sim-img-action-btn')) return;
        fileInput.click();
      });

      fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
      });

      zone.addEventListener('dragover', (e) => {
        e.preventDefault();
        zone.classList.add('dragover');
      });
      zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.classList.remove('dragover');
        if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
      });

      // Replace / Delete
      const replaceBtn = document.getElementById('sim-replace-' + key);
      const deleteBtn = document.getElementById('sim-delete-' + key);

      if (replaceBtn) {
        replaceBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          fileInput.click();
        });
      }

      if (deleteBtn) {
        deleteBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          page.data[dataField] = '';
          scheduleSave(state.activePage);
          renderSimVsMeasPage(page);
        });
      }
    }

    // ━━━ Conclusion Page Module ━━━
    function addConclusionPage() {
      const page = {
        id: 'page_' + Date.now(),
        type: 'conclusion',
        order: state.pages.length,
        data: {
          summary: '',
          compliance: [],
          issues: [''],
          actions: [],
        }
      };
      state.pages.push(page);
      renderPageList();
      selectPage(state.pages.length - 1);
      scheduleSave(state.pages.length - 1);
    }

    function renderConclusionPage(page) {
      const d = page.data;
      if (!d.issues) d.issues = [''];
      if (!d.compliance) d.compliance = [];
      if (!d.actions) d.actions = [];

      // Build compliance rows
      let complianceRows = '';
      d.compliance.forEach((row, i) => {
        const verdictClass = row.verdict === 'pass' ? 'concl-verdict-pass'
          : row.verdict === 'warning' ? 'concl-verdict-warning'
          : row.verdict === 'fail' ? 'concl-verdict-fail' : '';
        complianceRows += `
          <tr>
            <td><input type="text" placeholder="元件名稱" value="${escapeAttr(row.component)}" data-comp-idx="${i}" data-comp-field="component"></td>
            <td><input type="text" placeholder="°C" value="${escapeAttr(row.tc_max)}" data-comp-idx="${i}" data-comp-field="tc_max"></td>
            <td><input type="text" placeholder="°C" value="${escapeAttr(row.spec)}" data-comp-idx="${i}" data-comp-field="spec"></td>
            <td class="${verdictClass}">
              <select data-comp-idx="${i}" data-comp-field="verdict">
                <option value="" ${!row.verdict ? 'selected' : ''}>—</option>
                <option value="pass" ${row.verdict === 'pass' ? 'selected' : ''}>✅ Pass</option>
                <option value="warning" ${row.verdict === 'warning' ? 'selected' : ''}>⚠️ Warning</option>
                <option value="fail" ${row.verdict === 'fail' ? 'selected' : ''}>❌ Fail</option>
              </select>
            </td>
          </tr>`;
      });

      // Build issues
      let issuesHtml = '';
      d.issues.forEach((issue, i) => {
        issuesHtml += `
          <li class="concl-issue-item">
            <span class="concl-issue-bullet">•</span>
            <input class="concl-issue-input" type="text" placeholder="輸入問題描述..."
                   value="${escapeAttr(issue)}" data-issue-idx="${i}">
          </li>`;
      });

      // Build actions rows
      let actionsRows = '';
      d.actions.forEach((act, i) => {
        actionsRows += `
          <tr>
            <td><input type="text" placeholder="行動描述" value="${escapeAttr(act.description)}" data-act-idx="${i}" data-act-field="description"></td>
            <td><input type="text" placeholder="Owner" value="${escapeAttr(act.owner)}" data-act-idx="${i}" data-act-field="owner"></td>
            <td><input type="date" value="${escapeAttr(act.due_date)}" data-act-idx="${i}" data-act-field="due_date"></td>
          </tr>`;
      });

      $canvas.innerHTML = `
        <div class="conclusion-page">
          <!-- 1. Summary -->
          <div class="concl-section">
            <div class="concl-section-title">Conclusion</div>
            <div class="concl-summary" contenteditable="true" data-placeholder="請輸入實驗結論..."
                 id="concl-summary-editor">${d.summary || ''}</div>
          </div>

          <!-- 2. Compliance Summary -->
          <div class="concl-section">
            <div class="concl-section-title">Compliance Summary</div>
            <table class="concl-table">
              <thead>
                <tr>
                  <th style="width:30%">Component</th>
                  <th style="width:20%">Max Tc (°C)</th>
                  <th style="width:20%">Derated Spec</th>
                  <th style="width:30%">Verdict</th>
                </tr>
              </thead>
              <tbody id="compliance-tbody">${complianceRows}</tbody>
            </table>
            <button class="concl-add-btn" id="add-compliance-btn">+ 新增元件</button>
          </div>

          <!-- 3. Issues Found -->
          <div class="concl-section">
            <div class="concl-section-title">Issues Found</div>
            <ul class="concl-issues-list" id="issues-list">${issuesHtml}</ul>
          </div>

          <!-- 4. Next Action -->
          <div class="concl-section">
            <div class="concl-section-title">Next Action</div>
            <table class="concl-actions-table">
              <thead>
                <tr>
                  <th style="width:50%">Action</th>
                  <th style="width:25%">Owner</th>
                  <th style="width:25%">Due Date</th>
                </tr>
              </thead>
              <tbody id="actions-tbody">${actionsRows}</tbody>
            </table>
            <button class="concl-add-btn" id="add-action-btn">+ 新增行動</button>
          </div>
