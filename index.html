              <button class="dropdown-item" data-type="annotation">📍 標註頁</button>
              <button class="dropdown-item" data-type="data">📊 數據頁</button>
              <button class="dropdown-item" data-type="sim_vs_meas">📉 比對頁</button>
              <button class="dropdown-item" data-type="conclusion">📝 結論頁</button>
            </div>
          </div>
        </div>
      </aside>

      <!-- Editor -->
      <main class="editor-area">
        <div id="tim-panel-container"></div>
        <div class="canvas-tag" id="canvas-tag">A4 PORTRAIT</div>
        <button class="page-nav-btn prev" id="btn-prev-page" title="上一頁">&#9664;</button>
        <div id="editor-canvas">
          <span class="canvas-placeholder" id="canvas-placeholder">← 請從左側選擇或新增頁面</span>
        </div>
        <button class="page-nav-btn next" id="btn-next-page" title="下一頁">&#9654;</button>
      </main>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="context-menu">
    <button class="context-item" id="context-duplicate" style="color: var(--text-primary);">📋 複製此頁</button>
    <button class="context-item" id="context-delete">🗑 刪除此頁面</button>
  </div>

  <!-- Preview Overlay -->
  <div class="preview-overlay" id="preview-overlay">
    <button class="preview-close" id="preview-close">✕</button>
    <div class="preview-canvas-wrap" id="preview-canvas-wrap"></div>
    <button class="preview-nav-btn prev" id="preview-prev" title="上一頁">&#9664;</button>
    <button class="preview-nav-btn next" id="preview-next" title="下一頁">&#9654;</button>
    <div class="preview-footer" id="preview-footer"></div>
  </div>

  <script>
    // ━━━ App State ━━━
    const state = {
      reportId: null,
      pages: [],          // [{id, type, order, data}]
      activePage: null,   // index into pages[]
      saveTimer: null,
      timLibrary: { grease: [], pad: [], putty: [] },
    };

    // ━━━ Undo / Redo ━━━
    const UNDO_MAX = 40;
    const undoStacks = {};   // pageId → [ JSON snapshots ]
    const redoStacks = {};   // pageId → [ JSON snapshots ]

    function performUndo() {
      if (state.activePage === null) return;
      const page = state.pages[state.activePage];
      const id = page.id;
      const stack = undoStacks[id];
      if (!stack || stack.length === 0) return;
      if (!redoStacks[id]) redoStacks[id] = [];
      redoStacks[id].push(JSON.stringify(page.data));
      page.data = JSON.parse(stack.pop());
      lastSavedSnapshots[id] = JSON.stringify(page.data);
      renderCanvas();
      _skipUndoCapture = true;
      scheduleSave(state.activePage);
      _skipUndoCapture = false;
      updateUndoRedoButtons();
    }

    function performRedo() {
      if (state.activePage === null) return;
      const page = state.pages[state.activePage];
      const id = page.id;
      const stack = redoStacks[id];
      if (!stack || stack.length === 0) return;
      if (!undoStacks[id]) undoStacks[id] = [];
      undoStacks[id].push(JSON.stringify(page.data));
      page.data = JSON.parse(stack.pop());
      lastSavedSnapshots[id] = JSON.stringify(page.data);
      renderCanvas();
      _skipUndoCapture = true;
      scheduleSave(state.activePage);
      _skipUndoCapture = false;
      updateUndoRedoButtons();
    }

    function updateUndoRedoButtons() {
      const btnUndo = document.getElementById('btn-undo');
      const btnRedo = document.getElementById('btn-redo');
      if (!btnUndo || !btnRedo) return;
      if (state.activePage === null) {
        btnUndo.disabled = true;
        btnRedo.disabled = true;
        return;
      }
      const id = state.pages[state.activePage]?.id;
      btnUndo.disabled = !(undoStacks[id]?.length > 0);
      btnRedo.disabled = !(redoStacks[id]?.length > 0);
    }

    // ━━━ DOM refs ━━━
    const $pageList = document.getElementById('page-list');
    const $canvas = document.getElementById('editor-canvas');
    const $placeholder = document.getElementById('canvas-placeholder');
    const $statusDot = document.getElementById('status-dot');
    const $statusText = document.getElementById('status-text');
    const $contextMenu = document.getElementById('context-menu');
    const $btnPrev = document.getElementById('btn-prev-page');
    const $btnNext = document.getElementById('btn-next-page');

    // ━━━ Page nav buttons ━━━
    function updatePageNavButtons() {
      const idx = state.activePage;
      const total = state.pages.length;
      $btnPrev.disabled = (idx === null || idx <= 0);
      $btnNext.disabled = (idx === null || idx >= total - 1);
      $btnPrev.style.display = (total > 0) ? '' : 'none';
      $btnNext.style.display = (total > 0) ? '' : 'none';
    }

    $btnPrev.addEventListener('click', () => {
      if (state.activePage > 0) selectPage(state.activePage - 1);
    });
    $btnNext.addEventListener('click', () => {
      if (state.activePage < state.pages.length - 1) selectPage(state.activePage + 1);
    });
    // Hide initially until pages load
    $btnPrev.style.display = 'none';
    $btnNext.style.display = 'none';

    // ━━━ Status helpers ━━━
    function setStatus(type, text) {
      $statusDot.className = 'status-dot' + (type === 'saving' ? ' saving' : type === 'offline' ? ' offline' : '');
      $statusText.textContent = text;
    }

    // ━━━ Report ID management ━━━
    function getOrCreateReportId() {
      let id = localStorage.getItem('thermal_current_report');
      if (!id) {
        id = 'rpt_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
        localStorage.setItem('thermal_current_report', id);
      }
      return id;
    }

    // ━━━ Firebase helpers (wait for module to load) ━━━
    function waitForFirebase() {
      return new Promise((resolve) => {
        const check = () => {
          if (window._db) resolve();
          else setTimeout(check, 50);
        };
        check();
      });
    }

    async function savePageToFirestore(pageIndex) {
      const page = state.pages[pageIndex];
      if (!page) return;

      setStatus('saving', '儲存中...');

      try {
        await dbAdapter.setPage(state.reportId, page.order, {
          type: page.type,
          order: page.order,
          data: page.data,
          updated_at: new Date().toISOString(),
        });
        setStatus('saved', '已儲存');
        console.log('✅ Saved page', page.order);
        updateReportMeta();
      } catch (err) {
        console.error('Save error:', err);
        setStatus('offline', '儲存失敗 ❌');
        console.error('Save failed:', err.message);
      }
    }

    async function loadPageFromFirestore(pageOrder) {
      try {
        return await dbAdapter.getPage(state.reportId, pageOrder);
      } catch (err) {
        console.warn('Load error:', err);
      }
      return null;
    }

    async function deletePageFromFirestore(pageOrder) {
      try {
        await dbAdapter.deletePage(state.reportId, pageOrder);
        console.log('🗑 Deleted page', pageOrder);
      } catch (err) {
        console.warn('Delete error:', err);
      }
    }

    // ━━━ Debounced auto-save ━━━
    const saveTimers = {};
    const lastSavedSnapshots = {};
    let _skipUndoCapture = false;

    function scheduleSave(pageIndex) {
      const page = state.pages[pageIndex];
      if (page && !_skipUndoCapture) {
        const id = page.id;
        if (!saveTimers[pageIndex] && lastSavedSnapshots[id]) {
          if (!undoStacks[id]) undoStacks[id] = [];
          undoStacks[id].push(lastSavedSnapshots[id]);
          if (undoStacks[id].length > UNDO_MAX) undoStacks[id].shift();
          if (!redoStacks[id]) redoStacks[id] = [];
          redoStacks[id].length = 0;
          updateUndoRedoButtons();
        }
      }
      if (saveTimers[pageIndex]) clearTimeout(saveTimers[pageIndex]);
      saveTimers[pageIndex] = setTimeout(() => {
        delete saveTimers[pageIndex];
        savePageToFirestore(pageIndex);
        if (page) lastSavedSnapshots[page.id] = JSON.stringify(page.data);
      }, 1000);
    }

    function initPageSnapshot(page) {
      if (page) lastSavedSnapshots[page.id] = JSON.stringify(page.data);
    }

    // ━━━ Image handling (base64 / Storage) ━━━
    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // 本機模式已移除圖片大小限制，直接使用原始 base64
    async function processImage(file) {
      return await fileToDataURL(file);
    }

    // Compress image with adaptive quality to fit within targetBytes (base64 size)
    function compressImageToTarget(file, targetBytes) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = () => {
          const img = new Image();
          img.onerror = reject;
          img.onload = () => {
            // Step down: try progressively smaller sizes until it fits
            const attempts = [
              { maxDim: 1200, quality: 0.70 },
              { maxDim: 1000, quality: 0.60 },
              { maxDim: 800,  quality: 0.50 },
              { maxDim: 600,  quality: 0.45 },
              { maxDim: 480,  quality: 0.40 },
            ];

            for (const { maxDim, quality } of attempts) {
              const result = compressToCanvas(img, maxDim, quality);
              if (result.length <= targetBytes) {
                console.log(`✅ Image compressed: ${(result.length / 1024).toFixed(0)}KB (${maxDim}px, q=${quality})`);
                resolve(result);
                return;
              }
            }
            // Last resort: smallest size
            const fallback = compressToCanvas(img, 400, 0.35);
            console.log(`⚠️ Image force-compressed: ${(fallback.length / 1024).toFixed(0)}KB`);
            resolve(fallback);
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function compressToCanvas(img, maxDim, quality) {
      let w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        const scale = maxDim / Math.max(w, h);
        w = Math.round(w * scale);
        h = Math.round(h * scale);
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      return canvas.toDataURL('image/jpeg', quality);
    }

    // ━━━ Dropdown logic ━━━
    function setupDropdown(btnId, menuId) {
      const btn = document.getElementById(btnId);
      const menu = document.getElementById(menuId);

      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        // Close all other dropdowns
        document.querySelectorAll('.dropdown-menu.open').forEach(m => {
          if (m !== menu) m.classList.remove('open');
        });
        menu.classList.toggle('open');
      });

      menu.querySelectorAll('.dropdown-item').forEach(item => {
        item.addEventListener('click', (e) => {
          e.stopPropagation();
          menu.classList.remove('open');
          const type = item.dataset.type;
          if (type === 'cover') addCoverPage();
          else if (type === 'image') addImagePage();
          else if (type === 'annotation') addAnnotationPage();
          else if (type === 'data') addDataPage();
          else if (type === 'sim_vs_meas') addSimVsMeasPage();
          else if (type === 'conclusion') addConclusionPage();
        });
      });
    }

    // Close dropdowns / context menu on outside click
    document.addEventListener('click', () => {
      document.querySelectorAll('.dropdown-menu.open').forEach(m => m.classList.remove('open'));
      $contextMenu.classList.remove('open');
    });

    // ━━━ Page management ━━━
    function addCoverPage() {
      const today = new Date().toISOString().slice(0, 10);
      const page = {
        id: 'page_' + Date.now(),
        type: 'cover',
        order: state.pages.length,
        data: {
          project_name: '',
          model: '',
          stage: 'DVT',
          tested_by: '',
          date: today,
          dept: '',
          report_version: 'v1.0',
          cover_image: '',
          cover_image_w: 460,
          cover_image_h: 300,
        }
      };
      state.pages.push(page);
      initPageSnapshot(page);
      renderPageList();
      selectPage(state.pages.length - 1);
      scheduleSave(state.pages.length - 1);
    }

    function renderPageList() {
      $pageList.innerHTML = '';
      state.pages.forEach((page, idx) => {
        const el = document.createElement('div');
        el.className = 'page-item' + (idx === state.activePage ? ' active' : '');
        el.dataset.index = idx;

        let icon = '📄';
        let label = '未知頁面';
        if (page.type === 'cover') { icon = '🏠'; label = '封面頁'; }
        if (page.type === 'image') {
          icon = '🖼';
          let imgCount = 0;
          for (let j = 0; j <= idx; j++) {
            if (state.pages[j].type === 'image') imgCount++;
          }
          label = '圖片頁 ' + imgCount;
        }
        if (page.type === 'annotation') { icon = '📍'; label = '標註頁'; }
        if (page.type === 'data') {
          icon = '📊';
          let dataCount = 0;
          for (let j = 0; j <= idx; j++) {
            if (state.pages[j].type === 'data') dataCount++;
          }
          label = '數據頁 ' + dataCount;
        }
        if (page.type === 'sim_vs_meas') { icon = '📉'; label = '比對頁'; }
        if (page.type === 'conclusion') { icon = '📝'; label = '結論頁'; }

        const idxSpan = document.createElement('span');
        idxSpan.style.cssText = 'font-family:var(--font-mono);font-size:9px;color:var(--d-400);width:16px;text-align:right;flex-shrink:0;';
        idxSpan.textContent = String(idx + 1).padStart(2, '0');
        el.appendChild(idxSpan);
        const labelSpan = document.createElement('span');
        labelSpan.textContent = label;
        el.appendChild(labelSpan);

        el.addEventListener('click', () => selectPage(idx));
        el.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          showContextMenu(e, idx);
        });

        $pageList.appendChild(el);
      });
    }

    function selectPage(idx) {
      state.activePage = idx;
      renderPageList();
      renderCanvas();
      updatePageNavButtons();
      updateUndoRedoButtons();
    }

    // ━━━ Context menu ━━━
    let contextTarget = null;

    function showContextMenu(e, pageIdx) {
      contextTarget = pageIdx;
      $contextMenu.style.left = e.clientX + 'px';
      $contextMenu.style.top = e.clientY + 'px';
      $contextMenu.classList.add('open');
    }

    document.getElementById('context-delete').addEventListener('click', () => {
      $contextMenu.classList.remove('open');
      if (contextTarget === null) return;

      if (!confirm('確定要刪除此頁面嗎？')) return;

      const page = state.pages[contextTarget];
      const oldTotalPages = state.pages.length;
      deletePageFromFirestore(page.order);
      state.pages.splice(contextTarget, 1);

      // Re-index orders
      state.pages.forEach((p, i) => p.order = i);

      // Re-save all shifted pages so Firestore doc IDs stay contiguous
      for (let i = contextTarget; i < state.pages.length; i++) {
        scheduleSave(i);
      }
      // Delete orphaned last doc in Firestore (old last position is now empty)
      if (oldTotalPages - 1 >= state.pages.length) {
        deletePageFromFirestore(oldTotalPages - 1);
      }

      if (state.activePage >= state.pages.length) {
        state.activePage = state.pages.length - 1;
      }
      if (state.pages.length === 0) state.activePage = null;

      renderPageList();
      renderCanvas();
      updatePageNavButtons();
      contextTarget = null;
    });

    // ━━━ Duplicate page ━━━
    document.getElementById('context-duplicate').addEventListener('click', () => {
      $contextMenu.classList.remove('open');
      if (contextTarget === null) return;

      const src = state.pages[contextTarget];
      const clone = {
        id: 'page_' + Date.now(),
        type: src.type,
        order: contextTarget + 1,
        data: JSON.parse(JSON.stringify(src.data)),
      };

      // Insert after source
      state.pages.splice(contextTarget + 1, 0, clone);
      initPageSnapshot(clone);
      // Re-index orders
      state.pages.forEach((p, i) => p.order = i);

      renderPageList();
      selectPage(contextTarget + 1);
      // Save the new page and any reordered pages after it
      for (let i = contextTarget + 1; i < state.pages.length; i++) {
        scheduleSave(i);
      }
      contextTarget = null;
    });

    // ━━━ Canvas rendering ━━━
    function renderCanvas() {
      $canvas.classList.remove('scrollable-edit');
      const editorArea = $canvas.closest('.editor-area');
      if (editorArea) editorArea.classList.remove('has-tim-panel');
      const canvasTag = document.getElementById('canvas-tag');
      const timContainer = document.getElementById('tim-panel-container');
      if (timContainer) timContainer.innerHTML = '';
      if (state.activePage === null || state.activePage < 0 || !state.pages[state.activePage]) {
        $canvas.classList.remove('landscape');
        $canvas.innerHTML = '<span class="canvas-placeholder">← 請從左側選擇或新增頁面</span>';
        if (canvasTag) canvasTag.textContent = 'A4 PORTRAIT';
        return;
      }

      const page = state.pages[state.activePage];
      // Switch canvas orientation
      if (page.type === 'image' || page.type === 'annotation' || page.type === 'sim_vs_meas' || page.type === 'data') {
        $canvas.classList.add('landscape');
        if (canvasTag) canvasTag.textContent = 'A4 LANDSCAPE';
      } else {
        $canvas.classList.remove('landscape');
        if (canvasTag) canvasTag.textContent = 'A4 PORTRAIT';
      }

      if (page.type === 'cover') {
        renderCoverPage(page);
      } else if (page.type === 'image') {
        renderImagePage(page);
      } else if (page.type === 'annotation') {
        renderAnnotationPage(page);
      } else if (page.type === 'data') {
        renderDataPage(page);
      } else if (page.type === 'sim_vs_meas') {
        renderSimVsMeasPage(page);
      } else if (page.type === 'conclusion') {
        renderConclusionPage(page);
      }
    }

    function renderCoverPage(page) {
      const d = page.data;
      const hasImage = !!d.cover_image;
      // Photo zone uses percentage width + aspect-ratio for responsive scaling
      const pzWidthPct = d.cover_image_w_pct || 77; // % of cover-page width
      const pzAspect = (d.cover_image_w || 460) / (d.cover_image_h || 300);

      $canvas.innerHTML = `
        <div class="cover-page">
          <div class="cover-corner-tl"></div>
          <div class="cover-corner-tr"></div>
          <div class="cover-corner-bl"></div>
          <div class="cover-corner-br"></div>

          <img src="${DELTA_FULL_LOGO_B64}" style="position:absolute;top:14px;right:16px;height:28px;width:auto;object-fit:contain;pointer-events:none;" alt="Delta">

          <div class="cover-type-label">THERMAL TEST REPORT</div>

          <input class="cover-dept" type="text" placeholder="公司 / 部門名稱"
                 value="${escapeAttr(d.dept)}" data-field="dept">

          <div class="cover-photo-zone ${hasImage ? 'has-image' : ''}" id="cover-photo-zone"
               style="width:${pzWidthPct}%;aspect-ratio:${pzAspect.toFixed(4)};">
            ${hasImage
              ? `<img src="${escapeAttr(d.cover_image)}" alt="Cover" style="position:relative;z-index:1;">
                 <div class="cover-photo-actions">
                   <button class="photo-action-btn" id="photo-replace">替換</button>
                   <button class="photo-action-btn danger" id="photo-delete">刪除</button>
                 </div>
                 <div class="cover-photo-resize" id="cover-photo-resize"></div>`
              : `<div class="cover-photo-placeholder" style="position:relative;z-index:1;">
                   <div class="crosshair-icon" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;">
                     <div style="width:24px;height:1px;background:var(--d-200);position:absolute;top:0;left:-12px;"></div>
                     <div style="width:1px;height:24px;background:var(--d-200);position:absolute;top:-12px;left:0;"></div>
                   </div>
                   <span class="icon" style="font-size:24px;margin-bottom:6px;">📷</span>
                   拖拉圖片或 Ctrl+V 貼上
                   <button class="img-browse-btn" data-browse="cover">瀏覽檔案</button>
                 </div>`
            }
            <input type="file" accept="image/*" id="cover-file-input" style="display:none">
          </div>

          <input class="cover-project-name" type="text" placeholder="產品型號（Model）"
                 value="${escapeAttr(d.model)}" data-field="model">
          <div class="cover-divider"></div>
          <input class="cover-model" type="text" placeholder="案名（Project Name）"
                 value="${escapeAttr(d.project_name)}" data-field="project_name">

          <div class="cover-meta-grid">
            <span class="cover-meta-label">Stage</span>
            <select data-field="stage">
              ${['Prototype','EVT','DVT','PVT','MP'].map(s =>
                `<option value="${s}" ${d.stage === s ? 'selected' : ''}>${s}</option>`
              ).join('')}
            </select>

            <span class="cover-meta-label">Version</span>
            <input type="text" placeholder="v1.0" value="${escapeAttr(d.report_version)}" data-field="report_version">

            <span class="cover-meta-label">Date</span>
            <input type="date" value="${escapeAttr(d.date)}" data-field="date">

            <span class="cover-meta-label">Tested By</span>
            <input type="text" placeholder="工程師姓名" value="${escapeAttr(d.tested_by)}" data-field="tested_by">
          </div>

          <div style="position:absolute;bottom:12px;left:0;right:0;display:flex;justify-content:space-between;padding:0 16px;font-family:var(--font-mono);font-size:8px;color:rgba(15,23,42,0.35);letter-spacing:0.04em;pointer-events:none;">
            <span>${escHtml(d.dept || '')}</span>
            <span>CONFIDENTIAL</span>
          </div>
        </div>
      `;

      // Bind field change events
      $canvas.querySelectorAll('[data-field]').forEach(el => {
        const eventType = el.tagName === 'SELECT' ? 'change' : 'input';
        el.addEventListener(eventType, (e) => {
          page.data[el.dataset.field] = el.value;
          scheduleSave(state.activePage);
        });
      });

      // Image handling
      setupCoverImageHandlers(page);
    }

    function setupCoverImageHandlers(page) {
      const zone = document.getElementById('cover-photo-zone');
      const fileInput = document.getElementById('cover-file-input');
      if (!zone || !fileInput) return;

      // Browse button opens file dialog; zone click does NOT (so paste works)
      const browseBtn = zone.querySelector('.img-browse-btn');
      if (browseBtn) {
        browseBtn.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });
      }
      // If image already placed, zone click does nothing special (markers handled elsewhere)
      // Double-click on empty zone opens file dialog as convenience
      zone.addEventListener('dblclick', (e) => {
        if (e.target.closest('.photo-action-btn')) return;
        if (!page.data.cover_image) fileInput.click();
      });

      fileInput.addEventListener('change', async () => {
        if (fileInput.files.length > 0) {
          await handleCoverImage(page, fileInput.files[0]);
        }
      });

      // Drag & Drop
      zone.addEventListener('dragover', (e) => {
        e.preventDefault();
        zone.classList.add('dragover');
      });

      zone.addEventListener('dragleave', () => {
        zone.classList.remove('dragover');
      });

      zone.addEventListener('drop', async (e) => {
        e.preventDefault();
        zone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
          await handleCoverImage(page, file);
        }
      });

      // Replace / Delete buttons
      const replaceBtn = document.getElementById('photo-replace');
      const deleteBtn = document.getElementById('photo-delete');

      if (replaceBtn) {
        replaceBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          fileInput.click();
        });
      }

      if (deleteBtn) {
        deleteBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          page.data.cover_image = '';
          renderCoverPage(page);
          scheduleSave(state.activePage);
        });
      }

      // Resize handle drag (percentage-based)
      const resizeHandle = document.getElementById('cover-photo-resize');
      if (resizeHandle) {
        resizeHandle.addEventListener('mousedown', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const startX = e.clientX;
          const startW = zone.offsetWidth;
          const aspect = startW / zone.offsetHeight;
          const parentW = zone.parentElement.clientWidth;

          const onMove = (ev) => {
            const dx = ev.clientX - startX;
            let newW = Math.max(200, startW + dx * 2); // *2 because zone is centered
            const maxW = parentW * 0.95;
            if (newW > maxW) newW = maxW;
            const pct = (newW / parentW) * 100;
            zone.style.width = pct + '%';
            zone.style.aspectRatio = aspect.toFixed(4);
          };

          const onUp = () => {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            // Save as percentage + aspect ratio
            const parentW = zone.parentElement.clientWidth;
            page.data.cover_image_w_pct = Math.round((zone.offsetWidth / parentW) * 100);
            page.data.cover_image_w = zone.offsetWidth;
            page.data.cover_image_h = zone.offsetHeight;
            scheduleSave(state.activePage);
          };

          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      }

    }

    async function handlePaste(e) {
      if (state.activePage === null) return;

      const el = document.activeElement;
      const isTextInput = el && (
        el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable
      );
      if (isTextInput) return;

      const page = state.pages[state.activePage];
      const dt = e.clipboardData;
      if (!dt) return;

      // ── Read all clipboard data SYNCHRONOUSLY before any await ──
      let imageFile = null;
      let htmlString = null;

      // 1) Check items for image/* types
      if (dt.items) {
        for (const item of dt.items) {
          if (item.type.startsWith('image/') && item.kind === 'file') {
            const f = item.getAsFile();
            if (f) { imageFile = f; break; }
          }
        }
        // 2) Read HTML synchronously (must happen before event handler returns)
        if (!imageFile) {
          for (const item of dt.items) {
            if (item.type === 'text/html') {
              htmlString = await new Promise(resolve => item.getAsString(resolve));
              break;
            }
          }
        }
      }

      // 3) Fallback: check dt.files (Firefox/Safari compatibility)
      if (!imageFile && dt.files) {
        for (const f of dt.files) {
          if (f.type.startsWith('image/')) { imageFile = f; break; }
        }
      }

      // ── Process collected data ──
      if (imageFile) {
        e.preventDefault();
        await routePastedImage(page, imageFile);
        return;
      }

      // 4) Try extracting image from pasted HTML (Office apps often embed images this way)
      if (htmlString) {
        const file = await extractImageFromHTML(htmlString);
        if (file) {
          e.preventDefault();
          await routePastedImage(page, file);
          return;
        }
      }
    }

    async function extractImageFromHTML(html) {
      // Try to find <img> tags with usable src
      const imgMatch = html.match(/<img[^>]+src=["']([^"']+)["']/i);
      if (!imgMatch) return null;
      const src = imgMatch[1];

      // data: URI — directly convertible
      if (src.startsWith('data:')) {
        try {
          const res = await fetch(src);
          const blob = await res.blob();
          return new File([blob], 'pasted-image.png', { type: blob.type || 'image/png' });
        } catch (err) {
          console.warn('Failed to decode data URI:', err);
        }
      }

      // https:// URL — try to fetch (may fail due to CORS)
      if (src.startsWith('http://') || src.startsWith('https://')) {
        try {
          const res = await fetch(src);
          const blob = await res.blob();
          return new File([blob], 'pasted-image.png', { type: blob.type || 'image/png' });
        } catch (err) {
          console.warn('Failed to fetch remote image:', err);
        }
      }

      // file:/// or blob: — can't fetch, try rendering the HTML fragment to canvas
      try {
        const file = await renderHTMLToImage(html);
        if (file) return file;
      } catch (err) {
        console.warn('Failed to render HTML to image:', err);
      }

      return null;
    }

    async function renderHTMLToImage(html) {
      // Render pasted HTML fragment into an offscreen element, then capture via canvas
      const container = document.createElement('div');
      container.style.cssText = 'position:fixed;left:-9999px;top:0;background:#fff;z-index:-1;';
      container.innerHTML = html;
      document.body.appendChild(container);

      // Wait for any images to load
      const imgs = container.querySelectorAll('img');
      await Promise.all([...imgs].map(img =>
        img.complete ? Promise.resolve() : new Promise(r => { img.onload = r; img.onerror = r; })
      ));

      // Find the largest image or the entire content
      let target = container;
      if (imgs.length === 1) target = imgs[0];

      try {
        if (typeof html2canvas === 'function') {
          const canvas = await html2canvas(target, { useCORS: true, logging: false });
          const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
          document.body.removeChild(container);
          if (blob && blob.size > 100) {
            return new File([blob], 'pasted-image.png', { type: 'image/png' });
          }
        }
      } catch (err) {
        console.warn('html2canvas failed:', err);
      }
      document.body.removeChild(container);
      return null;
    }

    async function routePastedImage(page, file) {
      if (page.type === 'cover') {
        await handleCoverImage(page, file);
      } else if (page.type === 'image') {

      } else if (page.type === 'annotation') {
        await handleAnnotationPhoto(page, file);
      } else if (page.type === 'sim_vs_meas') {
        await handleSimPaste(page, file);
      }
    }

    function renderImagePage(page) {
      const d = page.data;
      const imgs = d.images || [];
      const count = imgs.length;
      const layoutClass = 'layout-' + Math.min(count, 4);

      // Determine which cells to show
      let cellCount;
      if (count === 0) cellCount = 1;       // single full placeholder
      else if (count < 4) cellCount = count + 1; // existing + 1 placeholder
      else cellCount = 4;

      // For layout-0 (no images), show single big placeholder
      // For layout-1 (1 image), show just the 1 cell (full)
      // For layout-2, show 2 cells top row
      // For layout-3, show 3 cells + 1 placeholder
      // For layout-4, show 4 cells

      let gridCells = '';

      if (count === 0) {
        // Single full-page placeholder
        gridCells = buildImageCell(null, 0, page);
      } else {
        // Render existing images in order
        for (let i = 0; i < count; i++) {
          gridCells += buildImageCell(imgs[i], i, page);
        }
        // Add placeholder for next slot if < 4
        if (count < 4) {
          gridCells += buildImageCell(null, count, page);
        }
      }

      const colSplit = d.col_split ?? 50;
      const rowSplit = d.row_split ?? 50;
      const gridColStyle = count >= 2 ? `style="grid-template-columns:${colSplit}fr ${100-colSplit}fr"` : '';
      const gridRowStyle = count >= 3 ? `;grid-template-rows:${rowSplit}fr ${100-rowSplit}fr` : '';
      const gridInlineStyle = count >= 2
        ? `style="grid-template-columns:${colSplit}fr ${100-colSplit}fr${count >= 3 ? `;grid-template-rows:${rowSplit}fr ${100-rowSplit}fr` : ''}"` : '';

      $canvas.innerHTML = editorPageWrapHTML(`
        <div class="image-page">
          <input class="image-page-title" type="text" placeholder="點此輸入標題"
                 value="${escapeAttr(d.title)}" data-field="title">
          <div class="image-grid ${layoutClass}" id="image-grid" ${gridInlineStyle}>
            ${gridCells}
          </div>
        </div>
      `);

      // Bind title
      const titleInput = $canvas.querySelector('[data-field="title"]');
      if (titleInput) {
        titleInput.addEventListener('input', () => {
          page.data.title = titleInput.value;
          scheduleSave(state.activePage);
        });
      }

      // Bind caption inputs
      $canvas.querySelectorAll('.image-caption').forEach(cap => {
        cap.addEventListener('input', () => {
          const pos = parseInt(cap.dataset.pos);
          if (page.data.images[pos]) {
            page.data.images[pos].caption = cap.value;
            scheduleSave(state.activePage);
          }
        });
      });

      // Bind image zone interactions
      setupImagePageHandlers(page);

      // Resize handles (only for multi-image layouts)
      setupImageResizeHandles(page);
    }

    function setupImageResizeHandles(page) {
      const grid = document.getElementById('image-grid');
      if (!grid) return;
      const count = (page.data.images || []).length;
      if (count < 2) return;

      const isMultiRow = count >= 3;

      if (isMultiRow) {
        // 2x2 grid: single corner grip at (col_split, row_split) intersection
        // Dragging the grip resizes both columns and rows simultaneously.
        const grip = document.createElement('div');
        grip.className = 'img-resize-handle img-resize-grip';
        const colSplit = page.data.col_split ?? 50;
        const rowSplit = page.data.row_split ?? 50;
        grip.style.left = `${colSplit}%`;
        grip.style.top = `${rowSplit}%`;
        grid.appendChild(grip);

        grip.addEventListener('mousedown', (e) => {
          e.preventDefault();
          e.stopPropagation();
          grip.classList.add('dragging');
          const rect = grid.getBoundingClientRect();
          const startX = e.clientX;
          const startY = e.clientY;
          const startCol = page.data.col_split ?? 50;
          const startRow = page.data.row_split ?? 50;
          const onMove = (me) => {
            const newCol = Math.max(15, Math.min(85, startCol + (me.clientX - startX) / rect.width * 100));
            const newRow = Math.max(15, Math.min(85, startRow + (me.clientY - startY) / rect.height * 100));
            page.data.col_split = newCol;
            page.data.row_split = newRow;
            grid.style.gridTemplateColumns = `${newCol}fr ${100 - newCol}fr`;
            grid.style.gridTemplateRows = `${newRow}fr ${100 - newRow}fr`;
            grip.style.left = `${newCol}%`;
            grip.style.top = `${newRow}%`;
          };
          const onUp = () => {
            grip.classList.remove('dragging');
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            scheduleSave(state.activePage);
          };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      } else {
        // 2 images: single vertical splitter (width only)
        const hV = document.createElement('div');
        hV.className = 'img-resize-handle img-resize-handle-v';
        const colSplit = page.data.col_split ?? 50;
        hV.style.left = `calc(${colSplit}% - 5px)`;
        grid.appendChild(hV);

        hV.addEventListener('mousedown', (e) => {
          e.preventDefault();
          hV.classList.add('dragging');
          const rect = grid.getBoundingClientRect();
          const startX = e.clientX;
          const startSplit = page.data.col_split ?? 50;
          const onMove = (me) => {
            const newSplit = Math.max(15, Math.min(85, startSplit + (me.clientX - startX) / rect.width * 100));
            page.data.col_split = newSplit;
            grid.style.gridTemplateColumns = `${newSplit}fr ${100 - newSplit}fr`;
            hV.style.left = `calc(${newSplit}% - 5px)`;
          };
          const onUp = () => {
            hV.classList.remove('dragging');
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            scheduleSave(state.activePage);
          };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      }
    }

    function buildImageCell(imgData, position, page) {
      const hasImage = imgData && imgData.url_or_base64;

      if (hasImage) {
        return `
          <div class="image-cell">
            <div class="image-drop-zone has-image" data-pos="${position}">
              <img src="${escapeAttr(imgData.url_or_base64)}" alt="Image ${position + 1}">

                <button class="photo-action-btn img-replace-btn" data-pos="${position}">替換</button>
                <button class="photo-action-btn danger img-delete-btn" data-pos="${position}">刪除</button>
              </div>
              <input type="file" accept="image/*" class="img-file-input" data-pos="${position}" style="display:none">
            </div>
            <input class="image-caption" type="text" placeholder="點此輸入說明"
                   value="${escapeAttr(imgData.caption || '')}" data-pos="${position}">
          </div>
        `;
      } else {
        return `
          <div class="image-cell">
            <div class="image-drop-zone" data-pos="${position}">
              <div class="image-drop-placeholder">
                <span class="plus-icon">+</span>
                拖拉圖片或 Ctrl+V 貼上
                <button class="img-browse-btn" data-browse="image" data-pos="${position}">瀏覽檔案</button>
              </div>

            </div>
          </div>

    function setupImagePageHandlers(page) {
      const zones = $canvas.querySelectorAll('.image-drop-zone');

      zones.forEach(zone => {
        const pos = parseInt(zone.dataset.pos);
        const fileInput = zone.querySelector('.img-file-input');

        // Browse button opens file dialog; zone click stores active position for paste
        const browseBtn = zone.querySelector('.img-browse-btn');
        if (browseBtn) {
          browseBtn.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });
        }
        // Double-click on empty zone opens file dialog
        zone.addEventListener('dblclick', (e) => {
          if (e.target.closest('.photo-action-btn')) return;
          if (!zone.classList.contains('has-image')) fileInput.click();
        });
        // Single click sets active paste target
        zone.addEventListener('click', (e) => {
          if (e.target.closest('.photo-action-btn') || e.target.closest('.img-browse-btn')) return;
          // Mark this zone as active paste target
          $canvas.querySelectorAll('.image-drop-zone').forEach(z => z.classList.remove('paste-target'));
          if (!zone.classList.contains('has-image')) zone.classList.add('paste-target');
        });

        fileInput.addEventListener('change', async () => {
          if (fileInput.files.length > 0) {
            await handleImagePageImage(page, pos, fileInput.files[0]);
          }
        });

        // Drag & Drop
        zone.addEventListener('dragover', (e) => {
          e.preventDefault();
          zone.classList.add('dragover');
        });

        zone.addEventListener('dragleave', () => {
          zone.classList.remove('dragover');
        });

        zone.addEventListener('drop', async (e) => {
          e.preventDefault();
          zone.classList.remove('dragover');
          const file = e.dataTransfer.files[0];
          if (file && file.type.startsWith('image/')) {
            await handleImagePageImage(page, pos, file);
          }
        });

        // Replace / Delete
        const replaceBtn = zone.querySelector('.img-replace-btn');
        const deleteBtn = zone.querySelector('.img-delete-btn');

        if (replaceBtn) {
          replaceBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
          });
        }

        if (deleteBtn) {
          deleteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            page.data.images.splice(pos, 1);
            renderImagePage(page);
            scheduleSave(state.activePage);
          });
        }
      });
    }

    async function handleImagePageImage(page, position, file) {
      const imageData = await processImage(file);

      // If position exists, replace; otherwise add
      if (page.data.images[position]) {
        page.data.images[position].url_or_base64 = imageData;
      } else {
        // Fill up to position
        while (page.data.images.length < position) {
          page.data.images.push({ position: page.data.images.length, url_or_base64: '', caption: '' });
        }
        page.data.images.push({ position: position, url_or_base64: imageData, caption: '' });
      }

      renderImagePage(page);
      scheduleSave(state.activePage);
    }

    async function handleImagePagePaste(page, file) {
      const imgs = page.data.images || [];
      // If a specific zone is selected (paste-target), use that position
      const targetZone = $canvas.querySelector('.image-drop-zone.paste-target');
      if (targetZone) {
        const pos = parseInt(targetZone.dataset.pos);
        await handleImagePageImage(page, pos, file);
        return;
      }
      // Otherwise paste to next available slot
      if (imgs.length >= 4) return;
      const nextPos = imgs.length;
      await handleImagePageImage(page, nextPos, file);
    }

    let _annoResizeObserver = null;
    function sizeAnnotationWorkspace(page) {
      const outer = document.querySelector('.annotation-workspace');
      const inner = document.getElementById('anno-workspace');
      if (!outer || !inner) return;

      const TARGET_ASPECT = 842 / 559;
      const fit = () => {
        const availW = outer.clientWidth;
        const availH = outer.clientHeight;
        if (availW <= 0 || availH <= 0) return;
        let w, h;
        if (availW / availH > TARGET_ASPECT) {
          h = availH;
          w = h * TARGET_ASPECT;
        } else {
          w = availW;
          h = w / TARGET_ASPECT;
        }
        inner.style.width = Math.floor(w) + 'px';
        inner.style.height = Math.floor(h) + 'px';
        if (page && page.data.photo_url_or_base64 && page.data.markers.length > 0) {
          renderAnnotationMarkers(page);
        }
      };
      fit();

      if (_annoResizeObserver) _annoResizeObserver.disconnect();
      _annoResizeObserver = new ResizeObserver(fit);
      _annoResizeObserver.observe(outer);
    }

          const startX = e.clientX;
          const startW = zone.offsetWidth;
          const aspect = startW / zone.offsetHeight;
          const ws = document.getElementById('anno-workspace');

          const onMove = (ev) => {
            const dx = ev.clientX - startX;
            const innerW = ws ? ws.offsetWidth : 800;
            const innerH = ws ? ws.offsetHeight : 531;
            let newW = Math.max(innerW * 0.3, startW + dx * 2);
            if (newW > innerW * 0.98) newW = innerW * 0.98;
            const newH = newW / aspect;
            zone.style.width = (newW / innerW * 100) + '%';
            zone.style.height = (newH / innerH * 100) + '%';
            zone.style.left = ((1 - newW / innerW) / 2 * 100) + '%';
            zone.style.top = ((1 - newH / innerH) / 2 * 100) + '%';
          };

          const onUp = () => {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            const innerW = ws ? ws.offsetWidth : 800;
            const innerH = ws ? ws.offsetHeight : 531;
            page.data.anno_photo_w = Math.round((zone.offsetWidth / innerW) * 842);
            page.data.anno_photo_h = Math.round((zone.offsetHeight / innerH) * 559);
            scheduleSave(state.activePage);
            renderAnnotationMarkers(page);
          };

          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      }
    }

    async function handleAnnotationPhoto(page, file) {
      const imageData = await processImage(file);
      page.data.photo_url_or_base64 = imageData;
      renderAnnotationPage(page);
      scheduleSave(state.activePage);
    }

    function setupAnnotationClickHandler(page) {
      const zone = document.getElementById('anno-photo-zone');
      if (!zone) return;

      zone.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return; // left click only
        if (!page.data.photo_url_or_base64) return;
        // Ignore if clicking an existing marker or label
        if (e.target.closest('.marker-dot') || e.target.closest('.marker-label') || e.target.closest('.marker-label-wrap') || e.target.closest('.marker-resize-handle') || e.target.closest('.anno-replace-photo-btn') || e.target.closest('.anno-photo-resize')) return;

        const rect = zone.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        // Generate marker
        const id = 'm_' + Date.now();
        const num = page.data.markers.length + 1;
        const marker = {
          id,
          x: Math.round(x * 100) / 100,
          y: Math.round(y * 100) / 100,
          label: '',
          label_x: -1, // unset → will be placed on drag release
          label_y: -1,
        };

        page.data.markers.push(marker);

        // Start drag to place label
        const workspace = document.getElementById('anno-workspace');
        const wsRect = workspace.getBoundingClientRect();
        const dotAbsX = e.clientX - wsRect.left;
        const dotAbsY = e.clientY - wsRect.top;

        annotationDragState = { markerId: id, dotAbsX, dotAbsY };

        // Show drag line
        const dragSvg = document.getElementById('anno-drag-svg');
        dragSvg.style.display = 'block';
        const line = dragSvg.querySelector('line');
        line.setAttribute('x1', dotAbsX);
        line.setAttribute('y1', dotAbsY);
        line.setAttribute('x2', dotAbsX);
        line.setAttribute('y2', dotAbsY);

        // Render markers (dot will appear)
        renderAnnotationMarkers(page);
        scheduleSave(state.activePage);
      });

      // Mouse move for drag line
      const workspace = document.getElementById('anno-workspace');
      workspace.addEventListener('mousemove', (e) => {
        if (!annotationDragState) return;
        const wsRect = workspace.getBoundingClientRect();
        const mx = e.clientX - wsRect.left;
        const my = e.clientY - wsRect.top;
        const dragSvg = document.getElementById('anno-drag-svg');
        const line = dragSvg.querySelector('line');
        line.setAttribute('x2', mx);
        line.setAttribute('y2', my);
      });

      // Mouse up for placing label
      workspace.addEventListener('mouseup', (e) => {
        if (!annotationDragState) return;
        const ds = annotationDragState;
        annotationDragState = null;

        const dragSvg = document.getElementById('anno-drag-svg');
        dragSvg.style.display = 'none';

        const wsRect = workspace.getBoundingClientRect();
        const labelAbsX = e.clientX - wsRect.left;
        const labelAbsY = e.clientY - wsRect.top;

        // Convert to % of workspace
        const lxPct = (labelAbsX / wsRect.width) * 100;
        const lyPct = (labelAbsY / wsRect.height) * 100;

        // Update marker data
        const marker = page.data.markers.find(m => m.id === ds.markerId);
        if (marker) {
          // If label was barely dragged, auto-place to the right/left
          const dist = Math.sqrt((labelAbsX - ds.dotAbsX) ** 2 + (labelAbsY - ds.dotAbsY) ** 2);
          if (dist < 15) {
            // Auto place: if dot is in left half, place label right; else left
            const zone = document.getElementById('anno-photo-zone');
            const zRect = zone.getBoundingClientRect();
            const dotClientX = ds.dotAbsX + wsRect.left;
            const midX = zRect.left + zRect.width / 2;
            if (dotClientX < midX) {
              marker.label_x = 85;
            } else {
              marker.label_x = 2;
            }
            marker.label_y = Math.max(2, Math.min(90, lyPct));
          } else {
            marker.label_x = Math.max(0, Math.min(95, lxPct));
            marker.label_y = Math.max(0, Math.min(95, lyPct));
          }
        }

        renderAnnotationMarkers(page);
        scheduleSave(state.activePage);

        // Focus the new label
        setTimeout(() => {
          const labelEl = document.querySelector(`.marker-label[data-id="${ds.markerId}"]`);
          if (labelEl) labelEl.focus();
        }, 50);
      });
    }

    function renderAnnotationMarkers(page) {
      const workspace = document.getElementById('anno-workspace');
      const zone = document.getElementById('anno-photo-zone');
      const svg = document.getElementById('anno-svg');
      if (!workspace || !zone || !svg) return;

      // Remove old markers & labels (but keep photo zone and SVGs)
      workspace.querySelectorAll('.marker-dot, .marker-label, .marker-label-wrap').forEach(el => el.remove());
      svg.innerHTML = '';

      const markers = page.data.markers;
      const zoneRect = zone.getBoundingClientRect();
      const wsRect = workspace.getBoundingClientRect();

      // Compute zone offset relative to workspace
      const zoneOffX = zoneRect.left - wsRect.left;
      const zoneOffY = zoneRect.top - wsRect.top;

      markers.forEach((m, idx) => {
        // Dot position: x,y are % of photo zone
        const dotX = zoneOffX + (m.x / 100) * zoneRect.width;
        const dotY = zoneOffY + (m.y / 100) * zoneRect.height;

        // Create dot
        const dot = document.createElement('div');
        dot.className = 'marker-dot';
        dot.style.left = dotX + 'px';
        dot.style.top = dotY + 'px';
        dot.dataset.id = m.id;

        // Right-click to delete
        dot.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (confirm(`刪除標記 #${idx + 1}？`)) {
            page.data.markers = page.data.markers.filter(mk => mk.id !== m.id);
            renderAnnotationMarkers(page);
            scheduleSave(state.activePage);
          }
        });

        // Draggable dot
        let dotDragging = false;
        dot.addEventListener('mousedown', (e) => {
          if (e.button !== 0) return;
          e.preventDefault();
          e.stopPropagation();
          dotDragging = true;
        });

        document.addEventListener('mousemove', (e) => {
          if (!dotDragging) return;
          const zr = zone.getBoundingClientRect();
          const wr = workspace.getBoundingClientRect();
          // Clamp to photo zone
          const cx = Math.max(zr.left, Math.min(zr.right, e.clientX));
          const cy = Math.max(zr.top, Math.min(zr.bottom, e.clientY));
          const newDotX = (cx - wr.left);
          const newDotY = (cy - wr.top);
          dot.style.left = newDotX + 'px';
          dot.style.top = newDotY + 'px';
          // Update SVG line if label exists
          if (m.label_x >= 0 && m.label_y >= 0) {
            const lbl = workspace.querySelector(`.marker-label-wrap[data-id="${m.id}"]`);
            if (lbl) {
              updateAnnotationLine(svg, m.id, newDotX, newDotY,
                parseFloat(lbl.style.left) + lbl.offsetWidth / 2,
                parseFloat(lbl.style.top) + lbl.offsetHeight / 2);
            }
          }
        });

        document.addEventListener('mouseup', (e) => {
          if (!dotDragging) return;
          dotDragging = false;
          const zr = zone.getBoundingClientRect();
          const cx = Math.max(zr.left, Math.min(zr.right, e.clientX));
          const cy = Math.max(zr.top, Math.min(zr.bottom, e.clientY));
          // Convert back to % of photo zone
          m.x = Math.round(((cx - zr.left) / zr.width) * 10000) / 100;
          m.y = Math.round(((cy - zr.top) / zr.height) * 10000) / 100;
          renderAnnotationMarkers(page);
          scheduleSave(state.activePage);
        });

        workspace.appendChild(dot);

        // Label (only if placed)
        if (m.label_x >= 0 && m.label_y >= 0) {
          const labelX = (m.label_x / 100) * wsRect.width;
          const labelY = (m.label_y / 100) * wsRect.height;

          // Wrapper for label + resize handle
          const wrap = document.createElement('div');
          wrap.className = 'marker-label-wrap';
          wrap.style.left = labelX + 'px';
          wrap.style.top = labelY + 'px';
          wrap.dataset.id = m.id;

          const label = document.createElement('input');
          label.type = 'text';
          label.className = 'marker-label';
          label.placeholder = `TC${idx + 1} - 元件名稱`;
          label.value = m.label || '';
          label.dataset.id = m.id;
          // Restore saved width or default 80px
          const savedW = m.label_w || 53;
          label.style.width = savedW + 'px';

          // Resize handle
          const resizeHandle = document.createElement('div');
          resizeHandle.className = 'marker-resize-handle';

          // Delete button
          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'marker-delete-btn';
          deleteBtn.type = 'button';
          deleteBtn.textContent = '×';
          deleteBtn.title = '刪除標籤';
          deleteBtn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            e.stopPropagation();
          });
          deleteBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            page.data.markers = page.data.markers.filter(mk => mk.id !== m.id);
            renderAnnotationMarkers(page);
            scheduleSave(state.activePage);
          });

          wrap.appendChild(label);
          wrap.appendChild(resizeHandle);
          wrap.appendChild(deleteBtn);

          // Editable
          label.addEventListener('input', () => {
            m.label = label.value;
            scheduleSave(state.activePage);
          });

          // Drag with movement threshold: single click focuses input,
          // drag only starts after the cursor moves > 5px while held.
          let labelDragging = false;
          let labelOffX = 0, labelOffY = 0;
          let pendingDrag = null;

          label.addEventListener('mousedown', (e) => {
            if (e.target !== label || e.button !== 0) return;
            pendingDrag = {
              startX: e.clientX,
              startY: e.clientY,
              offX: e.clientX - wrap.getBoundingClientRect().left,
              offY: e.clientY - wrap.getBoundingClientRect().top,
            };
          });

          document.addEventListener('mousemove', (e) => {
            if (pendingDrag && !labelDragging) {
              const dist = Math.hypot(e.clientX - pendingDrag.startX, e.clientY - pendingDrag.startY);
              if (dist > 5) {
                labelDragging = true;
                labelOffX = pendingDrag.offX;
                labelOffY = pendingDrag.offY;
                label.blur();
              }
            }
            if (!labelDragging) return;
            const newX = e.clientX - wsRect.left - labelOffX;
            const newY = e.clientY - wsRect.top - labelOffY;
            wrap.style.left = newX + 'px';
            wrap.style.top = newY + 'px';
            // Update SVG line
            updateAnnotationLine(svg, m.id, dotX, dotY, newX + wrap.offsetWidth / 2, newY + wrap.offsetHeight / 2);
          });

          document.addEventListener('mouseup', () => {
            pendingDrag = null;
            if (!labelDragging) return;
            labelDragging = false;
            const rect = workspace.getBoundingClientRect();
            let lx = (parseFloat(wrap.style.left) / rect.width) * 100;
            let ly = (parseFloat(wrap.style.top) / rect.height) * 100;
            // Clamp so label doesn't overflow right/bottom edge
            const lwPct = (label.offsetWidth / rect.width) * 100;
            lx = Math.max(0, Math.min(100 - lwPct, lx));
            ly = Math.max(0, Math.min(96, ly));
            m.label_x = lx;
            m.label_y = ly;
            scheduleSave(state.activePage);
            renderAnnotationMarkers(page);
          });

          // Resize handle drag
          let resizing = false;
          let resizeStartX = 0, resizeStartW = 0;

          resizeHandle.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            e.preventDefault();
            e.stopPropagation();
            resizing = true;
            resizeStartX = e.clientX;
            resizeStartW = label.offsetWidth;
          });

          document.addEventListener('mousemove', (e) => {
            if (!resizing) return;
            const delta = e.clientX - resizeStartX;
            const newW = Math.max(40, resizeStartW + delta);
            label.style.width = newW + 'px';
            // Update SVG line to track center
            updateAnnotationLine(svg, m.id, dotX, dotY,
              parseFloat(wrap.style.left) + wrap.offsetWidth / 2,
              parseFloat(wrap.style.top) + wrap.offsetHeight / 2);
          });

          document.addEventListener('mouseup', () => {
            if (!resizing) return;
            resizing = false;
            m.label_w = label.offsetWidth;
            scheduleSave(state.activePage);
          });

          // Double-click to edit text
          label.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            label.focus();
            label.select();
          });

          workspace.appendChild(wrap);

          // Draw SVG leader line (use saved width + handle 6px for center calc)
          const labelCenterX = labelX + (savedW + 6) / 2;
          const labelCenterY = labelY + (wrap.offsetHeight || 24) / 2;
          drawAnnotationLine(svg, m.id, dotX, dotY, labelCenterX, labelCenterY);
        }
      });
    }

    function drawAnnotationLine(svg, markerId, x1, y1, x2, y2) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1);
      line.setAttribute('y1', y1);
      line.setAttribute('x2', x2);
      line.setAttribute('y2', y2);
      line.dataset.markerId = markerId;
      svg.appendChild(line);
    }

    function updateAnnotationLine(svg, markerId, x1, y1, x2, y2) {
      const line = svg.querySelector(`line[data-marker-id="${markerId}"]`);
      if (line) {
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
      }
    }

    function renderDataPage(page) {

      if (!d.header) d.header = {};
      if (!d.ta_conditions) d.ta_conditions = [25, 55];

      const stageOptions = ['Prototype', 'EVT', 'DVT', 'PVT', 'MP'];
      const categoryOptions = ['RF', 'Digital', 'PWR'];
      const specTypeOptions = ['Rec.', 'Abs.'];
      const specTypeLegacy = { 'Recommended': 'Rec.', 'Absolute': 'Abs.' };
      const deratingOptions = ['0.80', '0.85', '0.90', '0.95', '1.00'];
      const sensorTypeOptions = ['Tj only', 'Tj+Tc'];

      const timLib = state.timLibrary || { grease: [], pad: [], putty: [] };
      const allTimNames = [
        ...timLib.grease.map(t => t.name),

        ...timLib.putty.map(t => t.name),
      ].filter(Boolean);

      const taTagsHTML = d.ta_conditions.map((temp, i) =>
        `<span class="ta-tag">Ta = ${temp}°C<button class="ta-tag-remove" data-ta-idx="${i}" title="刪除">✕</button></span>`
      ).join('');

      // ── Build component rows ──
      // Assign auto-increment numbers per category
      const catCounters = { RF: 0, Digital: 0, PWR: 0 };
      const compRows = d.components.map((comp, ri) => {

        const catClass = cat === 'RF' ? 'cat-rf' : cat === 'Digital' ? 'cat-digital' : 'cat-pwr';

        const tcSpec = parseFloat(comp.tc_spec) || 0;

        // Check pass/fail across all Ta
        let rowFail = false;
        const taCells = d.ta_conditions.map((ta, ti) => {

            </select></td>

        </tr>`;
      }).join('');

      const sensorTaHeaders = d.ta_conditions.map(ta =>
        `<th>Ta ${ta}°C</th>`
      ).join('');

      const timCategories = [
        { key: 'grease', label: 'Thermal Grease' },
        { key: 'pad',    label: 'Thermal Pad' },
        { key: 'putty',  label: 'Thermal Putty' },

      const timActiveTab = state._timActiveTab || 'grease';
      const timPanelHTML = `<div class="tim-panel" id="tim-panel">
        <div class="tim-panel-header" id="tim-panel-toggle">
          <span>TIM 資料列表</span>
          <span class="tim-panel-arrow${state._timPanelOpen ? ' open' : ''}" id="tim-panel-arrow">▶</span>
        </div>
        <div class="tim-panel-body${state._timPanelOpen ? ' open' : ''}" id="tim-panel-body">
          <div class="tim-tabs">
            ${timCategories.map(c =>
              `<button class="tim-tab${timActiveTab === c.key ? ' active' : ''}" data-tim-cat="${c.key}">${c.label}</button>`
            ).join('')}
          </div>

      // ── Helper: update computed cells in-place without re-render ──
      function updateRowComputed(ri) {
        const comp = d.components[ri];
        if (!comp) return;
        const tr = tbody?.querySelector(`tr[data-row-idx="${ri}"]`);
        if (!tr) return;

        const tcSpec = parseFloat(comp.tc_spec) || 0;
        const derating = parseFloat(comp.derating) || 0.9;
        const derated = tcSpec * derating;

        // Update Derated cell (7th td, index 6)
        const tds = tr.querySelectorAll('td');
        // Find derated cell — it's the one after TIM Type input
        const deratedCell = tds[6]; // 0:cat,1:#,2:name,3:specType,4:tcSpec,5:derating,6:derated
        if (deratedCell) deratedCell.textContent = derated > 0 ? derated.toFixed(1) : '—';

        // Update margin cells and P/F
        let rowFail = false;
        d.ta_conditions.forEach((ta, ti) => {
          const key = 'ta_' + ta;
          const measured = comp.readings[key];
          const measuredNum = parseFloat(measured);
          let marginStr = '—';
          let marginClass = 'dt-readonly';

          if (!isNaN(measuredNum) && derated > 0) {
            const margin = ((derated - measuredNum) / derated) * 100;
            marginStr = margin.toFixed(1) + '%';
            if (margin >= 10) marginClass = 'dt-margin-pass';
            else if (margin >= 0) marginClass = 'dt-margin-warn';
            else { marginClass = 'dt-margin-fail'; rowFail = true; }
          }

          // Margin cell: after TIM Type(7) + ta pairs (each ta = 2 cells: input + margin)
          const marginIdx = 8 + ti * 2 + 1; // 7=tim_type, 8=first ta input, 9=first margin...
          const marginCell = tds[marginIdx];
          if (marginCell) {
            marginCell.textContent = marginStr;
            marginCell.className = 'dt-ta-col ' + marginClass;
          }
        });

        // P/F cell
        const pfIdx = 8 + d.ta_conditions.length * 2;
        const pfCell = tds[pfIdx];
        if (pfCell) {
          const pfText = rowFail ? '❌ Fail' : (tcSpec > 0 ? '✔ Pass' : '—');
          pfCell.textContent = pfText;
          pfCell.className = rowFail ? 'dt-passfail-fail' : 'dt-passfail-pass';
        }

        // Row fail class
        tr.classList.toggle('row-fail', rowFail);

        // Update auto-number and category boundary (only for category change)
        updateAutoNumbers();
      }

      function updateAutoNumbers() {
        const catCounters2 = { RF: 0, Digital: 0, PWR: 0 };
        let prevCat2 = null;
        tbody?.querySelectorAll('tr[data-row-idx]').forEach(tr => {
          const idx = parseInt(tr.dataset.rowIdx);

      // ── Row delete (button + context menu) ──
      if (tbody) {
        tbody.addEventListener('click', (e) => {

            renderDataPage(page);
          }
        });
      }

      // ── Excel-style multi-cell paste ──
      if (tbody) {
        const pasteFieldMap = [
          { field: 'category' },
          { field: 'name' },
          { field: 'spec_type' },
          { field: 'tc_spec' },
          { field: 'derating' },
          { field: 'tim_type' },
        ];
        d.ta_conditions.forEach(ta => pasteFieldMap.push({ taKey: 'ta_' + ta }));
        pasteFieldMap.push({ field: 'note' });

        tbody.addEventListener('paste', (e) => {
          const target = e.target;
          if (target.tagName !== 'INPUT' && target.tagName !== 'SELECT') return;

          const clipText = (e.clipboardData || window.clipboardData).getData('text');
          if (!clipText) return;
          const isMultiCell = clipText.includes('\t') || clipText.trim().includes('\n');
          if (!isMultiCell) return;
          e.preventDefault();

          const tr = target.closest('tr[data-row-idx]');
          if (!tr) return;
          const startRowIdx = parseInt(tr.dataset.rowIdx);
          if (isNaN(startRowIdx)) return;

          const editableCells = Array.from(tr.querySelectorAll('input, select'));
          const startColIdx = editableCells.indexOf(target);
          if (startColIdx < 0) return;

          const clipRows = clipText.replace(/\r\n?/g, '\n').trimEnd().split('\n');
          const clipGrid = clipRows.map(row => row.split('\t'));

          for (let r = 0; r < clipGrid.length; r++) {
            const rowIdx = startRowIdx + r;
            while (rowIdx >= d.components.length) {
              d.components.push({ category: 'RF', derating: '0.90', readings: {} });
            }
            const comp = d.components[rowIdx];
            if (!comp.readings) comp.readings = {};

            for (let c = 0; c < clipGrid[r].length; c++) {
              const colIdx = startColIdx + c;
              if (colIdx >= pasteFieldMap.length) break;
              const val = clipGrid[r][c].trim();
              const fld = pasteFieldMap[colIdx];
              if (fld.taKey) {
                comp.readings[fld.taKey] = val;
              } else {
                comp[fld.field] = val;

      // ── Sensor field bindings ──

      // ── Add sensor row ──

            sensorArrow.classList.add('open');
          }
        });
      }

      // ── TIM Panel bindings ──
      const timPanelToggle = document.getElementById('tim-panel-toggle');
      const timPanelBody = document.getElementById('tim-panel-body');
      const timPanelArrowEl = document.getElementById('tim-panel-arrow');

      const timPanel = document.getElementById('tim-panel');
      if (timPanel) {
        timPanel.querySelectorAll('.tim-tab').forEach(btn => {
          btn.addEventListener('click', () => {
            state._timActiveTab = btn.dataset.timCat;
            renderDataPage(page);
          });
        });

        const timAddBtn = document.getElementById('tim-add-btn');
        if (timAddBtn) {
          timAddBtn.addEventListener('click', async () => {
            const cat = state._timActiveTab || 'grease';
            if (!state.timLibrary[cat]) state.timLibrary[cat] = [];
            state.timLibrary[cat].push({ name: '', k_value: '', vendor: '' });
            try { await dbAdapter.setTimLibrary(state.timLibrary); } catch (e) {}
            renderDataPage(page);
          });
        }

        timPanel.querySelectorAll('.tim-entry input[data-tim-field]').forEach(el => {
          el.addEventListener('input', async () => {

    // ━━━ Sim vs Meas Comparison Page Module ━━━
    function addSimVsMeasPage() {
      const page = {
        id: 'page_' + Date.now(),
        type: 'sim_vs_meas',
        order: state.pages.length,
        data: {
          title: '',

        }
